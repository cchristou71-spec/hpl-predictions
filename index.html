<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ══════════════════════════════════════════════════════════════════
// SUPABASE — reuses HPL project, namespaced under wc26_ keys.
// All data stored as JSON blobs in game_state (key, value, updated_at).
// No new tables needed.
// ══════════════════════════════════════════════════════════════════
const SUPA_URL = "https://rsvcqtfgidhrumtopiqb.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdmNxdGZnaWRocnVtdG9waXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjc2MDIsImV4cCI6MjA5MjkwMzYwMn0.jUomRZbvTNPhsdgNalEni1TjwpyRMZ5m07G4dlD0uNY";
const KP = "wc26_"; // key prefix — keeps this app's data separate from HPL's

const supa = {
  async get(table, filters="") {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${filters}`, {
      headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
    });
    if (!res.ok) throw new Error(`Supabase GET failed: ${res.status}`);
    return res.json();
  },
  async upsert(table, data) {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`Supabase UPSERT failed: ${res.status}`);
    return true;
  },
  async getState(key) {
    const rows = await this.get("game_state", `select=value&key=eq.${KP}${key}`);
    return rows.length ? rows[0].value : null;
  },
  async setState(key, value) {
    return this.upsert("game_state", { key: `${KP}${key}`, value, updated_at: new Date().toISOString() });
  },
};

// ══════════════════════════════════════════════════════════════════
// TEAM DATA — flag emoji + short colour per confederation-ish grouping
// ══════════════════════════════════════════════════════════════════
// Maps each team name to its flagcdn.com country code. Using image flags (not emoji)
// because flag emoji render inconsistently across platforms — Windows in particular
// shows plain two-letter text instead of the actual flag for every country, not just
// subdivisions, so emoji can't be relied on here. flagcdn.com is a free, no-key CDN
// that serves the same flag images everywhere regardless of OS or font support.
const TEAM_FLAG_CODES = {
  "Algeria":"dz","Argentina":"ar","Australia":"au","Austria":"at","Belgium":"be","Bosnia and Herzegovina":"ba",
  "Brazil":"br","Cabo Verde":"cv","Cameroon":"cm","Canada":"ca","Colombia":"co","Czechia":"cz",
  "Costa Rica":"cr","Croatia":"hr","Curaçao":"cw","DR Congo":"cd","Ecuador":"ec",
  "Egypt":"eg","England":"gb-eng","France":"fr","Germany":"de","Ghana":"gh",
  "Haiti":"ht","Iran":"ir","Iraq":"iq","Italy":"it","Ivory Coast":"ci",
  "Jamaica":"jm","Japan":"jp","Jordan":"jo","Mexico":"mx","Morocco":"ma",
  "Netherlands":"nl","New Zealand":"nz","Norway":"no","Panama":"pa","Paraguay":"py",
  "Portugal":"pt","Qatar":"qa","Saudi Arabia":"sa","Scotland":"gb-sct","Senegal":"sn",
  "South Africa":"za","South Korea":"kr","Spain":"es","Sweden":"se","Switzerland":"ch","Tunisia":"tn",
  "Turkey":"tr","USA":"us","United States":"us","Uruguay":"uy","Uzbekistan":"uz",
};
const flagCode = t => TEAM_FLAG_CODES[t] || null;

// Renders a small flag image for a team, or nothing if the team/code isn't known
// (e.g. still a "Winner Group X" placeholder).
function FlagIcon({team, size=18}) {
  const code = flagCode(team);
  if (!code) return null;
  const w = Math.round(size * 4/3); // flagcdn flags are 4:3, request a width and let height follow
  return (
    <img
      src={`https://flagcdn.com/w40/${code}.png`}
      srcSet={`https://flagcdn.com/w80/${code}.png 2x`}
      alt=""
      width={w} height={size}
      style={{display:"inline-block", verticalAlign:"middle", borderRadius:2, flexShrink:0,
        boxShadow:"0 0 0 1px rgba(0,0,0,0.08)"}}
      onError={e => { e.target.style.display = "none"; }}
    />
  );
}

const PLAYER_COLOURS = {
  "Trev":"#60B8E8","Clive":"#FDB913","Andrew":"#6699FF","Pete":"#4ADE80",
  "Steve":"#FF6B6B","Cos":"#E8557A","Terry":"#CBD5E1","Alasdair":"#A78BFA",
};
const playerColour = name => PLAYER_COLOURS[name] || "#94A3B8";
const DEFAULT_PLAYERS = ["Trev","Clive","Andrew","Pete","Steve","Cos","Terry","Alasdair"];

// ══════════════════════════════════════════════════════════════════
// BRACKET STRUCTURE — round order + auto-advancement wiring
// Each match in r16/qf/sf/f has homeFrom/awayFrom pointing at the
// previous round's match id + W (winner). Round of 32 starts with
// placeholder team names the admin fills in once qualifiers confirmed.
// ══════════════════════════════════════════════════════════════════
const ROUND_ORDER = ["r32","r16","qf","sf","f"];
const ROUND_LABELS = { r32:"Round of 32", r16:"Round of 16", qf:"Quarter-Finals", sf:"Semi-Finals", f:"Final" };
const ROUND_DATES = {
  r32: "28 Jun – 3 Jul", r16: "4–7 Jul", qf: "9–11 Jul", sf: "14–15 Jul", f: "18–19 Jul"
};
// Exact-score points scale up each round; correct result (right outcome, wrong score) is always 1pt flat.
const ROUND_POINTS = { r32: 3, r16: 4, qf: 5, sf: 6, f: 7 };

// Bump this whenever R32_SLOTS below changes (new confirmed team, corrected date, etc).
// On load, if Supabase's saved bracket was seeded from an older version, the fresh
// hardcoded data here is merged back in — any results/predictions already entered
// are preserved, but placeholder team names get replaced with newly-known real ones.
const BRACKET_SEED_VERSION = 5;

function buildInitialBracket() {
  // Official FIFA Round of 32 schedule (Match 73-88), ET kickoff times, host venues.
  // Source: worldcuppass.com schedule (last updated 25 Jun 2026) + Sky Sports bracket coverage.
  // Team names filled in where a group has already finished (confirmed group winner/
  // runner-up); remaining slots show the bracket descriptor until 27 Jun group-stage finish.
  // All times below are BST (UK) — converted from the official ET kickoff times.
  // Matches kicking off late evening ET land after midnight UK time, so their
  // BST date is the following day; that's reflected in the date field here.
  const R32_SLOTS = [
    { match:73, home:"South Africa",  away:"Canada",                date:"2026-06-28", time:"20:00", venue:"Los Angeles, USA" },
    { match:76, home:"Winner Group C", away:"Runner-up Group F",     date:"2026-06-29", time:"18:00", venue:"Houston, USA" },
    { match:74, home:"Germany",       away:"3rd Group A/B/C/D/F",    date:"2026-06-29", time:"21:30", venue:"Boston, USA" },
    { match:75, home:"Winner Group F", away:"Runner-up Group C",     date:"2026-06-30", time:"02:00", venue:"Monterrey, Mexico" },
    { match:78, home:"Runner-up Group E", away:"Runner-up Group I",  date:"2026-06-30", time:"18:00", venue:"Dallas, USA" },
    { match:77, home:"Winner Group I", away:"3rd Group C/D/F/G/H",  date:"2026-06-30", time:"22:00", venue:"New Jersey, USA" },
    { match:79, home:"Mexico",        away:"3rd Group C/E/F/H/I",   date:"2026-07-01", time:"02:00", venue:"Mexico City, Mexico" },
    { match:80, home:"Winner Group L", away:"3rd Group E/H/I/J/K",  date:"2026-07-01", time:"17:00", venue:"Atlanta, USA" },
    { match:82, home:"Winner Group G", away:"3rd Group A/E/H/I/J",  date:"2026-07-01", time:"21:00", venue:"Seattle, USA" },
    { match:81, home:"USA",           away:"3rd Group B/E/F/I/J",   date:"2026-07-02", time:"01:00", venue:"San Francisco, USA" },
    { match:84, home:"Winner Group H", away:"Runner-up Group J",    date:"2026-07-02", time:"20:00", venue:"Los Angeles, USA" },
    { match:83, home:"Runner-up Group K", away:"Runner-up Group L", date:"2026-07-03", time:"00:00", venue:"Toronto, Canada" },
    { match:85, home:"Switzerland",   away:"3rd Group E/F/G/I/J",   date:"2026-07-03", time:"04:00", venue:"Vancouver, Canada" },
    { match:88, home:"Runner-up Group D", away:"Runner-up Group G", date:"2026-07-03", time:"19:00", venue:"Dallas, USA" },
    { match:86, home:"Winner Group J", away:"Runner-up Group H",   date:"2026-07-03", time:"23:00", venue:"Miami, USA" },
    { match:87, home:"Winner Group K", away:"3rd Group D/E/I/J/L", date:"2026-07-04", time:"02:30", venue:"Kansas City, USA" },
  ];
  const r32 = R32_SLOTS.map((slot,i) => ({
    id: `r32-${i+1}`, round:"r32", fifaMatch: slot.match,
    home: slot.home, away: slot.away,
    // slotHome/slotAway always hold the OFFICIAL bracket descriptor for this match number,
    // regardless of whether `home`/`away` were pre-filled with a confirmed team name above —
    // this is what auto-sync and structural validation check against, so it must never be
    // overwritten with a team name even when one is already known at setup time.
    slotHome: OFFICIAL_R32_STRUCTURE[slot.match]?.[0] || slot.home,
    slotAway: OFFICIAL_R32_STRUCTURE[slot.match]?.[1] || slot.away,
    date: slot.date, time: slot.time, venue: slot.venue,
    result: null,
  }));
  const r16 = Array.from({length:8}, (_,i) => ({
    id: `r16-${i+1}`, round:"r16",
    home: "TBC", away: "TBC",
    homeFrom: `r32-${i*2+1}`, awayFrom: `r32-${i*2+2}`,
    date:"", time:"", venue:"", result: null,
  }));
  const qf = Array.from({length:4}, (_,i) => ({
    id: `qf-${i+1}`, round:"qf",
    home: "TBC", away: "TBC",
    homeFrom: `r16-${i*2+1}`, awayFrom: `r16-${i*2+2}`,
    date:"", time:"", venue:"", result: null,
  }));
  const sf = Array.from({length:2}, (_,i) => ({
    id: `sf-${i+1}`, round:"sf",
    home: "TBC", away: "TBC",
    homeFrom: `qf-${i*2+1}`, awayFrom: `qf-${i*2+2}`,
    date:"", time:"", venue:"", result: null,
  }));
  const f = [
    {
      id: `f-1`, round:"f", fifaMatch: 104,
      home: "TBC", away: "TBC",
      homeFrom: `sf-1`, awayFrom: `sf-2`,
      date:"2026-07-19", time:"15:00", venue:"East Rutherford, NJ", result: null,
    },
    {
      id: `f-2`, round:"f", fifaMatch: 103, isThirdPlace: true,
      home: "TBC", away: "TBC",
      homeFromLoser: `sf-1`, awayFromLoser: `sf-2`,
      date:"2026-07-18", time:"22:00", venue:"Miami Gardens, FL", result: null,
    },
  ];
  return { r32, r16, qf, sf, f, _seedVersion: BRACKET_SEED_VERSION };
}

// If the bracket loaded from Supabase was seeded by an older version of this file
// (e.g. before a team name or date was corrected), re-apply the current hardcoded
// R32 data over it — but only for fields that haven't been overtaken by real progress.
// Specifically: a placeholder slot (still "Winner Group X" etc) gets the fresh seed's
// home/away/date/time/venue; a slot that already has a confirmed team name or a result
// is left untouched, so nothing the admin or auto-sync has already filled in is lost.
function reseedBracketIfStale(savedBracket) {
  const currentVersion = savedBracket?._seedVersion || 0;
  if (currentVersion >= BRACKET_SEED_VERSION) {
    console.log(`📋 Bracket already at seed v${currentVersion}, no reseed needed`);
    return savedBracket;
  }
  console.log(`📋 Reseeding bracket: v${currentVersion} → v${BRACKET_SEED_VERSION}`);

  // Rebuild R32 entirely fresh from code rather than trying to merge into whatever's
  // stored — earlier versions of this app saved inconsistent/corrupted intermediate
  // states (missing fields, duplicated entries from a failed merge), and patching
  // those piecemeal kept producing new bugs. A clean rebuild is the only fully
  // reliable fix. The only thing worth preserving from the old data is a RESULT —
  // and only when we can match it unambiguously by fifaMatch number.
  const fresh = buildInitialBracket();
  const oldResultsByMatch = {};
  (savedBracket?.r32 || []).forEach(m => {
    if (m.result && m.fifaMatch) oldResultsByMatch[m.fifaMatch] = m.result;
  });
  fresh.r32.forEach(m => {
    if (oldResultsByMatch[m.fifaMatch]) m.result = oldResultsByMatch[m.fifaMatch];
  });

  // r16/qf/sf: keep whatever was saved (their structure doesn't change between
  // versions) but re-propagate winners through afterwards.
  // f: rebuild fresh if the saved version is missing the third-place playoff match
  // (added in this version) — preserves the championship final's own result if one
  // was already entered, since that match's id (f-1) and meaning haven't changed.
  let fRound = savedBracket?.f || fresh.f;
  if (!fRound.some(m => m.isThirdPlace)) {
    const oldFinalResult = fRound.find(m => m.id === "f-1")?.result || null;
    fRound = fresh.f.map(m => m.id === "f-1" && oldFinalResult ? { ...m, result: oldFinalResult } : m);
  }

  const merged = {
    r32: fresh.r32,
    r16: savedBracket?.r16 || fresh.r16,
    qf: savedBracket?.qf || fresh.qf,
    sf: savedBracket?.sf || fresh.sf,
    f: fRound,
    _seedVersion: BRACKET_SEED_VERSION,
  };
  console.log(`📋 Reseed complete — R32 rebuilt fresh, ${Object.keys(oldResultsByMatch).length} result(s) carried over`);
  return propagateBracket(merged);
}

// Given a match's homeGoals/awayGoals (90-min only, no ET/pens here),
// the admin records the actual winner separately if it went to extra time/pens.
// True if a team slot still holds a bracket descriptor (e.g. "Winner Group A",
// "Runner-up Group B", "3rd Group C/D/F/G/H") rather than a confirmed team name.
// ══════════════════════════════════════════════════════════════════
// GROUP STAGE DATA — the 12 confirmed groups (final draw, 5 Dec 2025 +
// March 2026 playoff winners). Used to derive each group's standing
// from ESPN's group-stage results, so winners/runners-up/3rd-place
// can be filled into the Round of 32 bracket as soon as they're known
// — not just when ESPN happens to publish the R32 fixture itself.
// ══════════════════════════════════════════════════════════════════
const GROUPS = {
  A: ["Mexico","South Africa","South Korea","Czechia"],
  B: ["Canada","Switzerland","Qatar","Bosnia and Herzegovina"],
  C: ["Brazil","Morocco","Haiti","Scotland"],
  D: ["USA","Paraguay","Australia","Turkey"],
  E: ["Germany","Curaçao","Ivory Coast","Ecuador"],
  F: ["Netherlands","Japan","Tunisia","Sweden"],
  G: ["Belgium","Egypt","Iran","New Zealand"],
  H: ["Spain","Cabo Verde","Saudi Arabia","Uruguay"],
  I: ["France","Senegal","Norway","Iraq"],
  J: ["Argentina","Algeria","Austria","Jordan"],
  K: ["Portugal","Uzbekistan","Colombia","DR Congo"],
  L: ["England","Croatia","Ghana","Panama"],
};
const TEAM_TO_GROUP = {};
Object.entries(GROUPS).forEach(([g, teams]) => teams.forEach(t => { TEAM_TO_GROUP[t] = g; }));

async function fetchEspnGroupStandings() {
  // /apis/site/v2/ returns {} for soccer standings — must use /apis/v2/ instead.
  try {
    const r = await fetch("https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings");
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { console.log("ESPN standings fetch failed:", e.message); return null; }
}

// Parses ESPN's standings response into { groupLetter: [{team, pts, gd, gf, played}, ...] }
// sorted by FIFA group tiebreaker order (points, then GD, then GF).
function parseGroupStandings(standingsJson) {
  const groups = {};
  if (!standingsJson) return groups;
  // ESPN nests standings under children (one per group) when a competition has groups.
  const children = standingsJson.children || standingsJson.standings?.entries ? [standingsJson] : (standingsJson.children || []);
  const sourceList = standingsJson.children && standingsJson.children.length ? standingsJson.children : [standingsJson];

  sourceList.forEach(child => {
    const entries = child.standings?.entries || [];
    if (!entries.length) return;
    const rows = entries.map(e => {
      const team = normEspnTeam(e.team?.displayName);
      const stat = (name) => {
        const s = e.stats?.find(x => x.name === name || x.abbreviation === name);
        return s ? parseFloat(s.value ?? s.displayValue) : 0;
      };
      return {
        team,
        pts: stat("points") || stat("PTS"),
        gd: stat("pointDifferential") || stat("GD") || (stat("goalsFor") - stat("goalsAgainst")),
        gf: stat("pointsFor") || stat("goalsFor") || stat("GF"),
        played: stat("gamesPlayed") || stat("GP"),
      };
    }).filter(r => r.team);
    if (!rows.length) return;
    // Determine which of our 12 groups this set of teams belongs to
    const groupLetter = TEAM_TO_GROUP[rows[0].team];
    if (!groupLetter) return;
    rows.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
    groups[groupLetter] = rows;
  });
  return groups;
}

// Given parsed group standings, returns { winners: {A:team,...}, runnersUp: {...}, thirds: [{group,team,pts,gd,gf}] }
// Only includes a group once all 4 teams have played all 3 games (played===3), so we never
// lock in a wrong placement on an incomplete table.
function deriveGroupResults(groups) {
  const winners = {}, runnersUp = {}, thirdsRaw = [];
  Object.entries(groups).forEach(([letter, rows]) => {
    if (rows.length < 4) return;
    const allPlayed3 = rows.every(r => r.played >= 3);
    if (!allPlayed3) return;
    winners[letter] = rows[0].team;
    runnersUp[letter] = rows[1].team;
    thirdsRaw.push({ group: letter, team: rows[2].team, pts: rows[2].pts, gd: rows[2].gd, gf: rows[2].gf });
  });
  // FIFA tiebreaker for ranking third-placed teams across groups: points, then GD, then GF.
  thirdsRaw.sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  return { winners, runnersUp, thirds: thirdsRaw };
}

// ══════════════════════════════════════════════════════════════════
// OFFICIAL R32 STRUCTURE — published directly in the FIFA tournament
// regulations (cross-checked against Wikipedia's knockout-stage page).
// Used as a guard rail: before writing any auto-derived team name into
// a slot, we confirm that slot's descriptor matches what FIFA actually
// published for that match number. If our stored slot data ever drifts
// from this (e.g. a typo introduced during setup), the mismatch is
// logged and that slot is skipped rather than silently filled in wrong.
// ══════════════════════════════════════════════════════════════════
const OFFICIAL_R32_STRUCTURE = {
  73: ["Runner-up Group A", "Runner-up Group B"],
  74: ["Winner Group E", "3rd Group A/B/C/D/F"],
  75: ["Winner Group F", "Runner-up Group C"],
  76: ["Winner Group C", "Runner-up Group F"],
  77: ["Winner Group I", "3rd Group C/D/F/G/H"],
  78: ["Runner-up Group E", "Runner-up Group I"],
  79: ["Winner Group A", "3rd Group C/E/F/H/I"],
  80: ["Winner Group L", "3rd Group E/H/I/J/K"],
  81: ["Winner Group D", "3rd Group B/E/F/I/J"],
  82: ["Winner Group G", "3rd Group A/E/H/I/J"],
  83: ["Runner-up Group K", "Runner-up Group L"],
  84: ["Winner Group H", "Runner-up Group J"],
  85: ["Winner Group B", "3rd Group E/F/G/I/J"],
  86: ["Winner Group J", "Runner-up Group H"],
  87: ["Winner Group K", "3rd Group D/E/I/J/L"],
  88: ["Runner-up Group D", "Runner-up Group G"],
};

// Checks a bracket's R32 slots against the official structure. Returns a list of
// any mismatches found — should normally be empty. If non-empty, something is
// wrong with our slot data and it needs fixing before trusting auto-fill results.
function validateR32Structure(bracket) {
  const issues = [];
  (bracket.r32 || []).forEach(m => {
    const official = OFFICIAL_R32_STRUCTURE[m.fifaMatch];
    if (!official) { issues.push(`Match ${m.fifaMatch}: no official record for this match number`); return; }
    if (m.slotHome !== official[0] || m.slotAway !== official[1]) {
      issues.push(`Match ${m.fifaMatch}: stored slot "${m.slotHome} vs ${m.slotAway}" does not match official "${official[0]} vs ${official[1]}"`);
    }
  });
  return issues;
}

// Formats a stored "YYYY-MM-DD" date string as "Sat 28 Jun" for display throughout the app.
function fmtMatchDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00Z");
  if (isNaN(d)) return dateStr;
  const day = d.toLocaleDateString("en-GB", {weekday:"short", timeZone:"UTC"});
  const date = d.getUTCDate();
  const month = d.toLocaleDateString("en-GB", {month:"short", timeZone:"UTC"});
  return `${day} ${date} ${month}`;
}

// Formats a stored deadline (datetime-local string, e.g. "2026-06-28T19:00") as
// "Sat 28 Jun, 19:00" in the user's local time for display in the Predict tab.
function fmtDeadline(dtStr) {
  if (!dtStr) return "";
  const d = new Date(dtStr);
  if (isNaN(d)) return dtStr;
  const day = d.toLocaleDateString("en-GB", {weekday:"short"});
  const date = d.getDate();
  const month = d.toLocaleDateString("en-GB", {month:"short"});
  const time = d.toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"});
  return `${day} ${date} ${month}, ${time}`;
}

function isPlaceholderTeam(name) {
  if (!name) return true;
  if (name === "TBC") return true;
  // Our own internal placeholder format: "Winner Group X", "Runner-up Group X", "3rd Group A/B/..."
  if (name.startsWith("Winner ") || name.startsWith("Runner") || name.includes("3rd")) return true;
  // ESPN's own placeholder phrasing for not-yet-determined teams in scheduled fixtures —
  // e.g. "Group F 2nd Place", "Group C Winner", "Winner Match 76" — these slip through our
  // own format check above since they don't match our exact wording, but they're just as
  // much a placeholder as ours and must never be treated as a real, predictable team.
  if (/\b(Winner|Runner.?up|\d(st|nd|rd|th)\s*Place)\b/i.test(name) && /\bGroup\b|\bMatch\b/i.test(name)) return true;
  if (/^(TBD|To Be Determined|To Be Confirmed)$/i.test(name)) return true;
  return false;
}

function matchWinner(m) {
  if (!m.result) return null;
  if (m.result.winner) return m.result.winner; // explicit winner (covers ET/pens draws)
  if (m.result.homeGoals > m.result.awayGoals) return m.home;
  if (m.result.awayGoals > m.result.homeGoals) return m.away;
  return null; // genuinely unresolved (shouldn't happen in knockout)
}

// The losing team of a finished match — used only for the third-place playoff,
// which is contested between the two losing semi-finalists rather than winners.
function matchLoser(m) {
  const w = matchWinner(m);
  if (!w) return null;
  return w === m.home ? m.away : m.home;
}

// After results are entered, propagate winners into the next round's slots
function propagateBracket(bracket) {
  const b = JSON.parse(JSON.stringify(bracket));
  ROUND_ORDER.forEach((rnd, idx) => {
    if (idx === 0) return;
    const prevRound = ROUND_ORDER[idx-1];
    const prevMatches = b[prevRound];
    b[rnd].forEach(m => {
      if (m.homeFrom) {
        const src = prevMatches.find(x => x.id === m.homeFrom);
        const w = src ? matchWinner(src) : null;
        if (w) m.home = w;
      }
      if (m.awayFrom) {
        const src = prevMatches.find(x => x.id === m.awayFrom);
        const w = src ? matchWinner(src) : null;
        if (w) m.away = w;
      }
      // Third-place playoff: pulls the LOSER of each semi-final instead of the winner.
      if (m.homeFromLoser) {
        const src = prevMatches.find(x => x.id === m.homeFromLoser);
        const l = src ? matchLoser(src) : null;
        if (l) m.home = l;
      }
      if (m.awayFromLoser) {
        const src = prevMatches.find(x => x.id === m.awayFromLoser);
        const l = src ? matchLoser(src) : null;
        if (l) m.away = l;
      }
    });
  });
  return b;
}

// ══════════════════════════════════════════════════════════════════
// ESPN AUTO-SYNC — pulls real team names and results for World Cup
// knockout matches. ESPN's soccer scoreboard doesn't tag events with
// a "Match 73" style bracket-slot number for this competition, so we
// match each ESPN event to one of our 16 pre-defined R32 slots using
// date + venue together — every official R32 fixture has a unique
// date/venue combination even on days with multiple kickoffs, which a
// date-only match could not disambiguate. R16 onward, slots already
// have confirmed teams from propagation, so we match by team pair instead.
// ══════════════════════════════════════════════════════════════════
const ESPN_TEAM_MAP = {
  "United States":"USA", "USA":"USA", "Korea Republic":"South Korea", "Korea":"South Korea", "South Korea":"South Korea",
  "Côte d'Ivoire":"Ivory Coast", "Cote d'Ivoire":"Ivory Coast", "Ivory Coast":"Ivory Coast",
  "DR Congo":"DR Congo", "Congo DR":"DR Congo", "Democratic Republic of the Congo":"DR Congo",
  "Czech Republic":"Czechia", "Czechia":"Czechia", "Cabo Verde":"Cabo Verde", "Cape Verde":"Cabo Verde",
  "Bosnia and Herzegovina":"Bosnia and Herzegovina", "Bosnia-Herzegovina":"Bosnia and Herzegovina",
  "England":"England", "Scotland":"Scotland",
  "Türkiye":"Turkey", "Turkiye":"Turkey", "Turkey":"Turkey",
  "Curaçao":"Curaçao", "Curacao":"Curaçao",
};
function normEspnTeam(name) {
  if (!name) return name;
  return ESPN_TEAM_MAP[name] || name;
}

async function fetchEspnWorldCupEvents(dateFrom, dateTo) {
  const fmt = d => d.toISOString().split("T")[0].replace(/-/g,"");
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${fmt(dateFrom)}-${fmt(dateTo)}&limit=100`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const d = await r.json();
    return d.events || [];
  } catch(e) { console.log("ESPN fetch failed:", e.message); return []; }
}

function parseEspnEvent(ev) {
  const comp = ev.competitions?.[0];
  if (!comp) return null;
  const competitors = comp.competitors || [];
  const home = competitors.find(c => c.homeAway === "home");
  const away = competitors.find(c => c.homeAway === "away");
  if (!home || !away) return null;
  const homeTeam = normEspnTeam(home.team?.displayName);
  const awayTeam = normEspnTeam(away.team?.displayName);
  if (!homeTeam || !awayTeam) return null;
  const completed = comp.status?.type?.completed === true || comp.status?.type?.state === "post";
  let result = null;

  // 90-minute score only — ET/penalty goals never count toward predictions. ESPN's plain
  // `score` field is the cumulative/final score across ALL periods played (so it includes
  // extra-time goals if the match went there). `linescores` breaks the score down per period
  // (each soccer half is its own entry), so summing just the first two periods gives the
  // strict 90-minute score regardless of what happened afterwards. Falls back to the plain
  // score field only if linescores aren't present (covers the vast majority of matches that
  // never reach extra time, where both numbers are identical anyway).
  const regulationScore = (competitor) => {
    const ls = competitor.linescores;
    if (Array.isArray(ls) && ls.length >= 2) {
      const h1 = parseFloat(ls[0]?.value ?? ls[0]?.displayValue);
      const h2 = parseFloat(ls[1]?.value ?? ls[1]?.displayValue);
      if (!isNaN(h1) && !isNaN(h2)) return h1 + h2;
    }
    return parseInt(competitor.score);
  };

  if (completed && home.score != null && away.score != null) {
    const h = regulationScore(home), a = regulationScore(away);
    if (!isNaN(h) && !isNaN(a)) {
      result = { homeGoals: h, awayGoals: a };

      // Full-time score (includes extra time if played) and penalty score, kept separately
      // from the 90-minute score above — these are for DISPLAY only, never used in scoring
      // predictions. fullTimeGoals === homeGoals/awayGoals whenever the match didn't go
      // past 90 minutes, so this only differs when ET was actually played.
      const fh = parseInt(home.score), fa = parseInt(away.score);
      if (!isNaN(fh) && !isNaN(fa) && (fh !== h || fa !== a)) {
        result.fullTimeGoals = { home: fh, away: fa };
      }
      const homePens = parseInt(home.shootoutScore), awayPens = parseInt(away.shootoutScore);
      if (!isNaN(homePens) && !isNaN(awayPens)) {
        result.penalties = { home: homePens, away: awayPens };
      }

      // Knockout matches can't draw — if the 90-minute score is level, ESPN's shootout data
      // (if present) tells us who actually advanced. Without it, admin sets the winner manually.
      // Note: a match that finished in extra time (no shootout) will also show level here at
      // 90 minutes even though someone won outright — same manual-winner fallback applies.
      if (h === a) {
        const shootoutWinner = comp.competitors?.find(c => c.shootoutScore != null &&
          parseInt(c.shootoutScore) === Math.max(...competitors.map(x => parseInt(x.shootoutScore)||0)));
        if (shootoutWinner) result.winner = normEspnTeam(shootoutWinner.team?.displayName);
      }
    }
  }
  const evDate = ev.date ? new Date(ev.date) : null;
  return { homeTeam, awayTeam, result, date: evDate, venue: comp.venue?.fullName || comp.venue?.address?.city || "" };
}

// Sync ESPN data into the bracket. Returns {bracket, changed} where changed=true if anything updated.
async function syncEspnIntoBracket(bracket) {
  let changed = false;
  let nb = JSON.parse(JSON.stringify(bracket));
  const validationIssues = [];
  let groupStatus = null;

  // ── STEP 0: validate our R32 slot data against FIFA's officially published structure ──
  // If anything doesn't line up, we skip auto-filling that match entirely rather than
  // risk writing a team into the wrong slot — admin is alerted via the returned issues.
  const structuralIssues = validateR32Structure(nb);
  if (structuralIssues.length) {
    console.log("⚠️ R32 structure validation issues:", structuralIssues);
    validationIssues.push(...structuralIssues);
  }
  const badMatchNumbers = new Set(
    structuralIssues.map(i => parseInt(i.match(/Match (\d+):/)?.[1])).filter(n => !isNaN(n))
  );

  // ── STEP 1: derive group winners/runners-up/best-8-thirds and fill bracket descriptors ──
  // This works as soon as a group finishes (all 4 teams played 3 games), independent of
  // whether ESPN has created an R32 fixture event yet — mirrors how FIFA's own bracket
  // and Bing/Sky's coverage show confirmed names ahead of the fixture being scheduled.
  try {
    const standingsJson = await fetchEspnGroupStandings();
    const groups = parseGroupStandings(standingsJson);
    const { winners, runnersUp, thirds } = deriveGroupResults(groups);
    // Kept for the admin status panel (shows current best-8 third-place standings) —
    // NOT used to auto-resolve third-place bracket slots, see resolveDescriptor below.
    const best8Groups = new Set(thirds.slice(0, 8).map(t => t.group));
    const thirdByGroup = {}; thirds.forEach(t => { thirdByGroup[t.group] = t.team; });
    groupStatus = { winners, runnersUp, thirds, best8: [...best8Groups] };

    // Resolve a bracket-slot descriptor string ("Winner Group C", "Runner-up Group F") into a
    // real team name when we can derive it directly from the group table — this is safe and
    // exact for winners and runners-up.
    //
    // Third-place slots ("3rd Group A/B/C/D/F") are intentionally NOT auto-resolved here.
    // We tested this: even with all 12 groups fully known, there is no per-slot shortcut —
    // verified by checking every one of the 495 possible 8-of-12 qualifying combinations,
    // every single one leaves at least one slot with more than one candidate group still
    // "in the running" by a naive reading. FIFA's real assignment comes from a fixed
    // 495-row lookup table (Annex C of the competition regulations) chosen in advance to
    // avoid group-stage rematches — guessing from standings alone would risk putting a
    // team in the wrong match. Rather than risk a wrong guess, these 8 slots are always
    // left for admin to fill in by hand once FIFA/ESPN publish the actual fixture — at
    // that point Step 2 below (date+venue fixture matching) picks them up correctly.
    const resolveDescriptor = (desc) => {
      if (!desc || !isPlaceholderTeam(desc)) return null;
      let m = desc.match(/^Winner Group ([A-L])$/);
      if (m) return winners[m[1]] || null;
      m = desc.match(/^Runner-up Group ([A-L])$/);
      if (m) return runnersUp[m[1]] || null;
      return null; // 3rd-place slots: intentionally unresolved, see note above
    };

    ["r32"].forEach(rnd => {
      nb[rnd].forEach(match => {
        if (badMatchNumbers.has(match.fifaMatch)) return; // skip — structure mismatch, needs manual review
        const newHome = resolveDescriptor(match.slotHome);
        if (newHome && isPlaceholderTeam(match.home)) { match.home = newHome; changed = true; }
        const newAway = resolveDescriptor(match.slotAway);
        if (newAway && isPlaceholderTeam(match.away)) { match.away = newAway; changed = true; }
      });
    });
  } catch(e) { console.log("Group standings derivation failed:", e.message); }

  // ── STEP 2: match ESPN's scheduled/live/finished fixtures for results + as a fallback
  // for team names once ESPN itself publishes the R32/R16/etc fixture ──
  const from = new Date("2026-06-27");
  const to = new Date("2026-07-20");
  const events = await fetchEspnWorldCupEvents(from, to);
  if (!events.length) return { bracket: changed ? propagateBracket(nb) : bracket, changed, validationIssues, groupStatus };

  const parsed = events.map(parseEspnEvent).filter(Boolean);
  console.log(`📡 ESPN sync: fetched ${events.length} raw events, parsed ${parsed.length} valid fixtures`);
  parsed.forEach(p => console.log(`  · ${p.homeTeam} vs ${p.awayTeam} | venue: "${p.venue}" | date: ${p.date?.toISOString()} | result: ${p.result ? JSON.stringify(p.result) : 'none yet'}`));

  // Venue full names (as ESPN reports them) → the city label we store on each slot.
  // R32 venue list per official FIFA schedule; only these 14 are used in this round.
  const VENUE_CITY_MAP = {
    "SoFi Stadium":"Los Angeles, USA", "NRG Stadium":"Houston, USA",
    "Gillette Stadium":"Boston, USA", "Estadio BBVA":"Monterrey, Mexico",
    "AT&T Stadium":"Dallas, USA", "MetLife Stadium":"New Jersey, USA",
    "Estadio Azteca":"Mexico City, Mexico", "Mercedes-Benz Stadium":"Atlanta, USA",
    "Lumen Field":"Seattle, USA", "Levi's Stadium":"San Francisco, USA",
    "BMO Field":"Toronto, Canada", "BC Place":"Vancouver, Canada",
    "Hard Rock Stadium":"Miami, USA", "Arrowhead Stadium":"Kansas City, USA",
  };
  const venueCity = (fullName) => VENUE_CITY_MAP[fullName] || fullName;

  ROUND_ORDER.forEach(rnd => {
    nb[rnd].forEach(m => {
      let match = null;

      if (rnd === "r32") {
        // R32 slots share dates across multiple matches, but date+venue together
        // is unique for all 16 official fixtures — use both to avoid misassigning
        // a placeholder slot to the wrong match on a multi-game day. No loose substring
        // fallback here on purpose — a fuzzy "venue contains city name" check previously
        // risked matching an unrelated/stale ESPN event that happened to share a city
        // name, which silently wrote a wrong score into a match that hadn't been played.
        match = parsed.find(p => {
          if (!p.date || !m.date) return false;
          const sameDate = p.date.toISOString().split("T")[0] === new Date(m.date + "T00:00:00Z").toISOString().split("T")[0];
          if (!sameDate) return false;
          return venueCity(p.venue) === m.venue;
        });
      } else {
        // R16 onward: both teams are already confirmed via propagation, so match by team pair.
        if (!isPlaceholderTeam(m.home) && !isPlaceholderTeam(m.away)) {
          match = parsed.find(p =>
            (p.homeTeam === m.home && p.awayTeam === m.away) ||
            (p.homeTeam === m.away && p.awayTeam === m.home)
          );
        }
      }

      if (!match) {
        if (rnd === "r32" && (isPlaceholderTeam(m.home) || isPlaceholderTeam(m.away))) {
          console.log(`📡 No ESPN match found yet for Match ${m.fifaMatch} (${m.slotHome} vs ${m.slotAway}) — looking for venue "${m.venue}" on ${m.date}`);
        }
        return;
      }

      // Fill in real team names if this slot still shows a placeholder
      if (isPlaceholderTeam(m.home) && match.homeTeam) { m.home = match.homeTeam; changed = true; }
      if (isPlaceholderTeam(m.away) && match.awayTeam) { m.away = match.awayTeam; changed = true; }

      // Safety check: only trust a result if the matched ESPN event's teams actually line
      // up with this match's teams now that names are filled in. This is a second,
      // independent guard against a date+venue mismatch silently attaching the wrong
      // score to a match that hasn't been played — if the teams don't agree, something's
      // off with the match-up and we skip the result entirely rather than risk it.
      const teamsAgree = !isPlaceholderTeam(m.home) && !isPlaceholderTeam(m.away) &&
        ((match.homeTeam === m.home && match.awayTeam === m.away) ||
         (match.homeTeam === m.away && match.awayTeam === m.home));

      if (teamsAgree) {
        // Fill in the result once the match has finished
        if (match.result && !m.result) { m.result = match.result; changed = true; }
        else if (match.result && m.result &&
          (m.result.homeGoals !== match.result.homeGoals || m.result.awayGoals !== match.result.awayGoals)) {
          m.result = match.result; changed = true; // correct a previous in-progress score
        }
      }
    });
  });

  return { bracket: changed ? propagateBracket(nb) : bracket, changed, validationIssues, groupStatus };
}

function scorePrediction(pred, result, round) {
  if (!pred || !result || result.homeGoals==null || result.awayGoals==null) return 0;
  if (pred.homeGoals==null || pred.awayGoals==null) return 0;
  const exactPts = ROUND_POINTS[round] || 3;
  if (pred.homeGoals===result.homeGoals && pred.awayGoals===result.awayGoals) return exactPts;
  const predOutcome = Math.sign(pred.homeGoals - pred.awayGoals); // -1, 0, 1
  const resOutcome = Math.sign(result.homeGoals - result.awayGoals);
  if (predOutcome === resOutcome) return 1; // correct result, flat 1pt regardless of round
  return 0;
}

const DEFAULT_PIN = "0000";

function LoginScreen({players, pins, setPins, onLogin, toast_}) {
  const [step, setStep] = useState("name"); // name | pin | setpin | confirmpin
  const [selected, setSelected] = useState(null);
  const [pinDraft, setPinDraft] = useState("");
  const [newPin, setNewPin] = useState("");      // first entry of the new PIN
  const [confirmPin, setConfirmPin] = useState(""); // re-entry to confirm

  const choosePlayer = (p) => { setSelected(p); setPinDraft(""); setStep("pin"); };
  const digit = (n) => {
    if (step === "pin" && pinDraft.length < 4) setPinDraft(pinDraft + n);
    if (step === "setpin" && newPin.length < 4) setNewPin(newPin + n);
    if (step === "confirmpin" && confirmPin.length < 4) setConfirmPin(confirmPin + n);
  };
  const backspace = () => {
    if (step === "pin") setPinDraft(pinDraft.slice(0,-1));
    if (step === "setpin") setNewPin(newPin.slice(0,-1));
    if (step === "confirmpin") setConfirmPin(confirmPin.slice(0,-1));
  };

  const effectivePin = (p) => pins[p] || DEFAULT_PIN; // unset players default to 0000

  useEffect(() => {
    if (step === "pin" && pinDraft.length === 4 && selected) {
      if (effectivePin(selected) === pinDraft) {
        if (!pins[selected]) {
          // Logging in on the default PIN for the first time — force them to set their own
          setStep("setpin"); setNewPin(""); setConfirmPin("");
          toast_("Set your own PIN to finish logging in");
        } else {
          onLogin(selected);
        }
      } else {
        toast_("Incorrect PIN","error"); setTimeout(()=>setPinDraft(""), 400);
      }
    }
  }, [pinDraft]);

  useEffect(() => {
    if (step === "setpin" && newPin.length === 4) {
      setStep("confirmpin");
    }
  }, [newPin]);

  useEffect(() => {
    if (step === "confirmpin" && confirmPin.length === 4) {
      if (confirmPin === newPin) {
        const updated = { ...pins, [selected]: newPin };
        setPins(updated);
        supa.setState("pins", updated).catch(()=>{});
        toast_(`✅ PIN set — welcome, ${selected}!`);
        onLogin(selected);
      } else {
        toast_("PINs didn't match — try again","error");
        setTimeout(()=>{ setStep("setpin"); setNewPin(""); setConfirmPin(""); }, 500);
      }
    }
  }, [confirmPin]);

  if (step === "name") return (
    <div className="fade-in">
      <div style={{textAlign:"center", marginBottom:18}}>
        <div style={{fontSize:13, color:C.chalkDim}}>Who's predicting?</div>
      </div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
        {players.map(p=>(
          <button key={p} onClick={()=>choosePlayer(p)}
            style={{padding:"16px 10px", background:C.bgCard, border:`1px solid ${C.line}`, borderRadius:12,
              color:playerColour(p), fontWeight:800, fontSize:15, cursor:"pointer"}}>
            {p}
          </button>
        ))}
      </div>
      <div style={{textAlign:"center", marginTop:18, fontSize:11, color:C.chalkFaint}}>
        First time? Tap your name — your PIN starts as 0000 and you'll set your own right after.
      </div>
    </div>
  );

  const isPinEntry = step === "pin";
  const isSetPin = step === "setpin";
  const draft = isPinEntry ? pinDraft : isSetPin ? newPin : confirmPin;
  const heading = isPinEntry ? "Enter your 4-digit PIN" : isSetPin ? "Choose a new 4-digit PIN" : "Re-enter your new PIN to confirm";

  return (
    <div className="fade-in" style={{textAlign:"center"}}>
      <div style={{color:playerColour(selected), fontWeight:800, fontSize:18, marginBottom:4}}>{selected}</div>
      <div style={{color:C.chalkDim, fontSize:12, marginBottom:18}}>{heading}</div>
      <div style={{display:"flex", justifyContent:"center", gap:8, marginBottom:24}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:44,height:54,borderRadius:10,background:C.bgInput,
            border:`1px solid ${C.line}`, display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:22,color:C.gold,fontWeight:800}}>
            {draft[i] ? "•" : ""}
          </div>
        ))}
      </div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, maxWidth:260, margin:"0 auto"}}>
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} onClick={()=>digit(String(n))}
            style={{padding:"16px 0", background:C.bgCard, border:`1px solid ${C.line}`, borderRadius:10,
              color:C.chalk, fontSize:18, fontWeight:700, cursor:"pointer"}}>{n}</button>
        ))}
        <button onClick={()=>{setStep("name"); setPinDraft(""); setNewPin(""); setConfirmPin("");}}
          style={{padding:"16px 0", background:"transparent", border:"none", color:C.chalkDim, fontSize:13}}>Back</button>
        <button onClick={()=>digit("0")} style={{padding:"16px 0", background:C.bgCard, border:`1px solid ${C.line}`, borderRadius:10, color:C.chalk, fontSize:18, fontWeight:700, cursor:"pointer"}}>0</button>
        <button onClick={backspace} style={{padding:"16px 0", background:"transparent", border:"none", color:C.chalkDim, fontSize:18}}>⌫</button>
      </div>
      {isPinEntry && !pins[selected] && (
        <div style={{marginTop:16, fontSize:11, color:C.chalkFaint}}>Default PIN is 0000 if you haven't set your own yet</div>
      )}
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [bracket, setBracket] = useState(buildInitialBracket());
  const [predictions, setPredictions] = useState({});
  const [reveals, setReveals] = useState({});
  const [pins, setPins] = useState({});
  const [players, setPlayers] = useState(DEFAULT_PLAYERS);
  const [me, setMe] = useState(()=>{try{return localStorage.getItem("wc26_me")||null;}catch{return null;}});
  const [admin, setAdmin] = useState(false);
  const [tab, setTab] = useState("predict");
  const [showAdminDirect, setShowAdminDirect] = useState(false);
  const [toast, setToast] = useState(null);
  const [tournamentLabel, setTournamentLabel] = useState("World Cup 2026");
  const [entryFees, setEntryFees] = useState({});
  const ENTRY_FEE = 10; // £10 per person, winner takes all

  const toast_ = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null), 3200); };

  // Initial load from Supabase
  useEffect(() => {
    (async () => {
      try {
        const [b, preds, rv, p, pc, lbl, ef, dl, mu] = await Promise.all([
          supa.getState("bracket").catch(()=>null),
          supa.getState("predictions").catch(()=>null),
          supa.getState("reveals").catch(()=>null),
          supa.getState("pins").catch(()=>null),
          supa.getState("player_config").catch(()=>null),
          supa.getState("label").catch(()=>null),
          supa.getState("entry_fees").catch(()=>null),
          supa.getState("deadlines").catch(()=>null),
          supa.getState("manually_unlocked").catch(()=>null),
        ]);
        if (b) {
          const reseeded = reseedBracketIfStale(b);
          setBracket(reseeded);
          if (reseeded !== b) {
            await supa.setState("bracket", reseeded).catch(()=>{});
            console.log("📋 Bracket reseeded with updated fixture data (v"+BRACKET_SEED_VERSION+")");
          }
        } else {
          const fresh = buildInitialBracket();
          setBracket(fresh);
          await supa.setState("bracket", fresh).catch(()=>{});
        }
        if (preds) setPredictions(preds);
        if (rv) setReveals(rv);
        if (p) setPins(p);
        if (pc && pc.players?.length) { setPlayers(pc.players); if(pc.colours) Object.assign(PLAYER_COLOURS, pc.colours); }
        if (lbl) setTournamentLabel(lbl);
        if (ef) setEntryFees(ef);
        if (dl) setDeadlines(dl);
        if (mu) setManuallyUnlocked(mu);
      } catch(e) { console.log("Initial load failed:", e.message); }
      setLoading(false);
    })();
  }, []);

  const saveBracket = async (newBracket) => {
    const propagated = propagateBracket(newBracket);
    setBracket(propagated);
    await supa.setState("bracket", propagated).catch(e=>toast_("Save failed: "+e.message,"error"));
  };

  const savePredictions = async (newPreds) => {
    setPredictions(newPreds);
    await supa.setState("predictions", newPreds).catch(e=>toast_("Save failed: "+e.message,"error"));
  };

  const [espnSyncing, setEspnSyncing] = useState(false);
  const [lastSyncInfo, setLastSyncInfo] = useState(null); // { time, groupsFinished, error }
  const [deadlines, setDeadlines] = useState({}); // { r32: "2026-06-28T19:00", ... } — admin-set, datetime-local format
  const [manuallyUnlocked, setManuallyUnlocked] = useState({}); // { r32: true } once admin unlocks after auto-lock — suppresses re-locking
  const [groupStatus, setGroupStatus] = useState(null);
  const refreshFromEspn = async (silent=false) => {
    setEspnSyncing(true);
    try {
      const { bracket: updated, changed, validationIssues, groupStatus: gs } = await syncEspnIntoBracket(bracket);
      if (gs) setGroupStatus(gs);
      setLastSyncInfo({ time: new Date(), groupsFinished: gs?.thirds?.length ?? null, error: null });
      if (changed) {
        setBracket(updated);
        await supa.setState("bracket", updated).catch(()=>{});
        if (!silent) toast_("✅ Fixtures updated from ESPN");
      } else if (!silent) {
        toast_("No new updates from ESPN yet");
      }
      // Validation issues are surfaced even on a silent background sync — a structure
      // mismatch is a real data problem the admin needs to know about, not a routine update.
      if (validationIssues && validationIssues.length) {
        toast_(`⚠️ ${validationIssues.length} fixture(s) skipped — slot data doesn't match FIFA's official structure. Check Admin.`, "error");
      }
    } catch(e) {
      setLastSyncInfo({ time: new Date(), groupsFinished: null, error: e.message });
      if (!silent) toast_("ESPN refresh failed: "+e.message, "error");
    }
    setEspnSyncing(false);
  };

  // Auto-sync from ESPN once on load, then every 5 minutes while the app is open
  useEffect(() => {
    if (loading) return;
    refreshFromEspn(true);
    const interval = setInterval(() => refreshFromEspn(true), 5*60*1000);
    return () => clearInterval(interval);
  }, [loading]);

  // Auto-lock a round once its admin-set deadline passes. Skips any round that's
  // already locked, has no deadline set, or was manually unlocked by admin after a
  // previous auto-lock — once admin unlocks a round, the app never re-locks it on
  // its own; only another manual admin action can lock it again from that point on.
  useEffect(() => {
    if (loading) return;
    const checkDeadlines = () => {
      const now = new Date();
      let changed = false;
      const nr = { ...reveals };
      ROUND_ORDER.forEach(r => {
        if (nr[r]) return; // already locked
        if (manuallyUnlocked[r]) return; // admin unlocked it — leave it alone
        const dl = deadlines[r];
        if (!dl) return; // no deadline set yet
        if (new Date(dl) <= now) { nr[r] = true; changed = true; }
      });
      if (changed) {
        setReveals(nr);
        supa.setState("reveals", nr).catch(()=>{});
      }
    };
    checkDeadlines();
    const interval = setInterval(checkDeadlines, 60*1000); // check every minute
    return () => clearInterval(interval);
  }, [loading, deadlines, manuallyUnlocked, reveals]);

  const loginAs = (name) => { setMe(name); try{localStorage.setItem("wc26_me",name);}catch{} };
  const logout = () => { setMe(null); try{localStorage.removeItem("wc26_me");}catch{} };

  if (loading) {
    return (
      <div style={{...S.page, display:"flex", alignItems:"center", justifyContent:"center"}}>
        <div style={{textAlign:"center"}}>
          <div style={{marginBottom:14, display:"flex", justifyContent:"center", animation:"pulseGold 1.4s ease-in-out infinite"}}><BallMark size={48}/></div>
          <div style={{color:C.chalkDim, fontSize:13, fontFamily:"'JetBrains Mono',monospace"}}>Loading bracket…</div>
        </div>
      </div>
    );
  }

  return (
    <div style={S.page}>
      <Toast msg={toast?.msg} type={toast?.type}/>
      <div style={S.header}>
        <BallMark size={38}/>
        <div>
          <div style={S.logo}>HPL<br/><span style={S.logoAccent}>WORLD CUP</span> PREDICTIONS</div>
          <div style={S.sub}>{tournamentLabel} · Round of 32 → Final</div>
        </div>
      </div>

      <div style={{padding:"14px 14px 0"}}>
        {showAdminDirect ? (
          <>
            <div style={{display:"flex", justifyContent:"flex-end", marginBottom:10}}>
              <button onClick={()=>setShowAdminDirect(false)} style={S.btnGhost}>← Back to player login</button>
            </div>
            <AdminTab bracket={bracket} saveBracket={saveBracket} reveals={reveals} setReveals={setReveals}

              toast_={toast_} tournamentLabel={tournamentLabel} setTournamentLabel={setTournamentLabel} predictions={predictions} setPredictions={setPredictions}

            <LoginScreen players={players} pins={pins} setPins={setPins} onLogin={loginAs} toast_={toast_}/>
            <div style={{textAlign:"center", marginTop:24}}>
              <button onClick={()=>setShowAdminDirect(true)} style={{...S.btnGhost, fontSize:12}}>⚙️ Admin access</button>

                <span style={{color:playerColour(me), fontWeight:800, fontSize:15}}>{me}</span>

            {tab==="bracket" && <BracketTab bracket={bracket}/>}
            {tab==="results" && <ResultsTab bracket={bracket} predictions={predictions} reveals={reveals} players={players}/>}
            {tab==="progress" && <ProgressTab bracket={bracket} predictions={predictions} reveals={reveals} players={players} entryFees={entryFees} ENTRY_FEE={ENTRY_FEE} deadlines={deadlines}/>}
            {tab==="admin" && <AdminTab bracket={bracket} saveBracket={saveBracket} reveals={reveals} setReveals={setReveals}
              players={players} setPlayers={setPlayers} pins={pins} setPins={setPins} admin={admin} setAdmin={setAdmin}
              toast_={toast_} tournamentLabel={tournamentLabel} setTournamentLabel={setTournamentLabel} predictions={predictions} setPredictions={setPredictions}
              entryFees={entryFees} setEntryFees={setEntryFees} ENTRY_FEE={ENTRY_FEE} refreshFromEspn={refreshFromEspn} espnSyncing={espnSyncing} groupStatus={groupStatus} deadlines={deadlines} setDeadlines={setDeadlines} manuallyUnlocked={manuallyUnlocked} setManuallyUnlocked={setManuallyUnlocked} lastSyncInfo={lastSyncInfo}/>}
          </>

      {me && (
        <div style={S.tabBar}>
          {[["predict","🎯","Predict"],["bracket","🏆","Fixtures"],["results","📊","Results"],["progress","📈","Progress"],["admin","⚙️","Admin"]].map(([id,icon,label])=>(
            <div key={id} onClick={()=>setTab(id)} style={{...S.tab, background: tab===id?C.goldDim:"transparent", color: tab===id?C.blue:C.chalkDim}}>
              <div style={{fontSize:17}}>{icon}</div>
              <div>{label}</div>

        </div>
      )}

  );
}



// ══════════════════════════════════════════════════════════════════
// PREDICT TAB
// ══════════════════════════════════════════════════════════════════
function PredictTab({bracket, predictions, savePredictions, reveals, me, toast_, deadlines}) {
  const [activeRound, setActiveRound] = useState(()=>{
    for (const r of ROUND_ORDER) { if (!reveals[r]) return r; }
    return "f";
  });

  const matches = bracket[activeRound] || [];
  const myPreds = predictions[me] || {};
  const isLocked = !!reveals[activeRound];

  // Flat ordered list of focusable inputs across this round's matches — used to jump
  // focus to the next field after a value is entered: home -> away -> next match's
  // home -> away, etc. Keyed by "matchId-home" / "matchId-away".
  const inputRefs = React.useRef({});
  const focusNext = (matchId, field) => {
    const idx = matches.findIndex(m => m.id === matchId);
    if (idx === -1) return;
    if (field === "homeGoals") {
      inputRefs.current[`${matchId}-away`]?.focus();
    } else {
      // After the away field, jump to the next playable match's home field (skip
      // greyed-out matches entirely since their inputs are disabled and can't focus).
      for (let i = idx + 1; i < matches.length; i++) {
        const next = matches[i];
        if (isPlaceholderTeam(next.home) || isPlaceholderTeam(next.away)) continue;
        inputRefs.current[`${next.id}-home`]?.focus();
        break;
      }
    }
  };

  // Stops a second digit from ever being typed — once the field already has one
  // character, any further digit key press is blocked outright. Backspace, delete,
  // arrow keys, tab etc. still work normally so the value can be cleared/changed.
  const blockSecondDigit = (e) => {
    const isDigit = /^[0-9]$/.test(e.key);
    if (isDigit && e.target.value && e.target.value.length >= 1 && e.target.selectionStart === e.target.selectionEnd) {
      e.preventDefault();
    }
  };

  const updatePred = (matchId, field, val) => {
    if (isLocked) return;
    const v = val === "" ? null : Math.max(0, Math.min(9, parseInt(val)||0));
    const np = { ...predictions, [me]: { ...myPreds, [matchId]: { ...(myPreds[matchId]||{}), [field]: v } } };
    savePredictions(np);
    // Auto-advance focus once a real digit is entered (not on clearing the field)
    if (v !== null) focusNext(matchId, field);
  };

  const playableCount = matches.filter(m => !isPlaceholderTeam(m.home) && !isPlaceholderTeam(m.away)).length;
  const filledCount = matches.filter(m => {
    if (isPlaceholderTeam(m.home) || isPlaceholderTeam(m.away)) return false; // a stale prediction
    // entered before this match's opponent became unconfirmed again shouldn't count
    const p = myPreds[m.id];
    return p && p.homeGoals!=null && p.awayGoals!=null;
  }).length;

  return (
    <div className="fade-in">
      <div style={{display:"flex", gap:6, overflowX:"auto", marginBottom:14, paddingBottom:4}}>
        {ROUND_ORDER.map(r=>(
          <button key={r} onClick={()=>setActiveRound(r)}
            style={{flexShrink:0, padding:"8px 14px", borderRadius:20, fontSize:12, fontWeight:700, cursor:"pointer",
              background: activeRound===r ? C.blue : C.bgCard,
              color: activeRound===r ? "#fff" : (reveals[r] ? C.win : C.chalkDim),
              border:`1px solid ${activeRound===r ? C.blue : C.line}`}}>
            {ROUND_LABELS[r]} {reveals[r] ? "🔒" : ""}
          </button>
        ))}
      </div>

      <div style={{...S.card, padding:"16px 18px"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
          <div style={{fontSize:19, fontWeight:800, color:C.chalk}}>{ROUND_LABELS[activeRound]}</div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:22, fontWeight:800, color: filledCount===playableCount && playableCount>0 ? C.win : C.gold}}>
              {filledCount}/{playableCount||"–"}
            </div>
            <div style={{fontSize:11, color:C.chalkDim}}>predicted</div>
          </div>
        </div>

        <div style={{display:"flex", alignItems:"center", gap:6, marginTop:6}}>
          <span style={{fontSize:13, color:C.chalkDim}}>📅</span>
          <span style={{fontSize:13, color:C.chalkDim}}>Round runs {ROUND_DATES[activeRound]}</span>
        </div>

        <div style={{height:1, background:C.lineSoft, margin:"12px 0"}}/>

        {!isLocked && deadlines[activeRound] && (
          <div style={{background:C.goldDim, border:`1px solid ${C.gold}`, borderRadius:10, padding:"10px 14px"}}>
            <div style={{fontSize:11, color:C.chalkDim, fontWeight:600, textTransform:"uppercase", letterSpacing:0.4}}>Predictions close</div>
            <div style={{fontSize:18, fontWeight:800, color:C.chalk, marginTop:2}}>{fmtDeadline(deadlines[activeRound])}</div>
          </div>
        )}
        {!isLocked && !deadlines[activeRound] && (
          <div style={{background:C.bgCard2, border:`1px solid ${C.lineSoft}`, borderRadius:10, padding:"10px 14px"}}>
            <div style={{fontSize:13, color:C.chalkFaint}}>⏰ No deadline set yet for this round</div>
          </div>
        )}
        {isLocked && (
          <div style={{background:C.winSoft, border:`1px solid ${C.win}`, borderRadius:10, padding:"10px 14px"}}>
            <div style={{fontSize:13, color:C.win, fontWeight:700}}>🔒 Predictions are locked for this round</div>
          </div>
        )}

        <div style={{display:"flex", flexWrap:"wrap", gap:14, marginTop:12}}>
          <div style={{fontSize:12, color:C.blueSoft, fontWeight:600}}>
            🎯 {ROUND_POINTS[activeRound]}pts exact · 1pt correct result
          </div>
          <div style={{fontSize:12, color:C.chalkFaint}}>
            ⏱️ 90-minute score only
          </div>
        </div>
      </div>

      {matches.length===0 && (
        <div style={{textAlign:"center", padding:"30px 0", color:C.chalkFaint}}>No matches in this round yet</div>
      )}

      {matches.map(m=>{
        const tbc = isPlaceholderTeam(m.home) || isPlaceholderTeam(m.away);
        // A match locks the moment it has a real result, even if the round itself
        // hasn't been revealed yet — once kicked off and finished, there's nothing
        // left to predict, so editing should stop regardless of admin's reveal timing.
        const matchFinished = !!m.result && m.result.homeGoals != null && m.result.awayGoals != null;
        const matchLocked = isLocked || matchFinished;
        const pred = myPreds[m.id] || {};
        return (
          <div key={m.id} style={{...S.card, opacity: tbc ? 0.5 : 1}}>
            {m.date && <div style={{fontSize:10, color:C.chalkFaint, marginBottom:8, fontFamily:"'JetBrains Mono',monospace"}}>
              {fmtMatchDate(m.date)} {m.time && `· ${m.time}`} {m.venue && `· ${m.venue}`}
            </div>}
            {matchFinished && !isLocked && (
              <div style={{fontSize:10, color:C.gold, marginBottom:6, fontWeight:600}}>
                ⚽ Final score in — predictions locked for this match
              </div>
            )}
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <div style={{flex:1}}><TeamRow name={m.home}/></div>
              <input type="number" min={0} max={9} inputMode="numeric" value={pred.homeGoals ?? ""} disabled={tbc||matchLocked}
                ref={el => { inputRefs.current[`${m.id}-home`] = el; }}
                onKeyDown={e=>blockSecondDigit(e)}
                onChange={e=>updatePred(m.id,"homeGoals",e.target.value)}
                style={{...S.gi, opacity:(tbc||matchLocked)?0.4:1}} placeholder="–"/>
              <span style={{color:C.chalkFaint, fontWeight:700}}>–</span>
              <input type="number" min={0} max={9} inputMode="numeric" value={pred.awayGoals ?? ""} disabled={tbc||matchLocked}
                ref={el => { inputRefs.current[`${m.id}-away`] = el; }}
                onKeyDown={e=>blockSecondDigit(e)}
                onChange={e=>updatePred(m.id,"awayGoals",e.target.value)}
                style={{...S.gi, opacity:(tbc||matchLocked)?0.4:1}} placeholder="–"/>
              <div style={{flex:1, textAlign:"right"}}><TeamRow name={m.away}/></div>
            </div>
            {tbc && <div style={{fontSize:10, color:C.chalkFaint, marginTop:8, textAlign:"center", fontStyle:"italic"}}>Matchup not yet confirmed</div>}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// BRACKET TAB — the signature visual: a tournament tree with a
// gold connector line tracing the path to the final.
// ══════════════════════════════════════════════════════════════════
function BracketMatchCard({m, compact}) {
  const winner = matchWinner(m);
  const hasResult = !!m.result;
  return (
    <div style={{background:C.bgCard, border:`1px solid ${C.line}`, borderRadius:10,
      padding: compact ? "8px 10px" : "10px 12px", minWidth: compact ? 150 : 180}}>
      {[["home",m.home],["away",m.away]].map(([side,name])=>{
        const isWinner = hasResult && winner === name;
        const score = hasResult ? (side==="home"?m.result.homeGoals:m.result.awayGoals) : null;
        return (
          <div key={side} style={{display:"flex", justifyContent:"space-between", alignItems:"center",
            padding:"4px 0", opacity: hasResult && !isWinner ? 0.45 : 1}}>
            <TeamRow name={name} size={compact?12:13} bold={isWinner}/>
            {hasResult && <span style={{fontFamily:"'JetBrains Mono',monospace", fontWeight:800, color: isWinner?C.gold:C.chalkDim, fontSize:compact?13:14}}>{score}</span>}
          </div>
        );
      })}
      {hasResult && m.result.penalties && (
        <div style={{textAlign:"center", fontSize:9, color:C.chalkFaint, marginTop:2}}>
          (pens {m.result.penalties.home}–{m.result.penalties.away})
        </div>
      )}
    </div>
  );
}

function BracketTab({bracket}) {
  return (
    <div className="fade-in" style={{overflowX:"auto", paddingBottom:10}}>
      <div style={{display:"flex", gap:0, minWidth:920, padding:"4px 2px"}}>
        {ROUND_ORDER.map((rnd, ridx) => (
          <div key={rnd} style={{flex:1, display:"flex", flexDirection:"column", justifyContent:"space-around", paddingRight: ridx<4?18:0}}>
            <div style={{textAlign:"center", marginBottom:14}}>
              <div style={{fontSize:11, fontWeight:800, color:C.gold, textTransform:"uppercase", letterSpacing:0.8}}>{ROUND_LABELS[rnd]}</div>
              <div style={{fontSize:9, color:C.chalkFaint, marginTop:2}}>{ROUND_DATES[rnd]}</div>
            </div>
            <div style={{display:"flex", flexDirection:"column", gap: rnd==="r32"?14 : rnd==="r16"?34 : rnd==="qf"?86 : rnd==="sf"?190 : rnd==="f"?24:0,
              flex:1, justifyContent:"center"}}>
              {bracket[rnd].map(m=>(
                <div key={m.id} style={{position:"relative"}}>
                  {m.isThirdPlace && <div style={{fontSize:9, color:C.chalkFaint, textAlign:"center", marginBottom:4, fontWeight:700, textTransform:"uppercase", letterSpacing:0.4}}>3rd Place Playoff</div>}
                  <BracketMatchCard m={m} compact={rnd==="r32"}/>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div style={{textAlign:"center", marginTop:18, padding:"14px 0"}}>
        <div style={{fontSize:11, color:C.chalkFaint}}>🏆 Champion</div>
        <div style={{fontSize:20, fontWeight:800, color:C.gold, marginTop:4}}>
          {matchWinner(bracket.f[0]) ? <TeamRow name={matchWinner(bracket.f[0])} size={20}/> : "TBD"}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// RESULTS TAB — everyone's predictions for revealed rounds
// ══════════════════════════════════════════════════════════════════
function ResultsTab({bracket, predictions, reveals, players}) {
  const [activeRound, setActiveRound] = useState(()=>{
    const revealedRounds = ROUND_ORDER.filter(r=>reveals[r]);
    return revealedRounds.length ? revealedRounds[revealedRounds.length-1] : ROUND_ORDER[0];
  });
  const matches = bracket[activeRound] || [];
  const isRevealed = !!reveals[activeRound];

  return (
    <div className="fade-in">
      <div style={{display:"flex", gap:6, overflowX:"auto", marginBottom:14, paddingBottom:4}}>
        {ROUND_ORDER.map(r=>(
          <button key={r} onClick={()=>setActiveRound(r)}
            style={{flexShrink:0, padding:"8px 14px", borderRadius:20, fontSize:12, fontWeight:700, cursor:"pointer",
              background: activeRound===r ? C.blue : C.bgCard,
              color: activeRound===r ? "#fff" : (reveals[r] ? C.win : C.chalkDim),
              border:`1px solid ${activeRound===r ? C.blue : C.line}`}}>
            {ROUND_LABELS[r]}
          </button>
        ))}
      </div>

      {!isRevealed ? (
        <div style={{...S.card, textAlign:"center", padding:"40px 20px"}}>
          <div style={{fontSize:32, marginBottom:10}}>🔒</div>
          <div style={{color:C.chalkDim, fontSize:13}}>{ROUND_LABELS[activeRound]} predictions haven't been revealed yet.</div>
        </div>
      ) : matches.filter(m=>!isPlaceholderTeam(m.home)).length===0 ? (
        <div style={{...S.card, textAlign:"center", padding:"40px 20px", color:C.chalkFaint}}>No confirmed matches in this round yet.</div>
      ) : (
        matches.filter(m=>!isPlaceholderTeam(m.home)).map(m=>(
          <div key={m.id} style={S.card}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4}}>
              <TeamRow name={m.home} size={14}/>
              {m.result ? (
                <span style={{fontFamily:"'JetBrains Mono',monospace", fontWeight:800, color:C.gold, fontSize:16}}>
                  {m.result.homeGoals} – {m.result.awayGoals}
                </span>
              ) : <span style={{color:C.chalkFaint, fontSize:12}}>vs</span>}
              <TeamRow name={m.away} size={14}/>
            </div>
            {m.result && (m.result.fullTimeGoals || m.result.penalties) && (
              <div style={{textAlign:"center", marginBottom:8}}>
                <span style={{fontSize:11, color:C.chalkDim}}>
                  {m.result.fullTimeGoals && (
                    <>Full-time (incl. ET): <b style={{color:C.chalk}}>{m.result.fullTimeGoals.home}–{m.result.fullTimeGoals.away}</b></>
                  )}
                  {m.result.fullTimeGoals && m.result.penalties && " · "}
                  {m.result.penalties && (
                    <>Penalties: <b style={{color:C.chalk}}>{m.result.penalties.home}–{m.result.penalties.away}</b></>
                  )}
                </span>
                <div style={{fontSize:10, color:C.chalkFaint, marginTop:2}}>
                  Predictions scored on the 90-minute result above
                </div>
              </div>
            )}
            <div style={{display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center"}}>
              {players.map(p=>{
                const pred = (predictions[p]||{})[m.id];
                const pts = m.result ? scorePrediction(pred, m.result, activeRound) : null;
                return (
                  <div key={p} style={{display:"flex", alignItems:"center", gap:6, background:C.bgInput,
                    border:`1px solid ${C.lineSoft}`, borderRadius:8, padding:"5px 10px"}}>
                    <span style={{width:7,height:7,borderRadius:"50%",background:playerColour(p)}}/>
                    <span style={{fontSize:11, color:playerColour(p), fontWeight:700}}>{p}</span>
                    <span style={{fontSize:12, color:C.chalk, fontFamily:"'JetBrains Mono',monospace"}}>
                      {pred && pred.homeGoals!=null ? `${pred.homeGoals}-${pred.awayGoals}` : "—"}
                    </span>
                    {pts!==null && <span style={{fontSize:11, fontWeight:800, color: pts===3?C.gold:pts===1?C.win:C.chalkFaint}}>+{pts}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// PROGRESS TAB — leaderboard across all revealed rounds
// ══════════════════════════════════════════════════════════════════
function ProgressTab({bracket, predictions, reveals, players, entryFees, ENTRY_FEE, deadlines}) {
  const standings = useMemo(() => {
    return players.map(p => {
      let pts = 0, exact = 0, correct = 0, played = 0;
      ROUND_ORDER.forEach(rnd => {
        if (!reveals[rnd]) return;
        (bracket[rnd]||[]).forEach(m => {
          if (!m.result) return;
          const pred = (predictions[p]||{})[m.id];
          if (!pred || pred.homeGoals==null) return;
          played++;
          const s = scorePrediction(pred, m.result, rnd);
          pts += s;
          if (s === ROUND_POINTS[rnd]) exact++; else if (s===1) correct++;
        });
      });
      return { p, pts, exact, correct, played };
    }).sort((a,b)=>b.pts-a.pts);
  }, [bracket, predictions, reveals, players]);

  const medals = ["🥇","🥈","🥉"];
  const paidCount = entryFees ? players.filter(p => (entryFees[p]||{}).paid === "Y").length : 0;
  const pot = paidCount * (ENTRY_FEE||0);

  return (
    <div className="fade-in">
      <div style={{...S.card, padding:"14px 16px", marginBottom:16}}>
        <div style={S.ct}>🏆 Leaderboard</div>
        <div style={{fontSize:11, color:C.chalkDim, marginTop:4}}>
          {ROUND_ORDER.filter(r=>reveals[r]).length}/5 rounds revealed · Correct result = 1pt always
        </div>
        {ENTRY_FEE>0 && (
          <div style={{marginTop:10, paddingTop:10, borderTop:`1px solid ${C.lineSoft}`, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <span style={{fontSize:11, color:C.chalkDim, fontWeight:600}}>PRIZE POT · WINNER TAKES ALL</span>
            <span style={{fontSize:18, fontWeight:800, color:C.chalk, fontFamily:"'Archivo Black',sans-serif"}}>£{pot}</span>
          </div>
        )}
      </div>

      <div style={{...S.card, marginBottom:16}}>
        <div style={S.ct}>📐 Scoring by Round</div>
        <div style={{fontSize:11, color:C.chalkFaint, marginTop:6, marginBottom:4}}>
          ⏱️ All scoring is based on the 90-minute score only — extra time and penalties don't count
        </div>
        <table style={{width:"100%", marginTop:10, fontSize:12, borderCollapse:"collapse"}}>
          <thead>
            <tr style={{borderBottom:`1px solid ${C.line}`}}>
              <th style={{textAlign:"left", padding:"4px 6px", color:C.chalkDim, fontWeight:600}}>Round</th>
              <th style={{textAlign:"center", padding:"4px 6px", color:C.chalkDim, fontWeight:600}}>Exact score</th>
              <th style={{textAlign:"center", padding:"4px 6px", color:C.chalkDim, fontWeight:600}}>Deadline</th>
            </tr>
          </thead>
          <tbody>
            {ROUND_ORDER.map(r=>(
              <tr key={r} style={{borderBottom:`1px solid ${C.lineSoft}`}}>
                <td style={{padding:"6px 6px", color:C.chalk, fontWeight:600}}>{ROUND_LABELS[r]}</td>
                <td style={{padding:"6px 6px", textAlign:"center", color:C.blue, fontWeight:800}}>{ROUND_POINTS[r]}pts</td>
                <td style={{padding:"6px 6px", textAlign:"center", color: deadlines[r]?C.chalkDim:C.chalkFaint, fontFamily:"'JetBrains Mono',monospace", fontSize:11}}>
                  {deadlines[r] ? fmtDeadline(deadlines[r]) : "Not set"}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {standings.map((r,i)=>(
        <div key={r.p} className="fade-in" style={{...S.card, display:"flex", alignItems:"center", gap:12,
          border: i===0 ? `1px solid ${C.gold}` : `1px solid ${C.line}`,
          background: i===0 ? `linear-gradient(135deg, ${C.goldDim} 0%, #fff 100%)` : C.bgCard}}>
          <div style={{fontSize:22, width:34, textAlign:"center"}}>{medals[i] || `#${i+1}`}</div>
          <div style={{flex:1}}>
            <div style={{color:playerColour(r.p), fontWeight:800, fontSize:16}}>{r.p}</div>
            <div style={{color:C.chalkDim, fontSize:11, marginTop:2}}>
              🎯 {r.exact} exact · ✓ {r.correct} correct · {r.played} played
            </div>
          </div>
          <div style={{fontSize:26, fontWeight:800, color: i===0?C.gold:C.chalk, fontFamily:"'Archivo Black',sans-serif"}}>{r.pts}</div>
        </div>
      ))}
    </div>
  );
}
