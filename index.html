function PlayerManager({players, setPlayers, pins, setPins, emails, setEmails, saveAll, toast_, S}) {
  const PRESET_COLOURS = ["#60B8E8","#E8557A","#FF6B6B","#FDB913","#6699FF","#CBD5E1","#4ADE80","#A78BFA","#FB923C","#34D399","#F472B6","#FBBF24"];
  const [editPlayer, setEditPlayer] = React.useState(null);
  const [pName, setPName] = React.useState("");
  const [pColour, setPColour] = React.useState("#60B8E8");
  const [pPin, setPPin] = React.useState("");
  const [pEmail, setPEmail] = React.useState("");
  const [pBusy, setPBusy] = React.useState(false);
  const [deleteConfirm, setDeleteConfirm] = React.useState(null);

  const savePlayerConfig = async (newPlayers, newColours) => {
    await supa.setState("player_config", {players: newPlayers, colours: newColours}).catch(()=>{});
    Object.assign(PLAYER_COLOURS, newColours);
  };

  const openAdd = () => { setPName(""); setPColour(PRESET_COLOURS[players.length % PRESET_COLOURS.length]); setPPin(""); setPEmail(""); setEditPlayer("new"); };
  const openEdit = (p) => { setPName(p); setPColour(PLAYER_COLOURS[p]||"#94A3B8"); setPPin(pins[p]||""); setPEmail(emails?.[p]||""); setEditPlayer(p); };

  const handleSave = async () => {
    const name = pName.trim();
    if (!name || pPin.length !== 4) return;
    setPBusy(true);
    const newPlayers = editPlayer === "new" ? [...players, name] : players.map(p => p === editPlayer ? name : p);
    const newColours = {...PLAYER_COLOURS, [name]: pColour};
    if (editPlayer !== "new" && editPlayer !== name) delete newColours[editPlayer];
    const newPins = {...pins, [name]: pPin};
    if (editPlayer !== "new" && editPlayer !== name) delete newPins[editPlayer];
    const newEmails = {...(emails||{})};
    if (pEmail.trim()) newEmails[name] = pEmail.trim(); else delete newEmails[name];
    if (editPlayer !== "new" && editPlayer !== name) delete newEmails[editPlayer];
    setPlayers(newPlayers);
    setPins(newPins);
    setEmails(newEmails);
    await savePlayerConfig(newPlayers, newColours);
    await supa.setState("pins", newPins).catch(()=>{});
    await supa.setState("emails_hpl", newEmails).catch(()=>{});
    saveAll({pins: newPins});
    toast_(`✅ Player ${editPlayer === "new" ? "added" : "updated"}: ${name}`);
    setEditPlayer(null); setPBusy(false);
  };

  const handleDelete = async (p) => {
    const newPlayers = players.filter(x => x !== p);
    const newColours = {...PLAYER_COLOURS}; delete newColours[p];
    const newPins = {...pins}; delete newPins[p];
    const newEmails = {...(emails||{})}; delete newEmails[p];
    setPlayers(newPlayers); setPins(newPins); setEmails(newEmails);
    await savePlayerConfig(newPlayers, newColours);
    await supa.setState("pins", newPins).catch(()=>{});
    await supa.setState("emails_hpl", newEmails).catch(()=>{});
    saveAll({pins: newPins});
    setDeleteConfirm(null);
    toast_(`🗑️ Player removed: ${p}`);
  };

  if (editPlayer !== null) return (
    <div style={S.card}>
      <span style={S.ct}>{editPlayer === "new" ? "➕ Add Player" : `✏️ Edit: ${editPlayer}`}</span>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:12}}>
        <div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:4}}>Display Name</div>
          <input value={pName} onChange={e=>setPName(e.target.value)}
            style={{width:"100%",background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#E2E8F0",fontSize:14}}
            placeholder="e.g. Jamie"/>
        </div>
        <div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:6}}>Colour</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {PRESET_COLOURS.map(c=>(
              <div key={c} onClick={()=>setPColour(c)}
                style={{width:28,height:28,borderRadius:"50%",background:c,cursor:"pointer",
                  border:pColour===c?"3px solid #fff":"3px solid transparent",flexShrink:0}}/>
            ))}
            <input type="color" value={pColour} onChange={e=>setPColour(e.target.value)}
              style={{width:36,height:36,borderRadius:8,border:"none",cursor:"pointer",background:"none",padding:0}}/>
          </div>
          <div style={{marginTop:8,padding:"8px 12px",background:"#0F172A",borderRadius:8,border:"1px solid #334155",display:"inline-flex",alignItems:"center",gap:8}}>
            <span style={{width:12,height:12,borderRadius:"50%",background:pColour,display:"inline-block"}}/>
            <span style={{color:pColour,fontWeight:700,fontSize:14}}>{pName||"Preview"}</span>
          </div>
        </div>
        <div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:4}}>PIN (4 digits)</div>
          <input value={pPin} onChange={e=>setPPin(e.target.value.replace(/\D/g,"").slice(0,4))}
            type="tel" maxLength={4}
            style={{width:"100%",background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#E2E8F0",fontSize:18,letterSpacing:8,fontFamily:"monospace"}}
            placeholder="••••"/>
          {editPlayer !== "new" && <div style={{fontSize:11,color:"#475569",marginTop:4}}>Clear to remove PIN.</div>}
        </div>
        <div>
          <div style={{fontSize:12,color:"#64748B",marginBottom:4}}>Email (optional)</div>
          <input value={pEmail} onChange={e=>setPEmail(e.target.value)}
            type="email"
            style={{width:"100%",background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",color:"#E2E8F0",fontSize:14}}
            placeholder="name@example.com"/>
          <div style={{fontSize:11,color:"#475569",marginTop:4}}>Used for deadline reminders, if you set those up.</div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={()=>setEditPlayer(null)} style={{...S.sb,flex:1,padding:"12px",color:"#94A3B8"}}>Cancel</button>
          <button disabled={pBusy||!pName.trim()||pPin.length!==4} onClick={handleSave}
            style={{...S.sb,flex:2,padding:"12px",background:"#1E3A5F",color:"#60A5FA",border:"1px solid #3B82F6",fontWeight:700,
              opacity:(pBusy||!pName.trim()||pPin.length!==4)?0.4:1}}>
            {pBusy?"Saving…":"💾 Save Player"}
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={S.ct}>👥 Players ({players.length})</span>
        <button onClick={openAdd} style={{...S.sb,background:"#064E3B",color:"#34D399",border:"1px solid #10B981",padding:"6px 12px",fontSize:13,fontWeight:700}}>+ Add</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {players.map(p=>(
          <div key={p} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#0F172A",borderRadius:8,border:"1px solid #1E293B"}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:PLAYER_COLOURS[p]||"#94A3B8",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:PLAYER_COLOURS[p]||"#E2E8F0",fontWeight:700,fontSize:14}}>{p}</div>
              {emails?.[p] && <div style={{fontSize:10,color:"#64748B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{emails[p]}</div>}
            </div>
            <span style={{fontSize:11,color:pins[p]?"#34D399":"#EF4444"}}>{pins[p]?"PIN ✓":"No PIN"}</span>
            <button onClick={()=>openEdit(p)} style={{...S.sb,padding:"4px 10px",fontSize:12,color:"#94A3B8"}}>Edit</button>
            {deleteConfirm===p ? (
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>handleDelete(p)} style={{...S.sb,padding:"4px 10px",fontSize:12,background:"#7F1D1D",color:"#FCA5A5",border:"1px solid #EF4444"}}>Confirm</button>
                <button onClick={()=>setDeleteConfirm(null)} style={{...S.sb,padding:"4px 10px",fontSize:12}}>✕</button>
              </div>
            ) : (
              <button onClick={()=>setDeleteConfirm(p)} style={{...S.sb,padding:"4px 10px",fontSize:12,color:"#EF4444"}}>✕</button>
            )}
          </div>
        ))}
      </div>
      <p style={{fontSize:11,color:"#475569",marginTop:10}}>Tap Edit to change name, colour or PIN. Deleting keeps historical predictions.</p>
    </div>
  );
}

function Admin({fixtures,displayFixtures,setFixtures,predictions,setPredictions,jokers,setJokers,pins,setPins,reveals,setReveals,deadlines,setDeadlines,manuallyUnlocked,setManuallyUnlocked,players,setPlayers,admin,setAdmin,toast_,saveAll,syncStatus,setSupaLoading,seasonActual,setSeasonActual,seasonPreds,setSeasonPreds,seasonPts,setSeasonPts,seasonGP,standingsSource,mwOverrides,setMwOverrides,entryFees,setEntryFees,onForceRefresh,seasonLabel,setSeasonLabel,emails,setEmails,demoMode,setDemoMode}){

    const today=new Date(); today.setHours(0,0,0,0);
    const todayMs=today.getTime();
    const df=displayFixtures||fixtures;
    let bestMw=35, bestDiff=Infinity;
    Object.entries(df).forEach(([mwStr,fxList])=>{
      if(!fxList.length) return;
      const dates=fxList.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
      if(!dates.length) return;
      const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
      const day=earliest.getDay();
      const wednesday4=new Date(earliest);
      wednesday4.setDate(earliest.getDate()-(day>=3?day-3:day+4));
      wednesday4.setHours(0,0,0,0);
      const sunday=new Date(wednesday4); sunday.setDate(wednesday4.getDate()+6); sunday.setHours(23,59,59,999);
      if(todayMs>=wednesday4.getTime()&&todayMs<=sunday.getTime()){bestMw=parseInt(mwStr);bestDiff=0;return;}
      const diff=wednesday4.getTime()-todayMs;
      if(diff>0&&diff<bestDiff){bestDiff=diff;bestMw=parseInt(mwStr);}
    });
    return bestMw;
  });
  const[newPw1,setNewPw1]=useState('');
  const[newPw2,setNewPw2]=useState('');

      <button style={{...S.bb,padding:"14px",fontSize:16,fontWeight:800}} onClick={()=>doUnlock()}>

      <p style={{color:"#475569",fontSize:11,marginTop:12,textAlign:"center"}}>

      </p>
    </div>
  );

  function doUnlock(){
    if(pw==="RESET123"){saveAdminPws(['admin123']);setAdmin(true);toast_("Reset to admin123 — add a new password in 🔑 Admin Passwords");return;}
    if(checkPw(pw))setAdmin(true);else toast_("Wrong password","error");
  }

  const safeMWOverrides = mwOverrides || {};
  const safeEntryFees = entryFees || {};
  const fxs=(displayFixtures||fixtures)[ew]||[];
  const upRes=(id,side,v)=>{
    setFixtures(f=>{

          supa.upsert("results",{id,home_goals:newResult.homeGoals,away_goals:newResult.awayGoals,updated_at:new Date().toISOString()})

function ReminderPanel({ew,deadlines,predictions,players,displayFixtures,fixtures}){
  const[waNum,setWaNum]=useState(()=>{try{return localStorage.getItem("hpl_wa_number")||"";}catch{return "";}});
  const[emailAddr,setEmailAddr]=useState(()=>{try{return localStorage.getItem("hpl_email")||"";}catch{return "";}});

  const saveWa=(v)=>{setWaNum(v);try{localStorage.setItem("hpl_wa_number",v);}catch{}};
  const saveEmail=(v)=>{setEmailAddr(v);try{localStorage.setItem("hpl_email",v);}catch{}};

  // Work out who hasn't predicted for this MW yet
  // Only count fixtures that aren't moved from another MW (use display fixtures)
  const fxsForMW=(displayFixtures||fixtures)[ew]||[];
  const missing=players.filter(p=>{
    // Check every fixture in this MW — player must have predicted all of them
    return !fxsForMW.every(fx=>{
      const pred=predictions[p]?.[fx.id];
      return pred&&pred.homeGoals!==undefined&&pred.homeGoals!==""&&pred.homeGoals!==null;
    });
  });

  const dl=deadlines[ew];
  const dlStr=dl?new Date(dl).toLocaleString("en-GB",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"no deadline set";

  const msgText=missing.length===0
    ? `✅ HPL Predictions MW${ew}: All players have submitted their predictions! Deadline: ${dlStr}`
    : `⚽ HPL Predictions MW${ew} reminder!

Deadline: ${dlStr}

Still to predict:
${missing.map(p=>`• ${p}`).join("\n")}

Don't forget to submit your predictions! 🎯`;

  const sendWhatsApp=()=>{
    const encoded=encodeURIComponent(msgText);
    const num=waNum.replace(/[^0-9]/g,"");
    const url=num
      ? `https://wa.me/${num}?text=${encoded}`

];

function calcSeasonScore(prediction, actual) {
  if (!prediction || !actual || !prediction.length || !actual.length) return null;
  let pts = 0;
  prediction.forEach((team, i) => {
    const actualPos = actual.indexOf(team);
    if (actualPos === -1) return;
    const diff = Math.abs(i - actualPos);
    if (diff === 0) pts += 3;
    else if (diff === 1) pts += 1;
  });
  return pts;
}

function ImportPanel({players, setPredictions, setJokers, saveAll, toast_}) {
  const [open, setOpen] = React.useState(false);
  const [status, setStatus] = React.useState("");
  const [preview, setPreview] = React.useState(null);
  const fileRef = React.useRef();

  const parseCSV = (text) => {
    // Normalise line endings
    const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
    if (lines.length < 2) return [];

    // Simple but reliable: split on comma, handle quotes
    const splitLine = (line) => {
      const cells = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; } // escaped quote
          else inQ = !inQ;
        } else if (c === ',' && !inQ) {
          cells.push(cur.trim()); cur = '';
        } else {
          cur += c;
        }
      }
      cells.push(cur.trim()); // last cell
      return cells;
    };

    const headers = splitLine(lines[0]);
    return lines.slice(1)
      .filter(l => l.trim())
      .map(line => {
        const vals = splitLine(line);
        // Pad to header length
        while (vals.length < headers.length) vals.push('');
        return Object.fromEntries(headers.map((h, i) => [h, vals[i] || '']));
      })
      .filter(r => r.fixture_id || r.MW);
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const rows = parseCSV(ev.target.result);
        // Count non-empty predictions
        let total = 0;
        rows.forEach(row => {
          players.forEach(p => {
            if(row[p+"_home"]!==""&&row[p+"_away"]!=="") total++;

        // Count per player for verification
        const perPlayer = {};
        rows.forEach(row => {
          players.forEach(p => {
            if(row[p+"_home"]!==""&&row[p+"_away"]!==""){
              perPlayer[p] = (perPlayer[p]||0) + 1;
            }
          });
        });
        setPreview({rows, total, fixtures: rows.length, perPlayer});
        const playerCounts = players.map(p=>`${p}:${perPlayer[p]||0}`).join(' · ');
        setStatus(`✅ Parsed ${rows.length} fixtures, ${total} predictions.\n${playerCounts}`);
      } catch(err) {
        setStatus("❌ Parse error: " + err.message);

    };
    reader.readAsText(file);
  };

  const doImport = async () => {
    if (!preview) return;
    setStatus("⏳ Importing...");
    try {
      // Build new predictions object
      const newPreds = {};
      const newJokers = {};

      preview.rows.forEach(row => {

          const jkRaw = (row[p+"_joker"]||row[p+"_joker (0 or 1)"]||"0").toString().trim().toLowerCase();
          const jk = jkRaw === "1" || jkRaw === "true" || jkRaw === "yes" || jkRaw === "y";
          if (h !== "" && a !== "" && h !== undefined && a !== undefined) {
            newPreds[p][fid] = {
              homeGoals: parseInt(h),
              awayGoals: parseInt(a),
              joker: jk
            };
            if (jk) {
              newJokers[p][fid] = true;
            }
          }
        });
      });

      // Save to Supabase using upsert on (player, fixture_id) — no delete needed
      const SUPA_URL = "https://rsvcqtfgidhrumtopiqb.supabase.co";
      const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdmNxdGZnaWRocnVtdG9waXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjc2MDIsImV4cCI6MjA5MjkwMzYwMn0.jUomRZbvTNPhsdgNalEni1TjwpyRMZ5m07G4dlD0uNY";
      const baseHeaders = {"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"};

      // Process one player at a time: delete then insert

      for (const p of players) {

            id: `${p}_${fid}`,
            player: p,

            away_goals: pred.awayGoals,

        // Delete this player's predictions
        await fetch(`${SUPA_URL}/rest/v1/predictions?player=eq.${encodeURIComponent(p)}`,
          {method:"DELETE", headers:baseHeaders});

        // Small delay
        await new Promise(r=>setTimeout(r,300));

        // Insert in batches of 25
        let playerOk = true;
        for (let i = 0; i < pRows.length; i += 25) {

            method:"POST",
            headers:{...baseHeaders, "Prefer":"return=minimal"},
            body: JSON.stringify(batch)
          });
          if (!res.ok) {
            const err = await res.text();
            console.error(`${p} batch ${i} failed:`, err);
            playerOk = false;
            importResults[p] = `ERROR: ${err.slice(0,50)}`;
            break;
          }
        }
        if (playerOk) importResults[p] = pRows.length;
        setStatus(`⏳ Importing... ${p} done (${pRows.length} preds)`);

      // Verify per player using count queries

          {headers:{...baseHeaders,"Prefer":"count=exact","Range":"0-0"}});
        const cnt = parseInt(vRes.headers?.get?.('Content-Range')?.split('/')?.[1] || importResults[p] || 0);
        savedPerPlayer[p] = isNaN(cnt) ? (importResults[p]||0) : cnt;
        savedCount += savedPerPlayer[p];
      }
      const verifyMsg = players.map(p=>`${p}:${savedPerPlayer[p]||0}`).join(' · ');

      // Update local state
      setPredictions(newPreds);

      saveAll({pr: newPreds, jk: newJokers});

      const totalSent = Object.values(importResults).reduce((a,v)=>a+(typeof v==='number'?v:0),0);
      const errors = Object.entries(importResults).filter(([,v])=>typeof v==='string').map(([p,v])=>`${p}:${v}`);
      const errMsg = errors.length ? `\n⚠️ Errors: ${errors.join(', ')}` : '';
      setStatus(`✅ Import complete! ${totalSent} sent, ${savedCount} verified in Supabase.\n${verifyMsg}${errMsg}`);
      setPreview(null);
      toast_("✅ Predictions imported successfully!");
    } catch(err) {
      setStatus("❌ Import failed: " + err.message);
    }
  };

  return (
    <div style={{...S.card, border:"1px solid #F59E0B44", marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}
        onClick={()=>setOpen(o=>!o)}>
        <div>
          <div style={S.ct}>📥 Import Predictions from CSV</div>
          <div style={{fontSize:12,color:"#64748B",marginTop:2}}>
            Bulk import all player predictions — overwrites existing data
          </div>
        </div>
        <span style={{color:"#64748B"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:14}}>
          <div style={{fontSize:12,color:"#F59E0B",background:"#F59E0B11",border:"1px solid #F59E0B33",
            borderRadius:8,padding:"8px 12px",marginBottom:12}}>

          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile}

          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <button onClick={()=>fileRef.current.click()}
              style={{...S.bb,flex:1,padding:"12px",fontSize:14}}>
              📂 Choose CSV File
            </button>
          </div>
          {status&&(
            <div style={{fontSize:12,color:status.startsWith("✅")?"#34D399":status.startsWith("⏳")?"#F59E0B":"#EF4444",

              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {players.map(p=>(
                  <div key={p} style={{background:(preview.perPlayer[p]||0)>0?"#065F4622":"#7F1D1D22",
                    border:`1px solid ${(preview.perPlayer[p]||0)>0?"#34D39944":"#EF444444"}`,

function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(c =>
    typeof c === "string" && (c.includes(",") || c.includes('"') || c.includes("\n"))
      ? `"${c.replace(/"/g, '""')}"` : c
  ).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

        const predPos = seasonPreds[p]?.indexOf(t) ?? -1;

        row.push(predPos >= 0 ? predPos + 1 : "");
        row.push(score);
      });

    });

    // Totals row
    const totRow = ["", "TOTAL", "", ""];
    submittedPlayers.forEach(p => {
      totRow.push("");
      totRow.push(calcSeasonScore(seasonPreds[p], seasonActual) ?? "");

    // Section 2: Each player's full predicted table

  return (

function SeasonResetPanel({setReveals, setDeadlines, setPredictions, setJokers,
  setSeasonPreds, setSeasonActual, setFixtures, setEntryFees, toast_}) {
  const [open, setOpen] = useState(false);
  const [confirm, setConfirm] = useState("");
  const [busy, setBusy] = useState(false);

  const doTestReset = async () => {
    setBusy(true);
    try {
      // Simulate reset locally only — no Supabase writes
      setReveals({});
      setDeadlines({});
      setPredictions({});
      setJokers({});
      setSeasonPreds({});
      setSeasonActual(null);
      setEntryFees({});
      setFixtures(buildFixtures());
      toast_("🧪 Test reset complete — local state cleared. Supabase NOT touched. Refresh to restore.", "error");
      setOpen(false);
      setConfirm("");
    } catch(e) {
      toast_("Test reset failed: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  const doReset = async () => {
    if (confirm.trim().toUpperCase() !== "NEW SEASON") {
      toast_("Type NEW SEASON to confirm", "error");
      return;
    }
    setBusy(true);
    try {
      // First: backup current season data
      const backupKey = `season_backup_2627`;
      try {
        const [curPreds, curActual, curRevs] = await Promise.all([
          supa.getState("season_preds").catch(()=>null),
          supa.getState("season_actual").catch(()=>null),
          supa.getState("reveals").catch(()=>null),
        ]);
        await supa.setState(backupKey, {
          season_preds: curPreds || {},
          season_actual: curActual || [],
          reveals: curRevs || {},
          backed_up_at: new Date().toISOString(),
        });
        console.log("✅ Season 25/26 backed up to Supabase key:", backupKey);
      } catch(backupErr) {
        console.log("Backup warning:", backupErr.message);
      }

      // Clear Supabase game_state keys — keep pins
      await Promise.all([
        supa.setState("reveals", {}).catch(e=>console.log("clear reveals failed:",e.message)),
        supa.setState("deadlines", {}).catch(e=>console.log("clear deadlines failed:",e.message)),
        supa.setState("season_preds", {}).catch(e=>console.log("clear season_preds failed:",e.message)),
        supa.setState("season_actual", []).catch(e=>console.log("clear season_actual failed:",e.message)),
        supa.setState("season_pts", {}).catch(e=>console.log("clear season_pts failed:",e.message)),
        supa.setState("season_gp", {}).catch(e=>console.log("clear season_gp failed:",e.message)),
        supa.setState("live_fixtures", {}).catch(e=>console.log("clear live_fixtures failed:",e.message)),
        supa.setState("mw_overrides", {}).catch(e=>console.log("clear mw_overrides failed:",e.message)),
      ]);
      // Clear entry fees separately (may not exist yet)
      try {
        const existingFees = await supa.getState("entry_fees");
        if (existingFees !== null) await supa.setState("entry_fees", {});
      } catch(e) { console.log("entry_fees reset skipped:", e.message); }

      // Delete all predictions — fetch IDs then batch delete with in() filter
      {
        let passes = 0;
        while (passes < 20) {
          passes++;
          const rows = await supa.get("predictions", "select=id&limit=200");
          if (!rows || !rows.length) break;
          for (let i = 0; i < rows.length; i += 50) {
            const batch = rows.slice(i, i + 50);
            const filterVal = `(${batch.map(r => `"${String(r.id).replace(/"/g,'\\"')}"`).join(',')})`;
            await fetch(`${SUPA_URL}/rest/v1/predictions?id=in.${filterVal}`, {
              method: "DELETE",
              headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
            });
          }
        }
      }

      // Delete all results — same approach
      {
        let passes = 0;
        while (passes < 10) {
          passes++;
          const rows = await supa.get("results", "select=id&limit=200");
          if (!rows || !rows.length) break;
          for (let i = 0; i < rows.length; i += 50) {
            const batch = rows.slice(i, i + 50);
            const filterVal = `(${batch.map(r => `"${String(r.id).replace(/"/g,'\\"')}"`).join(',')})`;
            await fetch(`${SUPA_URL}/rest/v1/results?id=in.${filterVal}`, {
              method: "DELETE",
              headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
            });
          }
        }
      }

      // Reset local state — always do this even if Supabase steps partially failed
      try {
        setReveals({});
        setDeadlines({});
        setPredictions({});
        setJokers({});
        setSeasonPreds({});
        setSeasonActual(null);
        setEntryFees({});
        setFixtures(buildFixtures());
      } catch(e) { console.log("Local state reset error:", e.message); }

      // Clear localStorage except pins
      try {
        const saved = loadAll();
        const pinsToKeep = saved.pins || {};
        localStorage.removeItem(MASTER);
        saveAll_master({pins: pinsToKeep});
      } catch {}

      toast_("✅ Season reset complete! All predictions and results cleared.");
      setOpen(false);
      setConfirm("");
    } catch(e) {
      // Even on unexpected error, try to clear local state
      try { setReveals({}); setDeadlines({}); setPredictions({}); setJokers({}); setSeasonPreds({}); setSeasonActual(null); setEntryFees({}); } catch {}
      toast_("⚠️ Reset partially completed — local data cleared. Check Supabase if issues persist: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{...S.card, border:"1px solid #EF444444", marginBottom:12}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center",
        cursor:"pointer"}} onClick={()=>{ setOpen(o=>!o); setConfirm(""); }}>
        <div>
          <div style={{...S.ct, color:"#EF4444"}}>🔄 New Season Reset</div>
          <div style={{fontSize:12, color:"#64748B", marginTop:2}}>
            Clears all predictions, results, reveals and season data for a fresh start
          </div>
        </div>
        <span style={{color:"#64748B"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:14}}>
          <div style={{background:"#7F1D1D22", border:"1px solid #EF444444",
            borderRadius:8, padding:12, marginBottom:12, fontSize:12, color:"#FCA5A5",
            lineHeight:1.7}}>
            ⚠️ <b>This will permanently delete:</b><br/>
            • All players' weekly predictions<br/>
            • All match results<br/>
            • All reveal and deadline settings<br/>
            • All season (league table) predictions<br/>
            • All entry fee payment records<br/><br/>
            ✅ <b>Player PINs and colours are kept.</b><br/>
            <b>This cannot be undone.</b>
          </div>
          <div style={{fontSize:12, color:"#94A3B8", marginBottom:6}}>
            Type <b style={{color:"#EF4444"}}>NEW SEASON</b> to confirm:
          </div>
          <input
            value={confirm}
            onChange={e=>setConfirm(e.target.value)}
            placeholder="NEW SEASON"
            style={{...S.inp, marginBottom:10, fontWeight:700,
              borderColor: confirm.trim().toUpperCase()==="NEW SEASON"?"#EF4444":"#334155",
              color: confirm.trim().toUpperCase()==="NEW SEASON"?"#EF4444":"#E2E8F0"}}
          />
          <button
            onClick={doReset}
            disabled={busy || confirm.trim().toUpperCase()!=="NEW SEASON"}
            style={{width:"100%", padding:"14px", background:"#7F1D1D",
              border:"2px solid #EF4444", borderRadius:10, color:"#FCA5A5",
              fontSize:15, fontWeight:800, cursor:"pointer",
              opacity: confirm.trim().toUpperCase()==="NEW SEASON"?1:0.4}}>
            {busy?"⏳ Resetting...":"🔄 Reset for New Season"}
          </button>
          {busy&&(
            <div style={{marginTop:10,background:"#0F172A",borderRadius:8,padding:10,fontSize:11,fontFamily:"monospace",color:"#94A3B8",border:"1px solid #1E293B"}}>
              ⏳ Deleting predictions and results — this may take 30–60 seconds for a full season of data. Do not close the app.
            </div>

          <button
            onClick={doTestReset}
            disabled={busy}

function SeasonTab({players, me, seasonPreds, setSeasonPreds, seasonActual, seasonPts, seasonGP, saveAll, toast_, setTab, seasonLabel}) {
  const [draft, setDraft] = useState([...PL_TEAMS_2526].sort());
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const myPred = seasonPreds?.[me] || null;
  const touchDragRef = useRef(null);

  useEffect(() => {
    if (myPred && myPred.length === 20) {
      setSubmitted(true);
      setDraft([...myPred]); // restore saved order
    } else if (!myPred) {
      setSubmitted(false);
      setDraft([...PL_TEAMS_2526].sort());
    }
  }, [me, myPred]);

  // Move a team from index 'from' to index 'to'
  const moveTo = (from, to) => {
    if (from === to) return;
    const d = [...draft];
    const [item] = d.splice(from, 1);
    d.splice(to, 0, item);
    setDraft(d);
  };

  // Mouse/pointer drag handlers
  const onDragStart = (i) => setDragIdx(i);
  const onDragOver = (e, i) => { e.preventDefault(); setDragOver(i); };
  const onDrop = (i) => { if(dragIdx!==null) moveTo(dragIdx, i); setDragIdx(null); setDragOver(null); };
  const onDragEnd = () => { setDragIdx(null); setDragOver(null); };

  // Touch drag handlers
  const onTouchStart = (e, i) => {
    touchDragRef.current = { startIdx: i, startY: e.touches[0].clientY };
  };
  const onTouchMove = (e) => {
    e.preventDefault();
    if (!touchDragRef.current) return;
    const y = e.touches[0].clientY;
    const el = document.elementFromPoint(e.touches[0].clientX, y);
    const row = el?.closest('[data-season-idx]');
    if (row) {
      const overIdx = parseInt(row.getAttribute('data-season-idx'));
      if (!isNaN(overIdx)) setDragOver(overIdx);
    }
  };
  const onTouchEnd = () => {
    if (touchDragRef.current && dragOver !== null) {
      moveTo(touchDragRef.current.startIdx, dragOver);
    }
    touchDragRef.current = null;
    setDragOver(null);
    setDragIdx(null);
  };

  const handleSubmit = async () => {
    if (!me) { toast_("Please log in first","error"); return; }
    if (submitted) return;
    if (!window.confirm("Submit your league prediction? This cannot be changed once submitted.")) return;
    const newPreds = {...(seasonPreds||{}), [me]: draft};
    setSeasonPreds(newPreds);
    setSubmitted(true);
    // Save to localStorage immediately as backup
    try {
      saveAll_master({season_preds: newPreds});
    } catch {}
    // Save to Supabase
    try {
      await supa.setState("season_preds", newPreds);
      toast_("League prediction saved! 🏆");
    } catch(e) {
      toast_("Saved locally — sync to server failed. Will retry next open.","error");
    }
  };

  // Scores if actual table is set
  const scores = seasonActual ? players.map(p => ({
    p, pts: calcSeasonScore(seasonPreds?.[p], seasonActual)
  })).sort((a,b) => b.pts - a.pts) : null;

  return (
    <div style={{padding:"12px 8px"}}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:800,color:"#E2E8F0"}}>🏆 League Predictions</div>
        <div style={{fontSize:13,color:"#64748B",marginTop:4}}>
          Predict the final {seasonLabel||"2026/27"} Premier League table
        </div>
        <div style={{fontSize:12,color:"#475569",marginTop:2,background:"#1E293B",
          borderRadius:8,padding:"6px 10px",display:"inline-block"}}>
          🟢 Exact position = <b style={{color:"#34D399"}}>3pts</b> &nbsp;
          🔵 One place off = <b style={{color:"#60A5FA"}}>1pt</b> &nbsp;
          Max <b style={{color:"#A78BFA"}}>60pts</b>
        </div>
        {seasonActual&&seasonActual.length>0
          ? <div style={{fontSize:11,color:"#34D399",marginTop:4}}>
              📡 Live: {seasonActual[0]} · {seasonActual[1]} · {seasonActual[2]} — updates every open
            </div>
          : <div style={{fontSize:11,color:"#F59E0B",marginTop:4}}>
              ⏳ Fetching live standings...
            </div>
        }
      </div>

      {/* Leaderboard — always show if any predictions submitted */}
      {Object.keys(seasonPreds||{}).length > 0 && (
        <div style={{...S.card,marginBottom:16}}>
          <div style={{...S.ct,marginBottom:2}}>🏆 League Predictions Leaderboard</div>
          <div style={{fontSize:11,color:"#64748B",marginBottom:10}}>
            {seasonActual&&seasonActual.length>0
              ? "Based on current PL standings — updates live each week"
              : "⏳ Fetching live standings... reopen the app if scores don't appear shortly"}
          </div>
          {(() => {
            // Build scored list and sort by pts desc
            const scored = players.map(p => ({
              p,
              hasPred: !!(seasonPreds?.[p]&&seasonPreds[p].length===20),
              pts: (seasonActual&&seasonActual.length===20&&seasonPreds?.[p]&&seasonPreds[p].length===20)
                ? calcSeasonScore(seasonPreds[p], seasonActual) : null
            }));
            // Sort: submitted with pts first (desc), then submitted no pts, then not submitted
            scored.sort((a,b) => {
              if(a.pts!==null && b.pts!==null) return b.pts - a.pts;
              if(a.pts!==null) return -1;
              if(b.pts!==null) return 1;
              if(a.hasPred && !b.hasPred) return -1;
              if(!a.hasPred && b.hasPred) return 1;
              return 0;
            });
            let rank = 0;
            return scored.map(({p, hasPred, pts}) => {
              if(pts!==null) rank++;
              return (
                <div key={p} style={{display:"flex",alignItems:"center",gap:10,
                  padding:"10px 8px",borderBottom:"1px solid #1E293B",
                  background:p===me?"#7C3AED11":"transparent",
                  borderRadius:p===me?6:0}}>
                  <span style={{fontSize:15,fontWeight:800,color:"#475569",width:24,textAlign:"center",flexShrink:0}}>
                    {pts!==null ? rank : "–"}
                  </span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                      <span style={{fontWeight:700,fontSize:15,color:playerColour(p)}}>
                        {p}{p===me?" 👤":""}
                      </span>
                      {hasPred && (
                        <span style={{fontSize:22,fontWeight:800,color:playerColour(p),lineHeight:1}}>
                          {pts!==null ? pts : "–"}
                        </span>
                      )}
                      {hasPred && pts!==null && (
                        <span style={{fontSize:11,color:"#64748B",fontWeight:600}}>pts</span>
                      )}
                    </div>
                    {hasPred && pts===null && (
                      <div style={{fontSize:11,color:"#64748B"}}>⏳ loading standings</div>
                    )}
                    {!hasPred && (
                      <div style={{fontSize:12,color:"#475569",fontStyle:"italic"}}>not submitted</div>
                    )}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {/* Other players' predictions */}
      {seasonActual && (
        <div style={{...S.card,marginBottom:16}}>
          <div style={{...S.ct,marginBottom:10}}>All Predictions vs Actual</div>
          {/* ROW_H=36 consistent across all columns so positions align */}

function PinScreen({player,mode,pins,onSuccess,onSavePin,onCancel}){
  // steps: "enter" (enter current or new PIN) | "confirm" (confirm new PIN) | "verify" (verify old PIN before changing)
  const initStep = mode==="change" ? "verify" : mode==="set" ? "enter" : "enter";
  const[digits,setDigits]=useState(["","","",""]);
  const[confirm,setConfirm]=useState(["","","",""]);
  const[step,setStep]=useState(initStep);
  const[error,setError]=useState("");
  const refs=[useRef(),useRef(),useRef(),useRef()];

  const handleDigit=(i,val,arr,setArr)=>{
    if(!/^[0-9]?$/.test(val))return;
    const nd=[...arr];nd[i]=val;setArr(nd);setError("");
    if(val&&i<3)refs[i+1].current?.focus();
  };
  const handleKey=(i,e,arr,setArr)=>{
    if(e.key==="Backspace"&&!arr[i]&&i>0){refs[i-1].current?.focus();}
  };

  const doSubmit=()=>{
    const pin=digits.join("");
    if(pin.length<4){setError("Enter all 4 digits");return;}

    if(mode==="enter"){
      if(pin===pins[player]){onSuccess(player);}
      else{setError("Wrong PIN. Try again.");setDigits(["","","",""]);refs[0].current?.focus();}

    } else if(mode==="set"){
      if(step==="enter"){setStep("confirm");setConfirm(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);}
      else{
        const c=confirm.join("");
        if(c===pin){onSavePin(player,pin);}
        else{setError("PINs don't match. Try again.");setStep("enter");setDigits(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);}
      }

    } else if(mode==="change"){
      if(step==="verify"){
        // Verify existing PIN first
        if(pin===pins[player]){
          setStep("enter");setDigits(["","","",""]);setError("");
          setTimeout(()=>refs[0].current?.focus(),50);
        } else {
          setError("Wrong current PIN. Try again.");setDigits(["","","",""]);refs[0].current?.focus();
        }
      } else if(step==="enter"){
        setStep("confirm");setConfirm(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);
      } else {
        const c=confirm.join("");
        if(c===pin){onSavePin(player,pin);}
        else{setError("PINs don't match. Try again.");setStep("enter");setDigits(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);}
      }
    }
  };

  const current=step==="confirm"?confirm:digits;
  const setCurrent=step==="confirm"?setConfirm:setDigits;

  const title=
    mode==="enter" ? "🔒 Enter Your PIN" :
    mode==="change" && step==="verify" ? "🔑 Enter Current PIN" :
    mode==="change" && step==="enter" ? "🔑 Choose New PIN" :
    mode==="change" && step==="confirm" ? "🔑 Confirm New PIN" :
    step==="confirm" ? "🔒 Confirm Your PIN" : "🔒 First Time? Set Your PIN";

  const subtitle=
    mode==="enter" ? `Welcome back, ${player}! Enter your 4-digit PIN.` :
    mode==="change" && step==="verify" ? `Enter your current PIN to verify it's you, ${player}.` :
    mode==="change" && step==="enter" ? "Enter your new 4-digit PIN." :
    mode==="change" && step==="confirm" ? "Enter your new PIN again to confirm." :
    step==="enter" ? `Hi ${player}! You don't have a PIN yet — choose any 4 digits now to protect your predictions. You'll use this same PIN to log in next time.` :
    "Enter your PIN again to confirm.";

  const btnLabel=
    mode==="enter" ? "Log In" :
    mode==="change" && step==="verify" ? "Verify →" :
    mode==="change" && step==="enter" ? "Next →" :
    mode==="change" && step==="confirm" ? "Save New PIN" :
    step==="enter" ? "Next →" : "Set PIN & Log In";

  return(
    <div style={{...S.card,border:"2px solid #7C3AED",padding:24}}>

      {/* Player name badge */}
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{display:"inline-block",background:"#7C3AED22",border:"2px solid #7C3AED",
          borderRadius:12,padding:"8px 20px",marginBottom:10}}>
          <span style={{fontSize:20,fontWeight:800,color:playerColour(player)}}>{player}</span>
        </div>
        <div style={{fontSize:18,fontWeight:700,color:"#E2E8F0"}}>{title}</div>
        <p style={{color:"#94A3B8",fontSize:13,margin:"6px 0 0"}}>{subtitle}</p>
      </div>

      {/* PIN digit boxes */}
      <div style={{display:"flex",gap:14,justifyContent:"center",marginBottom:20}}>
        {[0,1,2,3].map(i=>(
          <input key={i} ref={refs[i]} type="password" inputMode="numeric" maxLength={1}
            value={current[i]}
            onChange={e=>handleDigit(i,e.target.value,current,setCurrent)}
            onKeyDown={e=>handleKey(i,e,current,setCurrent)}
            style={{
              width:64,height:72,textAlign:"center",fontSize:36,fontWeight:800,
              background:current[i]?"#4C1D9533":"#1E293B",
              border:`3px solid ${error?"#EF4444":current[i]?"#7C3AED":"#475569"}`,
              borderRadius:14,color:"#E2E8F0",outline:"none",
              boxShadow:current[i]?"0 0 12px #7C3AED66":"none",
              transition:"all 0.15s"
            }}
          />
        ))}
      </div>

      {error&&(
        <div style={{background:"#7F1D1D33",border:"1px solid #EF444466",borderRadius:8,
          padding:"10px",color:"#EF4444",fontSize:14,textAlign:"center",marginBottom:14,fontWeight:600}}>
          ⚠️ {error}
        </div>
      )}

      <button style={{...S.bb,padding:"16px",fontSize:16,fontWeight:800}} onClick={doSubmit}>
        {btnLabel}
      </button>
      <button style={{...S.sb,width:"100%",marginTop:10,padding:"12px",fontSize:14}} onClick={onCancel}>
        ← Back
      </button>

      {mode==="enter"&&(
        <div style={{marginTop:16,padding:"14px 16px",background:"#F59E0B11",
          border:"1px solid #F59E0B44",borderRadius:10,textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#F59E0B",marginBottom:4}}>🔑 Forgot your PIN?</div>
          <div style={{color:"#94A3B8",fontSize:12,marginBottom:12}}>
            Tap below to reset it. You'll set a new PIN next time you log in.
          </div>
          <button onClick={()=>{
              if(window.confirm(`Reset ${player}'s PIN? You'll set a new one when you next log in.`)){
                onSavePin(player,null);
              }
            }}
            style={{width:"100%",padding:"12px",background:"#F59E0B22",
              border:"2px solid #F59E0B",borderRadius:10,
              color:"#F59E0B",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            🔄 Reset My PIN
          </button>
        </div>
      )}
    </div>
  );
}

function Tag({color,children}){return <span style={{background:`${color}22`,color,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,marginLeft:4,display:"inline-block"}}>{children}</span>;}
function PB({pts,joker,small}){const c=pts>=3?"#34D399":pts>=1?"#60A5FA":"#EF4444";return <span style={{display:"inline-block",background:`${c}22`,color:c,borderRadius:6,padding:small?"2px 6px":"4px 10px",fontSize:small?11:15,fontWeight:800,marginLeft:4,marginTop:2}}>{pts>0?`+${pts}`:"0"}{joker&&pts>0?" ×2":""}</span>;}
