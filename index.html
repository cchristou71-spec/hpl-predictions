}

function Predict({fixtures,displayFixtures,predictions,reveals,publicReveals,deadlines,players,jokers,isPast,jokersUsed,hasJoker,canJoker,me,setMe,pins,setPins,pinScreen,setPinScreen,saveAll,mw,setMw,draft,setDraft,submit,setPredictions,setAdmin,isOnline,admin,setTab}){
  const fxList=(displayFixtures||fixtures)[mw]||[];
  const past=isPast(mw);
  const revealed=reveals[mw]===true; // admin-level reveal
  const publicRevealed=publicReveals[mw]===true; // public reveal (10 AM next morning)
  const canSeeRevealed=publicRevealed||(revealed&&admin); // true if this user can see all predictions
  const ep=me?(predictions[me]||{}):{};
  // Tracks per-fixture save status so each match card can show "Saving…" then
  // "✓ Saved" — confirms a prediction actually persisted rather than leaving it
  // ambiguous, since saves happen silently in the background as you type.
  const [saveStatus,setSaveStatus]=useState({}); // { [fixtureId]: "saving" | "saved" | "error" }
  // Clear draft when player changes — handled explicitly on player select
  // (not moved fixtures whose joker was set in a different MW)
  const jUsed=me?(
    Object.values(draft).some(p=>p.joker) ||
    fxList.some(fx=>(predictions[me]||{})[fx.id]?.joker && !draft[fx.id]?.joker && draft[fx.id]?.joker!==false)
  ):false;
  // Can play joker if: not already used in this displayed MW, and under 5 for half-season
  const jOk=me&&!jUsed&&jokersUsed(me,half(mw))<5;
  const merged=(id)=>draft[id]||ep[id]||{};
  const set_=(id,f,v)=>{
    setDraft(d=>{
      const updated={...d,[id]:{...(d[id]||ep[id]||{}),[f]:v}};
      const pred=updated[id];
      const hg=pred.homeGoals; const ag=pred.awayGoals;
      const bothFilled = hg!==undefined && hg!=="" && ag!==undefined && ag!=="";
      const bothBlank = (hg===undefined||hg==="") && (ag===undefined||ag==="");
      if((bothFilled||bothBlank) && !isPast(mw) && !reveals[mw] && me){
        const hgVal=bothBlank?null:parseInt(hg);
        const agVal=bothBlank?null:parseInt(ag);
        // Preserve existing joker — don't overwrite it when entering scores
        const existingJoker=(predictions[me]||{})[id]?.joker||false;
        const jkVal=pred.joker!==undefined?pred.joker:existingJoker;
        setSaveStatus(s=>({...s,[id]:"saving"}));
        savePrediction(me,id,hgVal,agVal,jkVal)
          .then(()=>{
            setPredictions(pr=>{
              const updated={...pr,[me]:{...(pr[me]||{}),[id]:{homeGoals:hgVal,awayGoals:agVal,joker:jkVal}}};
              try{ const c=JSON.parse(localStorage.getItem('hpl_cache')||'{}'); localStorage.setItem('hpl_cache',JSON.stringify({...c,ts:Date.now(),predictions:updated})); }catch(e){}
              return updated;
            });
            // Clear from draft once saved - reads from predictions state going forward
            setDraft(d=>{const nd={...d};delete nd[id];return nd;});
            setSaveStatus(s=>({...s,[id]:"saved"}));
            setTimeout(()=>{ setSaveStatus(s=>{ const next={...s}; if(next[id]==="saved") delete next[id]; return next; }); }, 2500);
          }).catch(e=>{
            console.error(e);
            setSaveStatus(s=>({...s,[id]:"error"}));
          });
      }
      return updated;
    });
  };
  const toggleJ=(id)=>{
    const cur=(draft[id]||ep[id]||{}).joker;
    if(cur){
      // Turning OFF — always allowed, clear from all fixtures in MW and auto-save
      const nd={...draft};
      fxList.forEach(fx=>{
        if(nd[fx.id]?.joker) nd[fx.id]={...nd[fx.id],joker:false};
        if(!nd[fx.id]&&ep[fx.id]?.joker) nd[fx.id]={...ep[fx.id],joker:false};
      });
      setDraft(nd);
      // Save the cleared joker to Supabase
      if(me){
        const pred=nd[id]||ep[id]||{};
        savePrediction(me,id,pred.homeGoals??null,pred.awayGoals??null,false).catch(console.error);
      }
    } else {
      // Turning ON — validate half-season limit (excluding current MW)
      const h=half(mw);
      // Count jokers in OTHER MWs this half (using display MW for accuracy)
      const df2=displayFixtures||fixtures;
      const fxDMW={};
      Object.entries(df2).forEach(([mwStr,fxList])=>{
        fxList.forEach(fx=>{ fxDMW[fx.id]=parseInt(mwStr); });
      });
      const pPreds=predictions[me]||{};
      let jkOtherMWs=0;
      Object.entries(pPreds).forEach(([fxId,pred])=>{
        if(!pred?.joker) return;
        const displayedMW=fxDMW[fxId]||parseInt(fxId.split('-')[0]);
        // A moved fixture's joker counts for its ORIGINAL half (H1 fixture stays H1)
        // but only counts against CURRENT week's limit if it shows in current MW
        const origMW=parseInt(fxId.split('-')[0]);
        if(half(origMW)===h && displayedMW!==mw) jkOtherMWs++;
      });
      if(jkOtherMWs>=5){
        toast_("Joker limit — you've used all 5 jokers this half-season","error");
        return;
      }
      // Check not already using a joker in this MW (different fixture)
      const hasOtherJoker=fxList.some(fx=>{
        if(fx.id===id) return false;
        return (draft[fx.id]?.joker)||(ep[fx.id]?.joker&&draft[fx.id]?.joker!==false);
      });
      if(hasOtherJoker){
        toast_("Only 1 joker allowed per match week — remove the other joker first","error");
        return;
      }
      // Set joker, clearing others, and auto-save
      const nd={...draft};
      fxList.forEach(fx=>{
        if(nd[fx.id]?.joker) nd[fx.id]={...nd[fx.id],joker:false};
        if(!nd[fx.id]&&ep[fx.id]?.joker) nd[fx.id]={...ep[fx.id],joker:false};
      });
      nd[id]={...(nd[id]||ep[id]||{}),joker:true};
      setDraft(nd);
      // Auto-save joker to Supabase — use existing prediction goals if draft is empty
      if(me){
        const existing=predictions[me]?.[id]||{};
        const pred=nd[id]||ep[id]||{};
        const hg = pred.homeGoals??existing.homeGoals??null;
        const ag = pred.awayGoals??existing.awayGoals??null;
        savePrediction(me,id,hg,ag,true).catch(console.error);
        // Clear joker from others
        fxList.forEach(fx=>{
          if(fx.id!==id && (nd[fx.id]?.joker===false || (!nd[fx.id]&&ep[fx.id]?.joker))){
            const existFx=predictions[me]?.[fx.id]||{};
            const p=nd[fx.id]||ep[fx.id]||{};
            savePrediction(me,fx.id,p.homeGoals??existFx.homeGoals??null,p.awayGoals??existFx.awayGoals??null,false).catch(console.error);
          }
        });
      }
    }
  };

  const[changingPin,setChangingPin]=useState(false);

  const handleSelectPlayer=(p)=>{
    if(pins[p]){
      setPinScreen({player:p,mode:"enter"});
    } else {
      setPinScreen({player:p,mode:"set"});
    }
  };

  // Admin shortcut: if logged in as admin, can select player without PIN
  if(!me&&admin) return (
    <div style={S.card}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:13,color:"#F59E0B",fontWeight:700,marginBottom:8}}>⚙️ Admin Mode</div>
        <div style={S.ct}>Select your player name</div>
        <p style={{color:"#64748B",fontSize:13,marginTop:6}}>As admin, no PIN required</p>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center"}}>
        {players.map(p=>(
          <button key={p} onClick={()=>{setMe(p);setDraft({});setPinScreen(null);}}
            style={{...S.pBtn,color:playerColour(p),borderColor:playerColour(p)+"44",
              fontSize:16,padding:"10px 18px",fontWeight:700}}>
            {p}
          </button>
        ))}
      </div>
    </div>
  );

  if(!me) return (
    <div>
      {!pinScreen ? (
        <div style={S.card}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:40,marginBottom:8}}>⚽</div>
            <div style={S.ct}>Welcome to HPL Predictions</div>
            <p style={{color:"#64748B",fontSize:13,marginTop:6}}>
              Who's predicting? Tap your name below — first time, you'll set your own PIN.
            </p>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center"}}>
            {players.map(p=>(
              <button key={p} onClick={()=>handleSelectPlayer(p)}
                style={{...S.pBtn,color:playerColour(p),borderColor:playerColour(p)+"44",
                  fontSize:16,padding:"14px 22px",fontWeight:700,flex:"1 1 calc(50% - 10px)",minWidth:120}}>
                {p}
              </button>
            ))}
          </div>
        </div>
      ) : (
        <PinScreen
          player={pinScreen.player}
          mode={pinScreen.mode}
          pins={pins}
          onSuccess={(p)=>{ setMe(p); setPinScreen(null); setNameInput(""); setAdmin(false); }}
          onSavePin={(p,pin)=>{
            const newPins={...pins};
            if(pin===null){delete newPins[p];}else{newPins[p]=pin;}
            setPins(newPins);
            saveAll({pins:newPins});
            if(pin!==null){setMe(p);setAdmin(false);}
            setPinScreen(null);
            setNameInput("");
          }}
          onCancel={()=>{setPinScreen(null);}}
        />
      )}
    </div>
  );

  return(
    <div>
      {/* Logged-in user banner */}
      <div style={{background:playerColour(me)+"22",border:`2px solid ${playerColour(me)}55`,
        borderRadius:12,padding:"12px 16px",marginBottom:14,
        display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:playerColour(me),flexShrink:0}}/>
          <div>
            <div style={{fontSize:11,color:"#64748B",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>
              Logged in as
            </div>
            <div style={{fontSize:20,fontWeight:800,color:playerColour(me),lineHeight:1.1}}>{me}</div>
            <div style={{fontSize:11,color:"#64748B",marginTop:2}}>
              {(()=>{
                const df=displayFixtures||fixtures;
                const revs=Object.entries(reveals||{}).filter(([,v])=>v).map(([k])=>parseInt(k));
                let tot=0;
                revs.forEach(w=>{
                  (df[w]||[]).forEach(fx=>{
                    if(!fx.result)return;
                    const pred=(predictions[me]||{})[fx.id];if(!pred)return;
                    const pts=calcPts(pred,fx.result);if(pts===null)return;
                    tot+=pts*(pred.joker?2:1);
                  });
                });
                return <span style={{color:playerColour(me),fontWeight:700,fontSize:14}}>{tot} pts</span>;
              })()}
            </div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.sb,fontSize:13,padding:"6px 14px"}}
              onClick={()=>{setMe(null);setAdmin(false);setDraft({});setChangingPin(false);setPinScreen(null);}}>
              🔄 Switch User
            </button>
            <button style={{...S.sb,color:"#F59E0B",border:"1px solid #F59E0B44",fontSize:13,padding:"6px 14px"}}
              onClick={()=>setChangingPin(true)}>
              🔑 Change PIN
            </button>
          </div>
          {[1,2].map(h=>{
              const used=jokersUsed(me,h);
              const remaining=5-used;
              return(
                <div key={h} style={{background:"#1E293B",border:`1px solid ${remaining>0?"#F59E0B44":"#EF444444"}`,
                  borderRadius:8,padding:"6px 10px",fontSize:12}}>
                  <div style={{color:"#64748B",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>
                    {h===1?"H1 Jokers":"H2 Jokers"}
                  </div>
                  <div style={{display:"flex",gap:3,marginBottom:4}}>
                    {Array.from({length:5},(_,i)=>(
                      <div key={i} style={{width:16,height:8,borderRadius:3,
                        background:i<used?"#F59E0B":"#334155"}}/>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:6,fontSize:11}}>
                    <span style={{color:"#F59E0B"}}>{used} used</span>
                    <span style={{color:"#475569"}}>·</span>
                    <span style={{color:remaining>0?"#34D399":"#EF4444",fontWeight:700}}>{remaining} left</span>
                  </div>
                </div>
              );
            })}
        </div>
      </div>

      {changingPin&&(
        <PinScreen
          player={me}
          mode="change"
          pins={pins}
          onSuccess={()=>setChangingPin(false)}
          onSavePin={(p,pin)=>{
            const newPins={...pins};
            if(pin===null){delete newPins[p];}else{newPins[p]=pin;}
            setPins(newPins);
            saveAll({pins:newPins});
            setChangingPin(false);
          }}
          onCancel={()=>setChangingPin(false)}
        />
      )}

      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={S.ct}>Match Week</span>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button style={S.sb} onClick={()=>setMw(m=>Math.max(1,m-1))}>◀</button>
            <span style={{...S.badge,background:"#7C3AED",fontSize:14,padding:"5px 12px"}}>MW {mw}</span>
            <button style={S.sb} onClick={()=>{const mws=Object.keys(displayFixtures||fixtures).map(Number);const max=mws.length?Math.max(...mws):38;setMw(m=>Math.min(max,m+1));}}>▶</button>
          </div>
        </div>
        {/* W/c date for selected MW */}
        {(()=>{
          const fxList=(displayFixtures||fixtures)[mw]||[];
          const dates=fxList.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
          if(!dates.length) return null;
          const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
          const day=earliest.getDay();
          const wednesday2=new Date(earliest);
          wednesday2.setDate(earliest.getDate()-(day>=3?day-3:day+4));
          const wc=wednesday2.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
          return(
            <div style={{fontSize:14,color:"#94A3B8",fontWeight:600,marginTop:6,marginBottom:2}}>
              📅 Week commencing <span style={{color:"#E2E8F0"}}>{wc}</span>
            </div>
          );
        })()}
        {/* How-to instructions */}
      <div style={{...S.card,background:"#0F172A",border:"1px solid #334155",marginBottom:10,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>
          📋 How to predict
        </div>
        <div style={{fontSize:12,color:"#64748B",lineHeight:1.8}}>
          <div>1️⃣ <b style={{color:"#94A3B8"}}>Pick a match week</b> below — <span style={{color:"#FCD34D"}}>yellow</span> = still to predict</div>
          <div>2️⃣ <b style={{color:"#94A3B8"}}>Enter scores</b> for each fixture</div>
          <div>3️⃣ <b style={{color:"#94A3B8"}}>Play a 🃏 Joker</b> to double points (max 1 per week, 5 per half-season)</div>
          <div>4️⃣ <b style={{color:"#94A3B8"}}>Tap Save</b> — you can come back and change until the deadline</div>
        </div>
      </div>
      <div style={S.mwWrap}>
          {Object.keys(displayFixtures||fixtures).length === 0 ? (
            <div style={{color:"#64748B",fontSize:13,padding:"12px 0",textAlign:"center",width:"100%"}}>
              ⏳ Fixtures not yet released — check back after 19 June 2026</div>
          ) : Array.from({length:Math.max(...Object.keys(displayFixtures||fixtures).map(Number))},(_,i)=>i+1).map(w=>{
            const notRevealed = !reveals[w];
            // Get Monday w/c for this MW
            const fxW=(displayFixtures||fixtures)[w]||[];
            const datesW=fxW.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
            let wcStr="";
            if(datesW.length){
              const earliest=new Date(Math.min(...datesW.map(d=>d.getTime())));
              const day=earliest.getDay();
              const wcDate=new Date(earliest);
              const dToWed=day>=3?day-3:day+4;
              wcDate.setDate(earliest.getDate()-dToWed);
              wcStr=wcDate.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
            }
            return(
              <button key={w} onClick={()=>{setMw(w);setDraft({});}} style={{...S.mwBtn,
                background:mw===w?(reveals[w]?"#064E3B":"#A16207"):reveals[w]?"#064E3B":"#854D0E",
                border:mw===w?(reveals[w]?"2px solid #34D399":"2px solid #FCD34D"):reveals[w]?"1px solid #34D39966":"1px solid #F59E0B",
                color:mw===w?(reveals[w]?"#34D399":"#FEF08A"):reveals[w]?"#34D399":"#FCD34D",
                boxShadow:mw===w?(reveals[w]?"0 0 8px #34D39944":"0 0 10px #F59E0B66"):"none",
                display:"flex",flexDirection:"column",alignItems:"center",gap:1,
                padding:"5px 4px",minWidth:38,lineHeight:1.2}}>
                <span style={{fontSize:13,fontWeight:800}}>{w}</span>
                {wcStr&&<span style={{fontSize:8,opacity:0.9,whiteSpace:"nowrap"}}>{wcStr}</span>}
                {reveals[w]&&<span style={{fontSize:8,color:mw===w?"#FEF08A":"#34D399"}}>✓</span>}
                {me&&(()=>{
                  const fxW2=(displayFixtures||fixtures)[w]||[];
                  const hasJ=fxW2.some(fx=>{
                    const savedJoker=(predictions[me]||{})[fx.id]?.joker;
                    const draftJoker=(!reveals[w])&&draft[fx.id]?.joker;
                    return savedJoker||draftJoker;
                  });
                  return hasJ?<span style={{fontSize:10,lineHeight:1}}>🃏</span>:null;
                })()}
              </button>
            );
          })}
        </div>
        <div style={{marginTop:6,fontSize:11,color:"#475569"}}>
          ⚠️ Fixture dates last updated: <b style={{color:"#94A3B8"}}>{FIXTURES_UPDATED}</b> — check Admin to update moved games
        </div>
      </div>

      {!isOnline&&me&&(
        <div style={{background:"#1C1917",border:"1px solid #F59E0B",borderRadius:10,
          padding:"12px 16px",marginBottom:10,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#FCD34D",marginBottom:4}}>
            📡 You are offline
          </div>
          <div style={{fontSize:13,color:"#D97706"}}>
            Predictions cannot be saved without an internet connection. Please reconnect before entering your predictions.
          </div>
        </div>
      )}
      <div style={{...S.card,padding:"10px 16px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#64748B",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>Deadline</div>
            <div style={{fontSize:17,fontWeight:700,color:past?"#EF4444":"#34D399",marginTop:2}}>
              {(()=>{
                if(deadlines[mw]){
                  return new Date(deadlines[mw]).toLocaleString("en-GB",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"})+" BST";
                }
                // Compute suggested deadline: Friday 19:00 BST of MW week
                const fxList=(displayFixtures||fixtures)[mw]||[];
                const dates=fxList.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
                if(!dates.length) return "Not set";
                const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
                const day=earliest.getDay();
                const wed=new Date(earliest);
                wed.setDate(earliest.getDate()-(day>=3?day-3:day+4));
                wed.setHours(18,0,0,0); // 18:00 UTC = 19:00 BST
                const sugStr=wed.toLocaleString("en-GB",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"})+" BST";
                return <span style={{color:"#64748B",fontSize:14}}>{sugStr} <span style={{fontSize:11,color:"#475569"}}>(suggested — not yet set)</span></span>;
              })()}
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {revealed&&<Tag color="#EF4444">🔒 Locked</Tag>}
            {past&&!revealed&&<Tag color="#EF4444">⏰ Closed</Tag>}
            {!past&&!revealed&&<Tag color="#60A5FA">✅ Open</Tag>}
          </div>
        </div>
      </div>

      {fxList.map(fx=>{
        const pred=merged(fx.id);
        const isJ = draft[fx.id]?.joker === true || 
          (draft[fx.id]?.joker !== false && (predictions[me]||{})[fx.id]?.joker === true);
        // Lock if: current MW past deadline OR current MW revealed OR original MW revealed (fixture moved)
        // For moved fixtures, also lock if the original MW is revealed
        // A moved fixture is locked if its original MW is revealed AND the player made a prediction
        // If no prediction was made, it should be open for entry in the new MW
        // Moved fixtures: lock only based on CURRENT display MW reveal/deadline
        // The original MW's reveal status does NOT lock a rescheduled fixture
        const past=isPast(mw);
        const adminUnrevealed = reveals[mw]===false;
        const off = adminUnrevealed ? false : (past||revealed);
        const moved=fx.currentDate!==fx.date;
        const fxStatus=saveStatus[fx.id];
        return(
          <div key={fx.id} style={{...S.fx,borderLeft:isJ?"3px solid #F59E0B":"3px solid #1E293B"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:6}}>
              <div style={{fontSize:12,color:moved?"#F59E0B":"#64748B",flex:1,lineHeight:1.4}}>
                {moved?(<>
                  <s style={{color:"#EF4444",marginRight:4}}>{fmtS(fx.date)}</s>
                  <b style={{color:"#F59E0B"}}>&rarr; {fmtF(fx.currentDate,fx.currentTime)}</b>
                  <Tag color="#F59E0B">Moved from MW{fx.mw}</Tag>

                </>):fmtF(fx.currentDate,fx.currentTime)}
              </div>
              {fxStatus==="saving"&&<span style={{fontSize:10,color:"#64748B",fontWeight:600,flexShrink:0}}>Saving…</span>}
              {fxStatus==="saved"&&<span style={{fontSize:10,color:"#34D399",fontWeight:700,flexShrink:0}}>✓ Saved</span>}
              {fxStatus==="error"&&<span style={{fontSize:10,color:"#EF4444",fontWeight:700,flexShrink:0}}>⚠ Not saved</span>}
              {!off&&<button onClick={()=>toggleJ(fx.id)} disabled={!jOk&&!isJ}
                style={{...S.jBtn,opacity:(!jOk&&!isJ)?0.35:1,background:isJ?"#F59E0B22":"transparent",border:isJ?"1px solid #F59E0B":"1px solid #334155"}}>
                🃏{isJ?" ON":" Joker"}
              </button>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              {/* Home team - right aligned */}
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4,minWidth:0}}>
                <span style={{fontSize:13,fontWeight:700,color:"#E2E8F0",textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sn(fx.home)}</span>
                <Badge team={fx.home} size={22}/>
              </div>
              {/* Score inputs - fixed width, never shrinks */}
              <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                <input type="number" min={0} max={9} inputMode="numeric" disabled={off}
                  value={pred.homeGoals??""}
                  onFocus={e=>e.target.select()}
                  onChange={e=>{
                    const v=String(e.target.value).slice(-1);
                    if(v===""||/^[0-9]$/.test(v)){
                      set_(fx.id,"homeGoals",v);
                      if(v!==""){
                        const next=e.target.closest("div").querySelector("input:last-of-type");
                        if(next)next.focus();
                      }
                    }
                  }}
                  style={{...S.gi,...(off?S.giOff:{})}} />
                <span style={{color:"#7C3AED",fontSize:20,fontWeight:900,width:14,textAlign:"center",flexShrink:0}}>–</span>
                <input type="number" min={0} max={9} inputMode="numeric" disabled={off}
                  value={pred.awayGoals??""}
                  onFocus={e=>e.target.select()}
                  onChange={e=>{
                    const v=String(e.target.value).slice(-1);
                    if(v===""||/^[0-9]$/.test(v)){
                      set_(fx.id,"awayGoals",v);
                      if(v!==""){
                        // Find next fixture's home input
                        const allInputs=Array.from(document.querySelectorAll('input[type="number"]:not(:disabled)'));
                        const curIdx=allInputs.indexOf(e.target);
                        const nextHome=allInputs[curIdx+1];
                        if(nextHome) nextHome.focus();
                        else e.target.blur(); // Last fixture — just blur
                      }
                    }
                  }}
                  style={{...S.gi,...(off?S.giOff:{})}} />
              </div>
              {/* Away team - left aligned */}
              <div style={{flex:1,display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                <Badge team={fx.away} size={22}/>
                <span style={{fontSize:13,fontWeight:700,color:"#E2E8F0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sn(fx.away)}</span>
              </div>
            </div>
            {fx.result&&canSeeRevealed&&(
              <div style={{textAlign:"center",marginTop:8,fontSize:14,color:"#94A3B8"}}>
                Result: <b style={{color:"#34D399"}}>{fx.result.homeGoals}–{fx.result.awayGoals}</b>
                {pred.homeGoals!==undefined&&<PB pts={calcPts(pred,fx.result)*(isJ?2:1)} joker={isJ}/>}
              </div>
            )}
          </div>
        );
      })}
      {!past&&!canSeeRevealed&&(
        <div style={{textAlign:"center",fontSize:12,color:"#475569",padding:"8px",marginTop:4}}>
          ✓ Predictions save automatically as you enter them
        </div>
      )}
    </div>
  );
}



function HistoricResults({fixtures,displayFixtures,predictions,reveals,publicReveals,players,jokers,admin,me,demoMode,setDemoMode}){
  const df=displayFixtures||fixtures;
  // Show ALL match weeks — past (revealed) with predictions, future with fixtures only
  const allMWs=Object.keys(df).map(Number).filter(w=>w>=1&&w<=38&&(df[w]||[]).length>0).sort((a,b)=>a-b);
  const isRevealed=(w)=>admin?reveals[w]===true:publicReveals[w]===true;

  // Auto-expand: find the current active MW (last revealed, or first upcoming if none revealed)
  const defaultMW = React.useMemo(()=>{
    const revealedMWList=allMWs.filter(w=>isRevealed(w));
    if(revealedMWList.length) return revealedMWList[revealedMWList.length-1]; // last revealed
    return allMWs[0]||null; // first upcoming
  },[allMWs.join(',')]);
  const[expandedMW,setExpandedMW]=React.useState(()=>defaultMW);

  if(allMWs.length===0){
    return(
      <div style={{padding:24,textAlign:"center"}}>
        {setDemoMode&&(
          <button onClick={()=>setDemoMode(true)}
            style={{background:"#7C3AED",color:"#fff",border:"none",borderRadius:8,
              padding:"10px 20px",fontSize:14,fontWeight:700,cursor:"pointer",display:"block",margin:"0 auto 12px"}}>
            🎭 Preview with demo data
          </button>
        )}
        <div style={{color:"#64748B",fontSize:14}}>No fixtures loaded yet.</div>
      </div>
    );
  }

  const fmtDate=(d)=>{
    if(!d)return"";
    return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"});
  };

  // player order: sort by total points desc (only count revealed MWs)
  const revealedMWs=allMWs.filter(w=>isRevealed(w));
  const sortedPlayers=[...players].sort((a,b)=>{
    const ptsA=revealedMWs.reduce((sum,w)=>{
      const fxs=df[w]||[];
      return sum+fxs.reduce((s,fx)=>{
        if(!fx.result)return s;
        const pred=(predictions[a]||{})[fx.id];
        if(!pred)return s;
        return s+(calcPts(pred,fx.result)||0);
      },0);
    },0);
    const ptsB=revealedMWs.reduce((sum,w)=>{
      const fxs=df[w]||[];
      return sum+fxs.reduce((s,fx)=>{
        if(!fx.result)return s;
        const pred=(predictions[b]||{})[fx.id];
        if(!pred)return s;
        return s+(calcPts(pred,fx.result)||0);
      },0);
    },0);
    return ptsB-ptsA;
  });

  const ptColor=(pts)=>{
    if(pts===3)return"#34D399";
    if(pts===1)return"#F59E0B";
    if(pts===0)return"#94A3B8";
    return"#94A3B8";
  };

  const cellW=90;
  const colW=70;

  return(
    <>
      {demoMode&&setDemoMode&&(
        <div style={{background:"#7C3AED22",border:"1px solid #7C3AED",borderRadius:8,
          margin:"12px 16px 0",padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#A78BFA",fontWeight:600}}>🎭 Demo mode — showing fake data for preview purposes</span>
          <button onClick={()=>setDemoMode(false)}
            style={{background:"#7C3AED",color:"#fff",border:"none",borderRadius:6,
              padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            Exit demo
          </button>
        </div>
      )}
    <div style={{padding:"12px 0 80px",overflowX:"auto"}}>
      {allMWs.map(w=>{
        const fxs=(df[w]||[]).sort((a,b)=>new Date(a.currentDate||a.date)-new Date(b.currentDate||b.date));
        const fxsWithResult=fxs.filter(fx=>fx.result);
        const revealed=isRevealed(w);
        const isFuture=fxsWithResult.length===0;

        // MW totals per player (only for revealed MWs)
        const mwTotals={};
        if(revealed){
          sortedPlayers.forEach(p=>{
            mwTotals[p]=fxsWithResult.reduce((sum,fx)=>{
              const pred=(predictions[p]||{})[fx.id];
              const pts=pred?calcPts(pred,fx.result):null;
              const jk=(jokers[p]||{})[w];
              return sum+(pts!=null?pts*(jk?2:1):0);
            },0);
          });
        }

        // Status tag
        const statusTag = isFuture
          ? <span style={{fontSize:10,color:"#64748B",background:"#1E293B",borderRadius:4,padding:"2px 6px"}}>Upcoming</span>
          : revealed
          ? <span style={{fontSize:10,color:"#34D399",background:"#064E3B33",borderRadius:4,padding:"2px 6px"}}>Revealed</span>
          : <span style={{fontSize:10,color:"#F59E0B",background:"#78350F33",borderRadius:4,padding:"2px 6px"}}>Pending reveal</span>;

        return(
          <div key={w} style={{marginBottom:32}}>
            {/* MW Header — clickable to expand/collapse */}
            <div onClick={()=>setExpandedMW(expandedMW===w?null:w)}
              style={{display:"flex",alignItems:"center",gap:12,padding:"8px 16px",
              background:"#1E293B",borderBottom:"1px solid #334155",cursor:"pointer",userSelect:"none"}}>
              <div style={{fontSize:13,fontWeight:800,color:"#A78BFA"}}>Match Week {w}</div>
              <div style={{fontSize:11,color:"#64748B"}}>{isFuture?`${fxs.length} fixture${fxs.length!==1?"s":""}`:`${fxsWithResult.length} result${fxsWithResult.length!==1?"s":""}`}</div>
              {statusTag}
              <span style={{marginLeft:"auto",fontSize:12,color:"#475569"}}>{expandedMW===w?"▲":"▼"}</span>
            </div>

            {expandedMW===w && isFuture ? (
              /* Future MW — show fixture list only */
              <div style={{padding:"8px 0"}}>
                {fxs.map((fx,i)=>(
                  <div key={fx.id} style={{display:"flex",alignItems:"center",
                    padding:"6px 16px",borderBottom:"1px solid #0F172A",
                    background:i%2===0?"#1E293B11":"transparent"}}>
                    <span style={{fontSize:11,color:"#475569",width:70,flexShrink:0}}>{fmtDate(fx.currentDate||fx.date)}</span>
                    <span style={{flex:1,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5}}>
                      <span style={{fontSize:12,color:"#E2E8F0",fontWeight:500}}>{fx.home}</span>
                      <Badge team={fx.home} size={18}/>
                    </span>
                    <span style={{fontSize:11,color:"#475569",width:24,textAlign:"center",flexShrink:0}}>v</span>
                    <span style={{flex:1,display:"flex",alignItems:"center",justifyContent:"flex-start",gap:5}}>
                      <Badge team={fx.away} size={18}/>
                      <span style={{fontSize:12,color:"#E2E8F0",fontWeight:500}}>{fx.away}</span>
                    </span>
                  </div>
                ))}
              </div>
            ) : expandedMW===w && revealed ? (
              /* Revealed MW — show full predictions table */
              <div style={{overflowX:"auto"}}>
                <table style={{borderCollapse:"collapse",width:"100%",minWidth:sortedPlayers.length*colW+cellW+200}}>
                  <thead>
                    <tr style={{background:"#0F172A"}}>
                      <th style={{padding:"6px 12px",textAlign:"left",fontSize:11,color:"#64748B",
                        fontWeight:600,width:80,position:"sticky",left:0,background:"#0F172A",zIndex:2}}>Date</th>
                      <th style={{padding:"6px 8px",textAlign:"left",fontSize:11,color:"#64748B",
                        fontWeight:600,minWidth:160}}>Match</th>
                      <th style={{padding:"6px 8px",textAlign:"center",fontSize:11,color:"#F59E0B",
                        fontWeight:700,minWidth:cellW}}>Result</th>
                      {sortedPlayers.map(p=>{
                        const jk=(jokers[p]||{})[w];
                        return(
                          <th key={p} style={{padding:"6px 4px",textAlign:"center",fontSize:11,
                            color:p===me?"#A78BFA":"#94A3B8",fontWeight:p===me?800:600,
                            minWidth:colW,maxWidth:colW}}>
                            {p}{p===me?" ⭐":""}{jk?" 🃏":""}
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {/* Joker row — show which players used joker this MW */}
                    {sortedPlayers.some(p=>(jokers[p]||{})[w])&&(
                      <tr style={{background:"#78350F22",borderBottom:"1px solid #334155"}}>
                        <td colSpan={3} style={{padding:"3px 12px",fontSize:10,color:"#F59E0B",fontStyle:"italic"}}>🃏 Joker played</td>
                        {sortedPlayers.map(p=>{
                          const jk=(jokers[p]||{})[w];
                          return <td key={p} style={{textAlign:"center",fontSize:11,color:"#F59E0B",padding:"3px 4px",background:p===me?"#7C3AED11":"transparent"}}>{jk?"🃏":""}</td>;
                        })}
                      </tr>
                    )}
                    {fxsWithResult.map((fx,i)=>(
                      <tr key={fx.id} style={{background:i%2===0?"#1E293B11":"transparent",
                        borderBottom:"1px solid #1E293B"}}>
                        <td style={{padding:"6px 12px",fontSize:11,color:"#64748B",
                          position:"sticky",left:0,background:i%2===0?"#0F172A":"#070B14",zIndex:1}}>
                          {fmtDate(fx.currentDate||fx.date)}
                        </td>
                        <td style={{padding:"6px 8px",fontSize:12}}>
                          <span style={{color:"#E2E8F0",fontWeight:500}}>{fx.home}</span>
                          <span style={{color:"#475569",margin:"0 4px"}}>v</span>
                          <span style={{color:"#E2E8F0",fontWeight:500}}>{fx.away}</span>
                        </td>
                        <td style={{padding:"6px 8px",textAlign:"center"}}>
                          <span style={{fontSize:14,fontWeight:800,color:"#F59E0B"}}>
                            {fx.result.homeGoals}–{fx.result.awayGoals}
                          </span>
                        </td>
                        {sortedPlayers.map(p=>{
                          const pred=(predictions[p]||{})[fx.id];
                          const pts=pred?calcPts(pred,fx.result):null;
                          const jk=(jokers[p]||{})[w];
                          const fp=pts!=null?pts*(jk?2:1):null;
                          return(
                            <td key={p} style={{padding:"4px",textAlign:"center",
                              background:p===me?"#7C3AED11":"transparent"}}>
                              {pred?(
                                <div>
                                  <div style={{fontSize:12,color:"#CBD5E1",fontWeight:500}}>
                                    {pred.homeGoals}–{pred.awayGoals}
                                  </div>
                                  <div style={{fontSize:11,fontWeight:700,color:ptColor(pts)}}>
                                    {fp!=null?(jk?`+${fp} 🃏`:`+${fp}`):""}
                                  </div>
                                </div>
                              ):(
                                <span style={{fontSize:11,color:"#334155"}}>—</span>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                    {/* MW Totals row */}
                    <tr style={{background:"#1E293B",borderTop:"2px solid #334155"}}>
                      <td colSpan={3} style={{padding:"6px 12px",fontSize:12,fontWeight:700,
                        color:"#94A3B8",position:"sticky",left:0,background:"#1E293B",zIndex:1}}>
                        MW {w} Total
                      </td>
                      {sortedPlayers.map(p=>(
                        <td key={p} style={{padding:"6px 4px",textAlign:"center",
                          background:p===me?"#7C3AED22":"transparent"}}>
                          <span style={{fontSize:13,fontWeight:800,
                            color:mwTotals[p]>0?"#34D399":"#475569"}}>
                            {mwTotals[p]}
                          </span>
                        </td>
                      ))}
                    </tr>
                  </tbody>
                </table>
              </div>
            ) : expandedMW===w ? (
              /* Results exist but not yet revealed */
              <div style={{padding:"16px",textAlign:"center",color:"#475569",fontSize:13}}>
                🔒 Predictions hidden until reveal
              </div>
            ) : null}
          </div>
        );
      })}
    </div>
    </>
  );
}

function RecentResults({fixtures,displayFixtures}){
  const df=displayFixtures||fixtures;

  // Collect all MWs that have at least one result, sorted descending, take last 6
  const mwsWithResults=Object.keys(df)
    .map(w=>parseInt(w))
    .filter(w=>{
      const fxs=df[w]||[];
      return fxs.some(fx=>fx.result);
    })
    .sort((a,b)=>b-a)
    .slice(0,6);

  const fmtDate=(d,t)=>{
    if(!d)return"";
    const dt=new Date(d+"T"+(t||"12:00"));
    return dt.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  };

  if(mwsWithResults.length===0){
    return(
      <div style={{padding:24,textAlign:"center",color:"#64748B",fontSize:14}}>
        No results yet this season.
      </div>
    );
  }

  return(
    <div style={{padding:"12px 16px 80px"}}>
      <div style={{fontSize:13,color:"#64748B",marginBottom:12}}>Last {mwsWithResults.length} weeks with results</div>
      {mwsWithResults.map(w=>{
        const fxs=(df[w]||[]).filter(fx=>fx.result).sort((a,b)=>new Date(a.currentDate||a.date)-new Date(b.currentDate||b.date));
        return(
          <div key={w} style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:800,color:"#A78BFA",textTransform:"uppercase",
              letterSpacing:1,marginBottom:8,paddingBottom:4,borderBottom:"1px solid #1E293B"}}>
              Match Week {w}
            </div>
            {fxs.map(fx=>{
              const hg=fx.result.homeGoals, ag=fx.result.awayGoals;
              const homeWin=hg>ag, awayWin=ag>hg, draw=hg===ag;
              return(
                <div key={fx.id} style={{display:"flex",alignItems:"center",gap:8,
                  padding:"8px 0",borderBottom:"1px solid #0F172A"}}>
                  {/* Date */}
                  <div style={{fontSize:11,color:"#475569",width:72,flexShrink:0}}>
                    {fmtDate(fx.currentDate||fx.date, fx.currentTime||fx.time)}
                  </div>
                  {/* Home team */}
                  <div style={{flex:1,textAlign:"right",fontSize:13,fontWeight:homeWin?800:400,
                    color:homeWin?"#E2E8F0":"#94A3B8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {fx.home}
                  </div>
                  {/* Score */}
                  <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                    <span style={{fontSize:16,fontWeight:800,
                      color:homeWin?"#34D399":draw?"#F59E0B":"#94A3B8",
                      minWidth:18,textAlign:"right"}}>{hg}</span>
                    <span style={{fontSize:12,color:"#475569",padding:"0 2px"}}>–</span>
                    <span style={{fontSize:16,fontWeight:800,
                      color:awayWin?"#34D399":draw?"#F59E0B":"#94A3B8",
                      minWidth:18,textAlign:"left"}}>{ag}</span>
                  </div>
                  {/* Away team */}
                  <div style={{flex:1,textAlign:"left",fontSize:13,fontWeight:awayWin?800:400,
                    color:awayWin?"#E2E8F0":"#94A3B8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {fx.away}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function Results({fixtures,displayFixtures,predictions,reveals,publicReveals,players,jokers,me,admin,expMW,setExpMW,search,setSearch,searchMode,setSearchMode,homeQ,setHomeQ,awayQ,setAwayQ}){
  const [summaryOpen,setSummaryOpen]=useState(false);
  // homeQ/awayQ/searchMode all lifted to App level — persist across tab switches

  // Flatten ALL fixtures for search - all 38 MWs including future ones
  const allFx=useMemo(()=>{
    const out=[];
    const df=displayFixtures||fixtures;
    // Use displayFixtures for moved-game awareness, but ensure all 38 MWs covered
    // Also scan raw fixtures to catch any not yet in displayFixtures
    const seen=new Set();
    Object.entries(df).forEach(([w,fxs])=>fxs.forEach(fx=>{
      out.push({...fx,displayMW:parseInt(w)});
      seen.add(fx.id);
    }));
    // Add any raw fixtures not yet in displayFixtures (future MWs not yet computed)
    Object.entries(fixtures).forEach(([w,fxs])=>fxs.forEach(fx=>{
      if(!seen.has(fx.id)){
        out.push({...fx,displayMW:parseInt(w)});
        seen.add(fx.id);
      }
    }));
    return out;
  },[displayFixtures,fixtures]);

  const searchResults=useMemo(()=>{
    if(!homeQ.trim()&&!awayQ.trim())return[];
    const hq=homeQ.trim().toLowerCase();
    const aq=awayQ.trim().toLowerCase();
    return allFx.filter(fx=>{
      const hMatch=!hq||fx.home.toLowerCase().includes(hq);
      const aMatch=!aq||fx.away.toLowerCase().includes(aq);
      return hMatch&&aMatch;
    }).sort((a,b)=>a.displayMW-b.displayMW);
  },[allFx,homeQ,awayQ]);

  // Show MWs that have results OR player has predictions OR are revealed
  // Results always visible; other players' predictions only shown when revealed
  const allMWs = Array.from({length:(Object.keys(displayFixtures||fixtures).length===0?0:Math.max(...Object.keys(displayFixtures||fixtures).map(Number)))},(_,i)=>i+1)
    .filter(w => {
      const mwFxList = (displayFixtures||fixtures)[w] || [];
      const hasResult = mwFxList.some(fx => fx.result);
      const myPreds = me && Object.keys(predictions[me]||{}).some(id=>id.startsWith(`${w}-`));
      return hasResult || myPreds || reveals[w] || publicReveals[w];
    })
    .sort((a,b)=>b-a);

  const printMW = (w) => {
    const fxList = (displayFixtures||fixtures)[w] || [];
    const revealed = reveals[w];
    const doc = window.open('','_blank','width=1200,height=800');

    // Calculate points per player for revealed MWs
    const playerPts = {};
    players.forEach(p => {
      let tot = 0;
      const revMWs = Object.entries(reveals||{}).filter(([,v])=>v).map(([k])=>parseInt(k));
      revMWs.forEach(mw => {
        ((displayFixtures||fixtures)[mw]||[]).forEach(fx => {
          if(!fx.result) return;
          const pred = (predictions[p]||{})[fx.id];
          if(!pred) return;
          const pts = calcPts(pred, fx.result);
          if(pts===null) return;
          tot += pts * (pred.joker ? 2 : 1);
        });
      });
      playerPts[p] = tot;
    });

    // Player colour map (CSS-safe)
    const COLOURS = {
      Trev:'#60B8E8', Clive:'#FDB913', Andrew:'#6699FF',
      Pete:'#4ADE80', Steve:'#FF6B6B', Cos:'#E8557A',
      Terry:'#CBD5E1', Alasdair:'#60B8E8'
    };
    const pc = p => COLOURS[p] || '#94A3B8';

    const rows = fxList.map(fx => {
      const dateStr = fx.currentDate ? new Date(fx.currentDate+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}) : '';
      const timeStr = fx.currentTime || '';
      const resultStr = fx.result ? `${fx.result.homeGoals}–${fx.result.awayGoals}` : '';
      const predCells = players.map(p => {
        const pred = (predictions[p]||{})[fx.id];
        if(!pred || pred.homeGoals===undefined || pred.homeGoals===null)
          return `<td style="text-align:center;color:#bbb;font-size:15px">—</td>`;
        const joker = pred.joker ? ' 🃏' : '';
        // Highlight correct predictions
        let bg = '';
        if(fx.result) {
          const pts = calcPts(pred, fx.result);
          if(pts===3) bg = 'background:#d4edda;';
          else if(pts===1) bg = 'background:#fff3cd;';
          else if(pts===0) bg = 'background:#f8d7da;';
        }
        return `<td style="text-align:center;font-weight:700;font-size:16px;${bg}">${pred.homeGoals}–${pred.awayGoals}${joker}</td>`;
      }).join('');
      return `<tr style="border-bottom:1px solid #dee2e6">
        <td style="padding:7px 8px;font-weight:600;font-size:15px;white-space:nowrap">${fx.home} vs ${fx.away}</td>
        <td style="padding:7px 8px;color:#555;font-size:13px;white-space:nowrap">${dateStr} ${timeStr}</td>
        <td style="padding:7px 8px;text-align:center;font-weight:800;font-size:18px;color:${resultStr?'#1a7a3a':'#999'};white-space:nowrap">${resultStr||'TBC'}</td>
        ${predCells}
      </tr>`;
    }).join('');

    const headerCells = players.map(p=>`
      <th style="padding:8px 4px;text-align:center;min-width:60px;white-space:nowrap">
        <div style="color:${pc(p)};font-weight:800;font-size:15px">${p}</div>
        <div style="color:white;font-weight:800;font-size:14px;background:${pc(p)};border-radius:4px;padding:2px 6px;margin-top:3px;display:inline-block">${playerPts[p]??0} pts</div>
      </th>`).join('');

    doc.document.write(`<!DOCTYPE html><html><head>
    <title>HPL MW${w} Predictions</title>
    <style>
      @page { size: A4 landscape; margin: 10mm; }
      * { box-sizing: border-box; }
      body { font-family: Arial, sans-serif; font-size: 15px; margin: 0; padding: 10px; }
      table { border-collapse: collapse; width: 100%; table-layout: fixed; }
      th { background: #1a1a2e; color: white; padding: 9px 4px; }
      tr:nth-child(even) { background: #f8f9fa; }
      .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
      h2 { margin: 0; font-size: 20px; }
      .legend { font-size: 12px; color: #555; margin-top: 6px; }
      .legend span { margin-right: 12px; }
      button { padding: 7px 14px; background: #7C3AED; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
      @media print { button { display: none; } }
    </style>
    </head><body>
    <div class="header">
      <div>
        <h2>⚽ HPL Predictions — Match Week ${w}</h2>
        <div style="font-size:12px;color:#666;margin-top:4px">Printed ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <button onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
    ${!revealed?'<p style="color:#c00;font-weight:bold">⚠️ Not yet revealed</p>':''}
    <div class="legend">
      <span style="background:#d4edda;padding:2px 6px">🟢 Exact score (3pts)</span>
      <span style="background:#fff3cd;padding:2px 6px">🟡 Correct result (1pt)</span>
      <span style="background:#f8d7da;padding:2px 6px">🔴 Wrong (0pts)</span>
    </div>
    <table style="margin-top:10px"><thead><tr>
      <th style="text-align:left;padding:8px;width:22%">Match</th>
      <th style="text-align:left;padding:8px;width:13%">Date/Time</th>
      <th style="padding:8px;width:8%">Result</th>
      ${headerCells}
    </tr></thead><tbody>${rows}</tbody></table>
    </body></html>`);
    doc.document.close();
    setTimeout(()=>doc.print(), 500);
  };

  // Build weekly points summary
  const revealedMWs = allMWs.filter(w=>reveals[w]||publicReveals[w]).sort((a,b)=>a-b);
  const weeklyPts = revealedMWs.map(w=>{
    const fxList=(displayFixtures||fixtures)[w]||[];
    const playerData=players.map(p=>{
      let pts=0, usedJoker=false;
      fxList.forEach(fx=>{
        if(!fx.result) return;
        const pred=(predictions[p]||{})[fx.id];
        if(!pred) return;
        const base=calcPts(pred,fx.result);
        if(base===null) return;
        if(pred.joker){ usedJoker=true; pts+=base*2; } else pts+=base;
      });
      return {p, pts, usedJoker};
    });
    return {w, playerData};
  });

  return(
    <div>
      {/* WEEKLY POINTS SUMMARY TABLE */}
      {revealedMWs.length>0&&(()=>{
        const printSummary=()=>{
          const COLOURS={Trev:'#60B8E8',Clive:'#FDB913',Andrew:'#6699FF',Pete:'#4ADE80',Steve:'#FF6B6B',Cos:'#E8557A',Terry:'#CBD5E1',Alasdair:'#60B8E8'};
          const pc=p=>COLOURS[p]||'#94A3B8';
          const totalsRow=players.map(p=>{
            const tot=weeklyPts.reduce((s,{playerData})=>{const d=playerData.find(x=>x.p===p);return s+(d?d.pts:0);},0);
            return `<td style="text-align:center;padding:7px 4px;font-weight:900;font-size:16px;color:${pc(p)}">${tot}</td>`;
          }).join('');
          const jokersRow=players.map(p=>{
            const jk=weeklyPts.reduce((s,{playerData})=>{const d=playerData.find(x=>x.p===p);return s+(d&&d.usedJoker?1:0);},0);
            return `<td style="text-align:center;padding:7px 4px;font-weight:800;font-size:14px;color:${jk>0?'#D97706':'#aaa'}">${jk>0?jk:'—'}</td>`;
          }).join('');
          const headerCells=players.map(p=>`<th style="text-align:center;padding:8px 6px;min-width:70px"><div style="color:${pc(p)};font-weight:800;font-size:14px">${p}</div></th>`).join('');
          const rows=weeklyPts.map(({w,playerData},i)=>{
            const cells=playerData.map(({p,pts,usedJoker})=>{
              const col=pts>=3?'#1a7a3a':pts>=1?'#1a3a6a':'#555';
              const bg=pts>=3?'#d4edda':pts>=1?'#d0e8ff':i%2===0?'#f8f9fa':'#fff';
              return `<td style="text-align:center;padding:7px 4px;font-weight:800;font-size:15px;background:${bg};color:${col}">${pts>0?pts:pts===0?'0':'—'}${usedJoker?' 🃏':''}</td>`;
            }).join('');
            return `<tr style="border-bottom:1px solid #dee2e6"><td style="padding:7px 8px;font-weight:700;background:${i%2===0?'#f8f9fa':'#fff'}">MW${w}</td>${cells}</tr>`;
          }).join('');
          const totals=players.map(p=>{
            const tot=weeklyPts.reduce((s,{playerData})=>{const d=playerData.find(x=>x.p===p);return s+(d?d.pts:0);},0);
            return `<td style="text-align:center;padding:7px 4px;font-weight:900;font-size:16px;color:${pc(p)}">${tot}</td>`;
          }).join('');
          const doc=window.open('','_blank','width=1200,height=800');
          doc.document.write(`<!DOCTYPE html><html><head><title>HPL Points Summary</title>
          <style>
            @page{size:A4 landscape;margin:10mm}
            body{font-family:Arial,sans-serif;font-size:14px;margin:0;padding:10px}
            table{border-collapse:collapse;width:100%}
            th{background:#1a1a2e;color:white;padding:9px 6px}
            button{padding:7px 14px;background:#7C3AED;color:white;border:none;border-radius:6px;cursor:pointer}
            @media print{button{display:none}}
          </style></head><body>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h2 style="margin:0">⚽ HPL — Points by Match Week</h2>
            <button onclick="window.print()">🖨️ Print</button>
          </div>
          <table><thead>
            <tr><th style="text-align:left;padding:8px">MW</th>${headerCells}</tr>
            <tr style="background:#f0f0f0"><td style="padding:7px 8px;font-weight:800">Total pts</td>${totalsRow}</tr>
            <tr style="background:#fff8e1"><td style="padding:7px 8px;font-weight:700;color:#D97706">🃏 Jokers</td>${jokersRow}</tr>
          </thead>
          <tbody>${rows}
          <tr style="border-top:3px solid #1a1a2e"><td style="padding:7px 8px;font-weight:800;font-size:15px">Total</td>${totals}</tr>
          </tbody></table>
          <p style="color:#888;font-size:11px;margin-top:12px">🃏 = Joker played (points already doubled)</p>
          </body></html>`);
          doc.document.close();
          setTimeout(()=>doc.print(),500);
        };
        return(
          <div style={{...S.card,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setSummaryOpen(o=>!o)}>
              <span style={S.ct}>📊 Points by Match Week</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={e=>{e.stopPropagation();printSummary();}}
                  style={{background:"#1E3A5F",border:"1px solid #3B82F6",color:"#60A5FA",
                    borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  🖨️ Print
                </button>
                <span style={{color:"#8B5CF6"}}>{summaryOpen?"▲":"▼"}</span>
              </div>
            </div>
            {summaryOpen&&(
              <div style={{overflowX:"auto",marginTop:10,maxHeight:400,overflowY:"auto"}}>
                <table style={{borderCollapse:"collapse",fontSize:12,minWidth:500}}>
                  <thead style={{position:"sticky",top:0,zIndex:10}}>
                    <tr style={{borderBottom:"2px solid #334155"}}>
                      <th style={{textAlign:"left",padding:"6px 8px",color:"#64748B",fontWeight:700,whiteSpace:"nowrap",width:52,background:"#0F172A",position:"sticky",left:0,zIndex:11}}>MW</th>
                      {players.map(p=>(
                        <th key={p} style={{textAlign:"center",padding:"6px 4px",color:playerColour(p),fontWeight:800,fontSize:12,whiteSpace:"nowrap",minWidth:58,background:"#0F172A"}}>
                          <div>{p}</div>
                        </th>
                      ))}
                    </tr>
                    {/* Totals header row */}
                    <tr style={{background:"#0F172A",borderBottom:"2px solid #334155"}}>
                      <td style={{padding:"6px 8px",color:"#E2E8F0",fontWeight:800,fontSize:11,position:"sticky",left:0,background:"#0F172A",zIndex:9}}>Total pts</td>
                      {players.map(p=>{
                        const tot=weeklyPts.reduce((sum,{playerData})=>{const d=playerData.find(x=>x.p===p);return sum+(d?d.pts:0);},0);
                        return <td key={p} style={{textAlign:"center",padding:"4px 2px",fontWeight:900,fontSize:15,color:playerColour(p),minWidth:58}}>{tot}</td>;
                      })}

                    <tr style={{background:"#0F172A",borderBottom:"2px solid #7C3AED44"}}>
                      <td style={{padding:"6px 8px",color:"#F59E0B",fontWeight:700,fontSize:11,position:"sticky",left:0,background:"#0F172A",zIndex:9}}>🃏 Jokers</td>

            {(homeQ||awayQ)&&(
              <button style={{...S.sb,fontSize:12,padding:"4px 10px"}}
                onClick={()=>{setHomeQ("");setAwayQ("");}}>Clear</button>
            )}
            {/* Search results */}
            {searchResults.length===0&&(homeQ||awayQ)&&(
              <div style={{color:"#64748B",fontSize:13,marginTop:8}}>No fixtures found</div>
            )}
            {searchResults.map(fx=>{
              const revealed=reveals[fx.displayMW];
              const fxPublicRevealed=publicReveals[fx.displayMW]===true;
              const fxCanSee=fxPublicRevealed||(revealed&&admin);
              return(
                <div key={fx.id} style={{...S.fx,marginTop:8,border:"1px solid #334155"}}>

                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:fx.movedMW?2:0}}>
                      <span style={{...S.tag,background:"#7C3AED22",color:"#A78BFA",border:"1px solid #7C3AED44"}}>
                        MW{fx.displayMW}
                      </span>
                      <span style={{color:fx.movedMW?"#F59E0B":"#64748B",fontSize:11}}>{fmtF(fx.currentDate,fx.currentTime)}</span>
                      {fxCanSee
                        ? <Tag color="#34D399">Revealed</Tag>
                        : <Tag color="#F59E0B">Not revealed</Tag>}
                    </div>
                    {fx.movedMW&&fx.originalDate&&(
                      <div style={{fontSize:10,color:"#475569"}}>
                        Originally MW{fx.originalMW} · {fmtS(fx.originalDate)}
                      </div>
                    )}
                  </div>
                  {/* Score row */}
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                    <span style={{width:"36%",fontSize:13,fontWeight:600,color:"#CBD5E1",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5,textAlign:"right"}}>
                      {sn(fx.home)}<Badge team={fx.home} size={22}/>
                    </span>
                    <span style={{fontSize:18,fontWeight:800,color:"#34D399",width:26,textAlign:"center",flexShrink:0}}>
                      {fx.result?fx.result.homeGoals:"–"}
                    </span>
                    <span style={{fontSize:16,fontWeight:700,color:"#475569"}}>|</span>
                    <span style={{fontSize:18,fontWeight:800,color:"#34D399",width:26,textAlign:"center",flexShrink:0}}>
                      {fx.result?fx.result.awayGoals:"–"}
                    </span>
                    <span style={{flex:1,fontSize:13,fontWeight:600,color:"#CBD5E1",display:"flex",alignItems:"center",gap:6}}>
                      <Badge team={fx.away} size={22}/>{fx.away}
                    </span>
                  </div>
                  {/* Predictions */}
                  {/* Prediction summary — only show when revealed */}
                  {canSeeRevealed&&(()=>{
                    const groups={};
                    players.forEach(p=>{
                      const pred=predictions[p]?.[fx.id];
                      if(!pred||pred.homeGoals===undefined||pred.awayGoals===undefined) return;
                      const score=`${pred.homeGoals}-${pred.awayGoals}`;
                      const outcome=pred.homeGoals>pred.awayGoals?"🏠 Home Win":pred.homeGoals===pred.awayGoals?"🤝 Draw":"✈️ Away Win";
                      if(!groups[outcome]) groups[outcome]=[];
                      groups[outcome].push({p,score,joker:pred.joker||false});
                    });
                    const hasPreds=Object.keys(groups).length>0;
                    if(!hasPreds) return null;
                    return(
                      <div style={{background:"#0F172A",borderRadius:8,padding:"8px 10px",marginBottom:8,
                        border:"1px solid #334155"}}>
                        <div style={{fontSize:10,color:"#475569",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>
                          📊 Prediction Summary
                        </div>
                        {["🏠 Home Win","🤝 Draw","✈️ Away Win"].filter(o=>groups[o]).map(outcome=>{
                          // Group by score within outcome
                          const byScore={};
                          groups[outcome].forEach(({p,score,joker})=>{
                            if(!byScore[score]) byScore[score]=[];
                            byScore[score].push({p,joker});
                          });
                          return(
                            <div key={outcome} style={{marginBottom:6}}>
                              <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:3}}>{outcome}</div>
                              {Object.entries(byScore).map(([score,preds])=>{
                                const names=preds.map(({p,joker})=>joker?`${p} 🃏`:p).join(", ");
                                return(
                                  <div key={score} style={{fontSize:12,color:"#E2E8F0",marginBottom:2,paddingLeft:8}}>
                                    <span style={{fontWeight:700,color:"#A78BFA"}}>{score}</span>
                                    <span style={{color:"#64748B"}}> — </span>
                                    <span>{names}</span>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {players.map(p=>{
                      const pred=predictions[p]?.[fx.id];
                      const jk=pred?.joker||false;
                      const pts=pred&&fx.result&&canSeeRevealed?calcPts(pred,fx.result):null;
                      const fp=pts!==null?pts*(jk?2:1):null;
                      const canSee=canSeeRevealed||p===me;
                      return(
                        <div key={p} style={{borderRadius:10,padding:"10px 12px",textAlign:"center",minWidth:76,
                          background:fp===3?"#065F4622":fp>=1?"#1E40AF22":fp===0?"#7F1D1D22":playerColour(p)+"11",
                          border:`1px solid ${playerColour(p)}44`,
                          opacity:canSee?1:0.3}}>
                          <div style={{fontSize:13,color:playerColour(p),maxWidth:80,overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:p===me?800:600,marginBottom:3}}>{p}</div>
                          <div style={{fontSize:24,fontWeight:900,color:playerColour(p),lineHeight:1.2}}>
                            {canSee?(pred?`${pred.homeGoals}–${pred.awayGoals}`:"–"):"🔒"}
                          </div>
                          {canSee&&jk&&<div style={{fontSize:16,color:"#F59E0B",lineHeight:1}}>🃏</div>}
                          {fp!==null&&<PB pts={fp} small/>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Prompt to select name if not chosen */}
      {!me && (
        <div style={{...S.card,background:"#7C3AED22",border:"1px solid #7C3AED"}}>
          <div style={{color:"#A78BFA",fontSize:13}}>⚠️ Select your name on the Predict tab to see your predictions. Other players' predictions are hidden until each match week is revealed.</div>
        </div>
      )}
      {!allMWs.length&&<div style={S.empty}>No predictions submitted yet.</div>}
      {allMWs.map(w=>{
        const fxs=(displayFixtures||fixtures)[w]||[];
        const open=expMW===w;
        const revealed=reveals[w];
        const publicRevealed=publicReveals[w]===true;
        const canSeeRevealed=publicRevealed||(revealed&&admin);

        // Calc totals - only for revealed weeks
        const tots={};
        if(canSeeRevealed){
          players.forEach(p=>{
            tots[p]=fxs.reduce((acc,fx)=>{
              if(!fx.result)return acc;
              const pred=predictions[p]?.[fx.id];if(!pred)return acc;
              const pts=calcPts(pred,fx.result);
              const jk=pred?.joker||false;
              return acc+(pts!==null?pts*(jk?2:1):0);
            },0);
          });
        }

        return(
          <div key={w} style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",cursor:"pointer",userSelect:"none"}} onClick={()=>setExpMW(open?null:w)}>
              <span style={S.ct}>Match Week {w}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {publicReveals[w]
                  ? <Tag color="#34D399">Revealed</Tag>
                  : revealed
                  ? <Tag color="#A78BFA">👁 Admin preview</Tag>
                  : <Tag color="#F59E0B">Predictions hidden until reveal</Tag>}
                {canSeeRevealed&&(
                  <button onClick={e=>{e.stopPropagation();printMW(w);}}
                    style={{background:"#1E3A5F",border:"1px solid #3B82F6",color:"#60A5FA",
                      borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:700,cursor:"pointer",lineHeight:1.4}}>
                    🖨️ Print
                  </button>
                )}
                <span style={{color:"#8B5CF6"}}>{open?"▲":"▼"}</span>
              </div>
            </div>
            {open&&(
              <>
                {/* Revealed: show all players' points summary */}
                {canSeeRevealed&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,margin:"12px 0"}}>
                    {players.map(p=>(
                      <div key={p} style={{background:"#0F172A",borderRadius:8,padding:"8px 10px",textAlign:"center",minWidth:60,border:`1px solid ${playerColour(p)}33`}}>
                        <div style={{fontSize:10,color:playerColour(p),maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:600}}>{p}</div>
                        <div style={{fontSize:22,fontWeight:800,color:playerColour(p)}}>{tots[p]}</div>

                {fxs.map(fx=>(

                              groups[outcome].forEach(({p,score,joker})=>{

                                  ))}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}
                      {/* Player prediction cards */}
                      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                        {players.map(p=>{
                          const pred=predictions[p]?.[fx.id];
                          const jk=pred?.joker||false;
                          const pts=pred&&fx.result&&canSeeRevealed?calcPts(pred,fx.result):null;
                          const fp=pts!==null?pts*(jk?2:1):null;
                          const canSee = canSeeRevealed || p===me;
                          return(
                            <div key={p} style={{borderRadius:10,padding:"10px 14px",textAlign:"center",minWidth:75,
                              background:fp===6?"#065F4644":fp===3?"#065F4633":fp>=1?"#1E40AF33":fp===0?"#7F1D1D33":playerColour(p)+"11",
                              border:`1px solid ${playerColour(p)}55`,
                              opacity:canSee?1:0.25}}>
                              <div style={{fontSize:12,color:playerColour(p),fontWeight:700,marginBottom:4,
                                maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                              <div style={{fontSize:18,fontWeight:800,color:canSee?playerColour(p):"#475569",lineHeight:1.1}}>
                                {canSee?(pred?`${pred.homeGoals}–${pred.awayGoals}`:"–"):"🔒"}
                              </div>
                              {canSee&&jk&&<div style={{fontSize:18,lineHeight:1.2}}>🃏</div>}
                              {fp!==null&&<PB pts={fp} small/>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

function League({fixtures,displayFixtures,predictions,reveals,publicReveals,players,jokers,me}){
  const revs=Object.entries(reveals||{}).filter(([,v])=>v).map(([k])=>parseInt(k));
  const rows=players.map(p=>{
    let tot=0,exact=0,correct=0,played=0;
    // Joker tracking per half-season
    let jk1Used=0,jk2Used=0,jkBonusTotal=0;
    // Count ALL jokers played (including locked MWs with no result yet)
    Object.entries(predictions[p]||{}).forEach(([fxId,pred])=>{
      if(!pred?.joker) return;
      const origMW=parseInt(fxId.split('-')[0]);
      // Use display MW if available
      const df=displayFixtures||fixtures;
      let displayMW=origMW;
      Object.entries(df).forEach(([mwStr,fxList])=>{
        if(fxList.some(fx=>fx.id===fxId)) displayMW=parseInt(mwStr);
      });
      if(half(displayMW)===1) jk1Used++; else jk2Used++;
    });
    revs.forEach(w=>{
      ((displayFixtures||fixtures)[w]||[]).forEach(fx=>{
        if(!fx.result)return;
        const pred=predictions[p]?.[fx.id];if(!pred)return;
        const pts=calcPts(pred,fx.result);if(pts===null)return;
        played++;
        const jk=pred?.joker||false;
        const basePts=pts;
        const fp=basePts*(jk?2:1);
        tot+=fp;
        if(basePts===3)exact++;if(basePts>=1)correct++;
        if(jk) jkBonusTotal+=fp-basePts;
      });
    });
    return{p,tot,exact,correct,played,jk1Used,jk2Used,jkBonusTotal};
  }).sort((a,b)=>b.tot-a.tot);

  return(
    <div>
      <div style={S.card}>
        <div style={S.ct}>🏆 Season Standings</div>
        <div style={{color:"#64748B",fontSize:12,marginTop:2}}>{revs.length}/38 match weeks revealed</div>
      </div>
      {rows.map((r,i)=>(
        <div key={r.p} style={{...S.lRow,background:i===0?"#7C3AED33":i===1?"#6D28D922":i===2?"#5B21B622":"#1E293B",
          flexDirection:"column",alignItems:"stretch",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:22,fontWeight:800,width:36,textAlign:"center",
              color:i===0?"#F59E0B":i===1?"#94A3B8":i===2?"#CD7C2F":"#64748B"}}>
              {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <div style={{fontWeight:800,color:playerColour(r.p),fontSize:17}}>{r.p}{r.p===me&&" ⭐"}</div>
                <div style={{fontSize:34,fontWeight:900,color:playerColour(r.p)}}>{r.tot}</div>
                <div style={{fontSize:13,color:"#64748B"}}>pts</div>
              </div>
              <div style={{fontSize:13,color:"#64748B"}}>🎯{r.exact} exact · ✓{r.correct} correct · {r.played} preds</div>
            </div>
          </div>
          {/* Joker summary */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingLeft:48}}>
            <div style={{background:"#F59E0B11",border:"1px solid #F59E0B33",borderRadius:6,
              padding:"4px 10px",fontSize:13,color:"#F59E0B"}}>
              🃏 H1: {r.jk1Used}/5
            </div>
            <div style={{background:"#F59E0B11",border:"1px solid #F59E0B33",borderRadius:6,
              padding:"4px 10px",fontSize:13,color:"#F59E0B"}}>
              🃏 H2: {r.jk2Used}/5
            </div>
            <div style={{background:r.jkBonusTotal>0?"#065F4622":"#1E293B",
              border:`1px solid ${r.jkBonusTotal>0?"#34D39944":"#334155"}`,borderRadius:6,
              padding:"4px 10px",fontSize:13,
              color:r.jkBonusTotal>0?"#34D399":"#475569"}}>
              +{r.jkBonusTotal} bonus pts from jokers
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}
