const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdmNxdGZnaWRocnVtdG9waXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjc2MDIsImV4cCI6MjA5MjkwMzYwMn0.jUomRZbvTNPhsdgNalEni1TjwpyRMZ5m07G4dlD0uNY";

const supa = {
  async get(table, filters="") {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${filters}&apikey=${SUPA_KEY}`, {
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": `Bearer ${SUPA_KEY}`,
        "Range": "0-9999"  // Override default 1000 row limit
      }
    });
    if (!res.ok) throw new Error(`Supabase GET failed: ${res.status}`);
    return res.json();
  },
  async upsert(table, data) {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(`Supabase UPSERT failed: ${res.status}`);
    return true;
  },
  async getState(key) {
    const rows = await this.get("game_state", `key=eq.${key}&select=value`);
    return rows[0]?.value ?? null;
  },
  async setState(key, value) {
    return this.upsert("game_state", { key, value, updated_at: new Date().toISOString() });
  },
};

// Load all shared state from Supabase
async function loadFromSupabase() {
  const [reveals, deadlines, pins, predRows] = await Promise.all([
    supa.getState("reveals"),
    supa.getState("deadlines"),
    supa.getState("pins"),
    // Fetch all predictions in pages (Supabase default limit is 1000)
    (async () => {
      const allRows = [];
      let from = 0;
      const pageSize = 1000;
      while (true) {
        const rows = await supa.get("predictions",
          `select=player,fixture_id,home_goals,away_goals,joker&limit=${pageSize}&offset=${from}`
        );
        if (!rows || !rows.length) break;
        allRows.push(...rows);
        if (rows.length < pageSize) break;
        from += pageSize;
      }
      return allRows;
    })(),
  ]);

  // Rebuild predictions object: { playerName: { fixtureId: {homeGoals,awayGoals,joker} } }
  const predictions = {};
  (predRows || []).forEach(r => {
    if (!predictions[r.player]) predictions[r.player] = {};
    predictions[r.player][r.fixture_id] = {
      homeGoals: r.home_goals,
      awayGoals: r.away_goals,
      joker: r.joker === true || r.joker === 1 || r.joker === "true" || r.joker === "1" || false,
    };
  });
  console.log("Loaded predictions from Supabase:", Object.keys(predictions).length, "players,",
    Object.values(predictions).reduce((a,p)=>a+Object.keys(p).length,0), "predictions");

  // Load results from Supabase (overrides hardcoded REAL_RESULTS)
  const resultRows = await supa.get("results","select=id,home_goals,away_goals").catch(()=>[]);
  const supaResults = {};
  (resultRows||[]).forEach(r=>{supaResults[r.id]={homeGoals:r.home_goals,awayGoals:r.away_goals};});

  // Load football-data.org token
  const fdToken = await supa.getState("fd_token").catch(()=>null);
  if(fdToken && typeof fdToken === 'string'){
    try{ localStorage.setItem("hpl_fdorg_key", fdToken); }catch{}
  }

  // Load season predictions
  const seasonPreds = await supa.getState("season_preds").catch(()=>null);
  const seasonActual = await supa.getState("season_actual").catch(()=>null);
  // Merge with localStorage backup
  let mergedSeasonPreds = seasonPreds || {};
  try {
    const local = loadAll();
    if (local.season_preds && Object.keys(mergedSeasonPreds).length === 0) {
      mergedSeasonPreds = local.season_preds;
    }
  } catch {}

  // null from Supabase = key never set → caller uses AUTO_REVEALS
  // {} from Supabase = deliberately cleared → caller respects empty
  return {
    reveals: reveals,
    deadlines: deadlines || {},
    pins: pins || {},
    predictions,
    supaResults,
    seasonPreds: mergedSeasonPreds,
    seasonActual: seasonActual || null,
  };
}

// Save a single player's prediction for a fixture
async function savePrediction(player, fixtureId, homeGoals, awayGoals, joker) {
  return supa.upsert("predictions", {
    id: `${player}_${fixtureId}`,
    player,
    fixture_id: fixtureId,
    home_goals: homeGoals,
    away_goals: awayGoals,
    joker: joker || false,
    updated_at: new Date().toISOString(),
  });
}

// Save all predictions for a player (batch)
async function saveAllPredictions(player, preds) {
  const rows = Object.entries(preds).map(([fixtureId, p]) => ({
    id: `${player}_${fixtureId}`,
    player,
    fixture_id: fixtureId,
    home_goals: p.homeGoals !== "" ? parseInt(p.homeGoals) : null,
    away_goals: p.awayGoals !== "" ? parseInt(p.awayGoals) : null,
    joker: p.joker || false,
    updated_at: new Date().toISOString(),
  }));
  if (!rows.length) return;
  return supa.upsert("predictions", rows);
}

// Calculate PL standings from match results already in fixtures
function deriveStandings(allFixtures) {
  const pts = {}, gd = {}, gf = {};
  const TEAMS = ["Arsenal","Man City","Man Utd","Liverpool","Aston Villa","Bournemouth",
    "Brentford","Brighton","Chelsea","Crystal Palace","Everton","Fulham","Leeds",
    "Newcastle","Nottm Forest","Sunderland","Spurs","West Ham","Wolves","Burnley"];
  TEAMS.forEach(t=>{ pts[t]=0; gd[t]=0; gf[t]=0; });

  Object.values(allFixtures).forEach(mwList=>{
    mwList.forEach(fx=>{
      if(!fx.result) return;
      const h=fx.home, a=fx.away;
      const hg=fx.result.homeGoals, ag=fx.result.awayGoals;
      if(!TEAMS.includes(h)||!TEAMS.includes(a)) return;
      gf[h]=(gf[h]||0)+hg; gf[a]=(gf[a]||0)+ag;
      gd[h]=(gd[h]||0)+(hg-ag); gd[a]=(gd[a]||0)+(ag-hg);
      if(hg>ag){ pts[h]=(pts[h]||0)+3; }
      else if(hg<ag){ pts[a]=(pts[a]||0)+3; }
      else { pts[h]=(pts[h]||0)+1; pts[a]=(pts[a]||0)+1; }
    });
  });

  const sorted = TEAMS.filter(t=>pts[t]!==undefined)
    .sort((a,b)=> pts[b]-pts[a] || gd[b]-gd[a] || gf[b]-gf[a] || a.localeCompare(b));
  const gp = {};
  TEAMS.forEach(t=>{ gp[t]=0; });
  Object.values(allFixtures).forEach(mwList=>{
    mwList.forEach(fx=>{
      if(!fx.result) return;
      if(TEAMS.includes(fx.home)) gp[fx.home]=(gp[fx.home]||0)+1;
      if(TEAMS.includes(fx.away)) gp[fx.away]=(gp[fx.away]||0)+1;
    });
  });
  return { standings: sorted, standingsPts: pts, standingsGP: gp };
}

// Live fixture & results refresh — runs on every app open
// Uses ESPN public API — no key needed, free, CORS-friendly
// Checks all results from last 60 days + future fixture date changes
async function fetchWithTimeout(url, options={}, ms=8000) {
  const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")), ms));
  return Promise.race([fetch(url, options), timeout]);
}

async function liveRefresh(fixtures) {
  const ESPN_TEAM_MAP = {
    "Arsenal":"Arsenal","Aston Villa":"Aston Villa","AFC Bournemouth":"Bournemouth",
    "Bournemouth":"Bournemouth","Brentford":"Brentford","Brighton & Hove Albion":"Brighton",
    "Brighton":"Brighton","Burnley":"Burnley","Chelsea":"Chelsea",
    "Crystal Palace":"Crystal Palace","Everton":"Everton","Fulham":"Fulham",
    "Leeds United":"Leeds","Leeds":"Leeds","Liverpool":"Liverpool",
    "Manchester City":"Man City","Man City":"Man City","Manchester United":"Man Utd",
    "Man United":"Man Utd","Newcastle United":"Newcastle","Newcastle":"Newcastle",
    "Nottingham Forest":"Nottm Forest","Nottm Forest":"Nottm Forest",
    "Sunderland":"Sunderland","Tottenham Hotspur":"Spurs","Spurs":"Spurs",
    "West Ham United":"West Ham","West Ham":"West Ham",
    "Wolverhampton Wanderers":"Wolves","Wolves":"Wolves",
  };

  const norm = t => ESPN_TEAM_MAP[t] || t;

  try {
    const now = new Date();
    const seasonStart = new Date('2025-08-01'); // Season starts Aug 2025
    const fmt = d => d.toISOString().split("T")[0].replace(/-/g,"");

    // Fetch full season in 30-day chunks (ESPN limit ~100 games per request)
    const events = [];
    const seen = new Set();
    let chunkStart = new Date(seasonStart);

    while (chunkStart < now) {
      const chunkEnd = new Date(chunkStart);
      chunkEnd.setDate(chunkEnd.getDate() + 30);
      if (chunkEnd > now) chunkEnd.setTime(now.getTime());

      try {
        const r = await fetchWithTimeout(
          `https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard?dates=${fmt(chunkStart)}-${fmt(chunkEnd)}&limit=200`
        );
        if (r.ok) {
          const d = await r.json();
          (d.events || []).forEach(ev => {
            if (!seen.has(ev.id)) { seen.add(ev.id); events.push(ev); }
          });
        }
      } catch(e) { console.log(`Chunk ${fmt(chunkStart)} failed:`, e.message); }

      chunkStart.setDate(chunkStart.getDate() + 30);
    }

    console.log(`ESPN: fetched ${events.length} events for full season`);
    if (!events.length) return { fixtures, updated: 0, dateChanges: 0 };

    const newFx = JSON.parse(JSON.stringify(fixtures));
    let updated = 0, dateChanges = 0;

    events.forEach(ev => {
      const comps = ev.competitions?.[0];
      if (!comps) return;
      const competitors = comps.competitors || [];
      const homeComp = competitors.find(c => c.homeAway === "home");
      const awayComp = competitors.find(c => c.homeAway === "away");
      if (!homeComp || !awayComp) return;

      const home = norm(homeComp.team?.displayName || homeComp.team?.name || "");
      const away = norm(awayComp.team?.displayName || awayComp.team?.name || "");
      if (!home || !away) return;

      const state = ev.status?.type?.state;
      const completed = ev.status?.type?.completed === true;
      const statusDesc = (ev.status?.type?.description||ev.status?.type?.name||"").toLowerCase();
      const isPost = state === "post";
      const liveOrPre = state === "in" || state === "pre" ||
        statusDesc.includes("progress") || statusDesc.includes("half") ||
        statusDesc.includes("live") || statusDesc.includes("scheduled");
      const fullyFinished = completed && isPost && !liveOrPre;

      const evDate = ev.date ? ev.date.split("T")[0] : null;
      const evTime = ev.date ? new Date(ev.date).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"}) : null;

      Object.values(newFx).forEach(mwList => {
        mwList.forEach(fx => {
          if (fx.home !== home || fx.away !== away) return;

          if (fullyFinished) {
            const h = parseInt(homeComp.score);
            const a = parseInt(awayComp.score);
            if (!isNaN(h) && !isNaN(a)) {
              const mDT = new Date(`${fx.currentDate}T${fx.currentTime}:00`);
              if (mDT < now) {
                if (!fx.result || fx.result.homeGoals !== h || fx.result.awayGoals !== a) {
                  fx.result = { homeGoals: h, awayGoals: a };
                  updated++;
                }
              }
            }
          }

          // Update fixture date/time if rescheduled and not yet played
          if (!fx.result && state === "pre" && evDate && evDate !== fx.currentDate) {
            fx.currentDate = evDate;
            if (evTime) fx.currentTime = evTime;
            dateChanges++;
          }
        });
      });
    });

    // Fetch current PL standings — multiple endpoints with fallback
    let standings = null;
    let standingsPts = {};
    let standingsGP = {};

    const TEAM_MAP = {
      // ESPN names → app names
      "Arsenal FC":"Arsenal","Arsenal":"Arsenal",
      "Manchester City":"Man City","Manchester City FC":"Man City",
      "Manchester United":"Man Utd","Manchester United FC":"Man Utd",
      "Liverpool FC":"Liverpool","Liverpool":"Liverpool",
      "Aston Villa":"Aston Villa","Aston Villa FC":"Aston Villa",
      "AFC Bournemouth":"Bournemouth","Bournemouth":"Bournemouth",
      "Brentford FC":"Brentford","Brentford":"Brentford",
      "Brighton & Hove Albion":"Brighton","Brighton & Hove Albion FC":"Brighton","Brighton":"Brighton",
      "Chelsea FC":"Chelsea","Chelsea":"Chelsea",
      "Crystal Palace FC":"Crystal Palace","Crystal Palace":"Crystal Palace",
      "Everton FC":"Everton","Everton":"Everton",
      "Fulham FC":"Fulham","Fulham":"Fulham",
      "Leeds United":"Leeds","Leeds United FC":"Leeds","Leeds":"Leeds",
      "Liverpool":"Liverpool",
      "Nottingham Forest":"Nottm Forest","Nottingham Forest FC":"Nottm Forest","Nottm Forest":"Nottm Forest",
      "Newcastle United":"Newcastle","Newcastle United FC":"Newcastle","Newcastle":"Newcastle",
      "Sunderland AFC":"Sunderland","Sunderland":"Sunderland",
      "Tottenham Hotspur":"Spurs","Tottenham Hotspur FC":"Spurs","Spurs":"Spurs",
      "West Ham United":"West Ham","West Ham United FC":"West Ham","West Ham":"West Ham",
      "Wolverhampton Wanderers":"Wolves","Wolverhampton Wanderers FC":"Wolves","Wolves":"Wolves",
      "Burnley FC":"Burnley","Burnley":"Burnley",
    };
    const mapTeam = n => TEAM_MAP[n] || norm(n||"");

    // API 1: football-data.org (most reliable if key set)
    try {
      const fdKey = localStorage.getItem("hpl_fdorg_key")||"";
      if (fdKey) {
        const r = await fetchWithTimeout("https://api.football-data.org/v4/competitions/PL/standings?season=2025",
          {headers:{"X-Auth-Token":fdKey}});
        if (r.ok) {
          const d = await r.json();
          const table = d.standings?.find(s=>s.type==="TOTAL")?.table||[];
          if (table.length >= 18) {
            standings = table.sort((a,b)=>a.position-b.position)
              .map(t=>mapTeam(t.team?.name)||mapTeam(t.team?.shortName)).filter(Boolean);
            table.forEach(t=>{
              const tn=mapTeam(t.team?.name)||mapTeam(t.team?.shortName);
              if(tn){ standingsPts[tn]=t.points; standingsGP[tn]=t.playedGames; }
            });
            console.log("✅ Standings: football-data.org", standings.length, standings[0]);
          }
        }
      }
    } catch(e){ console.log("fd.org failed:", e.message); }

    // API 2: ESPN scoreboard (standings embedded in leagues array)
    if (!standings) try {
      const r = await fetchWithTimeout("https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard");
      if (r.ok) {
        const d = await r.json();
        const entries = d.leagues?.[0]?.standings?.entries||[];
        if (entries.length >= 18) {
          const sorted = [...entries].sort((a,b)=>{
            const rv = e => {
              const s = e.stats?.find(x=>x.name==="rank"||x.shortDisplayName==="RK"||x.name==="position");
              return parseInt(s?.displayValue||s?.value||"99");
            };
            return rv(a)-rv(b);
          });
          standings = sorted.map(e=>mapTeam(e.team?.displayName||e.team?.name||"")).filter(Boolean);
          sorted.forEach(e=>{
            const tn=mapTeam(e.team?.displayName||e.team?.name||"");
            if(!tn) return;
            if(Object.keys(standingsPts).length===0 && e.stats?.length){
              console.log("ESPN stats:", e.stats.map(s=>`${s.name}(${s.shortDisplayName})=${s.value}`).join(", "));
            }
            const ptsStat = e.stats?.find(x=>
              ["points","pts","PTS","totalPoints"].includes(x.name) ||
              ["PTS","Pts","pts","P"].includes(x.shortDisplayName) ||
              x.displayName==="Points"
            );
            const gpStat = e.stats?.find(x=>
              ["gamesPlayed","played","GP"].includes(x.name) ||
              ["GP","P","Pld"].includes(x.shortDisplayName) ||
              x.displayName==="Games Played"
            );
            if(ptsStat) standingsPts[tn]=parseInt(ptsStat.value||ptsStat.displayValue||0);
            if(gpStat) standingsGP[tn]=parseInt(gpStat.value||gpStat.displayValue||0);
          });
          console.log("✅ Standings: ESPN scoreboard", standings.length, "pts sample:", JSON.stringify(standingsPts).slice(0,80));
        }
      }
    } catch(e){ console.log("ESPN scoreboard failed:", e.message); }

    // API 3: ESPN league table endpoint (different URL structure)
    if (!standings) try {
      const r = await fetchWithTimeout("https://site.api.espn.com/apis/v2/sports/soccer/eng.1/standings?season=2025&sort=rank:asc");
      if (r.ok) {
        const d = await r.json();
        const entries = d.standings?.[0]?.entries||d.children?.[0]?.standings?.entries||[];
        if (entries.length >= 18) {
          const sorted = [...entries].sort((a,b)=>{
            const rv = e => parseInt(e.stats?.find(x=>x.name==="rank")?.value||"99");
            return rv(a)-rv(b);
          });
          standings = sorted.map(e=>mapTeam(e.team?.displayName||e.team?.name||"")).filter(Boolean);
          sorted.forEach(e=>{
            const tn=mapTeam(e.team?.displayName||e.team?.name||"");
            const ptsStat=e.stats?.find(x=>x.name==="points"||x.shortDisplayName==="PTS"||x.displayName==="Points");
            if(tn&&ptsStat) standingsPts[tn]=parseInt(ptsStat.value||ptsStat.displayValue||0);
          });
          console.log("✅ Standings: ESPN v2", standings.length, standings[0]);
        }
      }
    } catch(e){ console.log("ESPN v2 failed:", e.message); }

    // API 4: ESPN core standings
    if (!standings) try {
      const r = await fetchWithTimeout("https://sports.core.api.espn.com/v2/sports/soccer/leagues/eng.1/seasons/2025/types/2/groups/1/standings/0?limit=25");
      if (r.ok) {
        const d = await r.json();
        const entries = d.standings?.entries||d.entries||[];
        if (entries.length >= 18) {
          const sorted = [...entries].sort((a,b)=>{
            const rv = e => parseInt(e.stats?.find(x=>x.name==="rank")?.value||"99");
            return rv(a)-rv(b);
          });
          standings = sorted.map(e=>mapTeam(e.team?.displayName||e.team?.name||"")).filter(Boolean);
          console.log("✅ Standings: ESPN core", standings.length, standings[0]);
        }
      }
    } catch(e){ console.log("ESPN core failed:", e.message); }

    // If all APIs failed, derive standings from match results we already have
    if (!standings) {
      try {
        const derived = deriveStandings(newFx);
        if(derived.standings.length >= 18){
          standings = derived.standings;
          standingsPts = derived.standingsPts;
          standingsGP = derived.standingsGP||{};
          console.log("✅ Standings derived from results:", standings[0], standingsPts[standings[0]]+"pts");
        }
      } catch(e){ console.log("Derive standings failed:", e.message); }
    }
    // Always try to fill in missing pts from derived results
    if(standings && Object.keys(standingsPts).length < 10){
      try {
        const derived = deriveStandings(newFx);
        standingsPts = derived.standingsPts;
        if(Object.keys(standingsGP).length < 10) standingsGP = derived.standingsGP||{};
        console.log("📊 Pts derived from results:", standingsPts["Arsenal"]+"pts for Arsenal");
      } catch(e){}
    }
    if (!standings) console.log("⚠️ All standings methods failed");
    // standingsPts populated below

    return { fixtures: newFx, updated, dateChanges, standings, standingsPts, standingsGP };
  } catch(e) {
    console.log("ESPN refresh error:", e.message);
    return liveRefreshFallback(fixtures);
  }
}

// Fallback: football-data.org (requires API key)
async function liveRefreshFallback(fixtures) {
  const apiKey = (() => { try { return localStorage.getItem("hpl_fdorg_key") || ""; } catch { return ""; } })();
  if (!apiKey) return { fixtures, updated: 0, dateChanges: 0 };
  try {
    const res = await fetch("https://api.football-data.org/v4/competitions/PL/matches?season=2025",
      { headers: { "X-Auth-Token": apiKey } });
    if (!res.ok) return { fixtures, updated: 0, dateChanges: 0 };
    const data = await res.json();
    if (!data.matches) return { fixtures, updated: 0, dateChanges: 0 };
    const newFx = JSON.parse(JSON.stringify(fixtures));
    let updated = 0, dateChanges = 0;
    const now = new Date();
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-280); // Full season
    const FD_MAP = {
      "Arsenal FC":"Arsenal","AFC Bournemouth":"Bournemouth","Brentford FC":"Brentford",
      "Brighton & Hove Albion FC":"Brighton","Burnley FC":"Burnley","Chelsea FC":"Chelsea",
      "Crystal Palace FC":"Crystal Palace","Everton FC":"Everton","Fulham FC":"Fulham",
      "Leeds United FC":"Leeds","Liverpool FC":"Liverpool","Manchester City FC":"Man City",
      "Manchester United FC":"Man Utd","Newcastle United FC":"Newcastle",
      "Nottingham Forest FC":"Nottm Forest","Sunderland AFC":"Sunderland",
      "Tottenham Hotspur FC":"Spurs","West Ham United FC":"West Ham",
      "Wolverhampton Wanderers FC":"Wolves","Aston Villa FC":"Aston Villa",
    };
    data.matches.forEach(m => {
      const home = FD_MAP[m.homeTeam?.name] || m.homeTeam?.shortName;
      const away = FD_MAP[m.awayTeam?.name] || m.awayTeam?.shortName;
      if (!home || !away) return;
      Object.values(newFx).forEach(mwList => {
        mwList.forEach(fx => {
          if (fx.home !== home || fx.away !== away) return;
          if (m.status === "FINISHED" && m.score?.fullTime) {
            const h = m.score.fullTime.home, a = m.score.fullTime.away;
            if (h !== null && a !== null) {
              const mDT = new Date(`${fx.currentDate}T${fx.currentTime}:00`);
              if (mDT < now && mDT >= cutoff) {
                if (!fx.result || fx.result.homeGoals !== h || fx.result.awayGoals !== a) {
                  fx.result = { homeGoals: h, awayGoals: a }; updated++;
                }
              }
            }
          }
        });
      });
    });
    return { fixtures: newFx, updated, dateChanges };
  } catch(e) { return { fixtures, updated: 0, dateChanges: 0 }; }
}

const buildFixtures = () => {
  const now = new Date();
  const out = {};
  Object.entries(SEASON_FIXTURES).forEach(([mwStr, list]) => {
    const mw = parseInt(mwStr);
    const results = REAL_RESULTS[mw] || [];
    out[mw] = list.map((f, i) => {
      const res = results[i];
      const id = `${mw}-${i}`;
      const override = DATE_OVERRIDES[id] || {};
      const currentDate = override.currentDate || f.date;
      const currentTime = override.currentTime || f.time;
      // Only show hardcoded result if match date is in the past
      // This prevents bogus results appearing for future fixtures
      const matchDateTime = new Date(`${currentDate}T${currentTime}:00`);
      const matchPlayed = matchDateTime < now;
      return { id, mw, home:f.home, away:f.away,
        date:f.date, time:f.time,
        currentDate, currentTime,
        result: (res && matchPlayed) ? { homeGoals:res[0], awayGoals:res[1] } : null };
    });
  });
  return out;
};

// Given all fixtures, build a map of {mw: {start, end}} date ranges
// Then given a new date, find which MW it belongs to
function getMWDateRanges(fixturesByMW) {
  const ranges = {};
  Object.entries(fixturesByMW).forEach(([mw, fxs]) => {
    const dates = fxs.map(f => f.date).sort();
    ranges[parseInt(mw)] = { start: dates[0], end: dates[dates.length-1] };
  });
  return ranges;
}

function getDisplayMW(fx, mwRanges) {
  // If fixture hasn't moved, return original mw
  if (fx.currentDate === fx.date) return fx.mw;
  // Find which MW window the new date falls into
  const d = fx.currentDate;
  // Find closest MW by date proximity
  let bestMW = fx.mw;
  let bestDist = Infinity;
  Object.entries(mwRanges).forEach(([mw, range]) => {
    // Check if date is within or near this MW's window (within 5 days)
    const start = new Date(range.start + "T00:00:00");
    const end = new Date(range.end + "T23:59:59");
    const target = new Date(d + "T12:00:00");
    if (target >= start && target <= end) {
      bestMW = parseInt(mw);
      bestDist = 0;
      return;
    }
    // Distance from window
    const dist = target < start
      ? (start - target) / 86400000
      : (target - end) / 86400000;
    if (dist < bestDist) { bestDist = dist; bestMW = parseInt(mw); }
  });
  return bestMW;
}

// Get the MW a fixture should display in:
// - If moved, always show in new MW regardless of MW range windows
// - originalMW stored for reference display
function getTargetMW(fx, allFixtures) {
  // Not moved - stays in original MW
  if (fx.currentDate === fx.date) return fx.mw;
  
  // Moved - find which MW contains fixtures closest to the new date
  // Simply find the MW whose average date is closest to currentDate
  const newD = new Date(fx.currentDate + "T12:00:00");
  let bestMW = fx.mw;
  let bestDist = Infinity;
  
  Object.entries(allFixtures).forEach(([mwStr, list]) => {
    const mw = parseInt(mwStr);
    if (mw === fx.mw) return; // skip original MW
    if (!list.length) return;
    // Use the median date of fixtures in this MW
    const dates = list
      .filter(f => f.id !== fx.id)
      .map(f => new Date(f.currentDate + "T12:00:00").getTime());
    if (!dates.length) return;
    const median = dates.sort((a,b)=>a-b)[Math.floor(dates.length/2)];
    const dist = Math.abs(newD.getTime() - median);
    if (dist < bestDist) { bestDist = dist; bestMW = mw; }
  });
  
  return bestMW;
}

function calcPts(pred,result){
  if(!result||result.homeGoals===null||result.homeGoals===undefined)return null;
  const pH=parseInt(pred.homeGoals),pA=parseInt(pred.awayGoals);
  const rH=parseInt(result.homeGoals),rA=parseInt(result.awayGoals);
  if(isNaN(pH)||isNaN(pA))return null;
  if(pH===rH&&pA===rA)return 3;
  const po=pH>pA?"H":pH<pA?"A":"D",ro=rH>rA?"H":rH<rA?"A":"D";
  return po===ro?1:0;
}
