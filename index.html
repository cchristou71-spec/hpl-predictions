function PlayerManagerWC({players, setPlayers, pins, setPins, toast_}) {
  const PRESET = ["#60B8E8","#FDB913","#6699FF","#4ADE80","#FF6B6B","#E8557A","#CBD5E1","#A78BFA","#FB923C","#34D399"];
  const [editing, setEditing] = useState(null);
  const [name, setName] = useState(""); const [colour, setColour] = useState(PRESET[0]); const [pin, setPin] = useState("");

  const persist = async (np, pc) => {
    await supa.setState("pins", np).catch(()=>{});
    await supa.setState("player_config", pc).catch(()=>{});
  };

  const openAdd = () => { setName(""); setColour(PRESET[players.length%PRESET.length]); setPin(""); setEditing("new"); };
  const openEdit = (p) => { setName(p); setColour(playerColour(p)); setPin(pins[p]||""); setEditing(p); };

  const save = async () => {
    if (!name.trim()) return;
    const newPlayers = editing==="new" ? [...players, name.trim()] : players.map(p=>p===editing?name.trim():p);
    const newColours = {...PLAYER_COLOURS, [name.trim()]: colour};
    if (editing!=="new" && editing!==name.trim()) delete newColours[editing];
    const newPins = {...pins};
    if (pin.length===4) newPins[name.trim()] = pin; else delete newPins[name.trim()];
    if (editing!=="new" && editing!==name.trim()) delete newPins[editing];
    setPlayers(newPlayers); setPins(newPins); Object.assign(PLAYER_COLOURS, newColours);
    await persist(newPins, {players:newPlayers, colours:newColours});
    toast_(`✅ Player ${editing==="new"?"added":"updated"}`); setEditing(null);
  };

  const del = async (p) => {
    const newPlayers = players.filter(x=>x!==p);
    const newPins = {...pins}; delete newPins[p];
    setPlayers(newPlayers); setPins(newPins);
    await persist(newPins, {players:newPlayers, colours:PLAYER_COLOURS});
    toast_(`🗑️ Removed ${p}`);
  };

  if (editing) return (
    <div style={S.card}>
      <div style={S.ct}>{editing==="new"?"Add Player":`Edit ${editing}`}</div>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name" style={S.inp}/>
      <div style={{display:"flex", gap:6, flexWrap:"wrap", marginBottom:10}}>
        {PRESET.map(c=>(<div key={c} onClick={()=>setColour(c)} style={{width:26,height:26,borderRadius:"50%",background:c,cursor:"pointer",border:colour===c?"2px solid #fff":"2px solid transparent"}}/>))}
      </div>
      <input value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="4-digit PIN (optional)" maxLength={4}
        style={{...S.inp, fontFamily:"'JetBrains Mono',monospace", letterSpacing:6, textAlign:"center", fontSize:18, marginBottom:4}}/>
      <div style={{fontSize:11, color:C.chalkFaint, marginBottom:10}}>Leave blank to use the default PIN (0000) — they'll be asked to set their own on first login.</div>
      <div style={{display:"flex", gap:8}}>
        <button onClick={()=>setEditing(null)} style={{...S.btnGhost, flex:1}}>Cancel</button>
        <button onClick={save} disabled={!name.trim()} style={{...S.btn, flex:2, opacity:!name.trim()?0.4:1}}>Save</button>
      </div>
    </div>
  );

  return (
    <div style={S.card}>
      <div style={{display:"flex", justifyContent:"space-between", marginBottom:10}}>
        <div style={S.ct}>Players ({players.length})</div>
        <button onClick={openAdd} style={{...S.btnGhost, color:C.win, borderColor:C.win}}>+ Add</button>
      </div>
      {players.map(p=>(
        <div key={p} style={{display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:`1px solid ${C.lineSoft}`}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:playerColour(p)}}/>
          <span style={{flex:1, color:playerColour(p), fontWeight:700, fontSize:14}}>{p}</span>
          <span style={{fontSize:10, color:pins[p]?C.win:C.goldSoft}}>{pins[p]?"PIN set ✓":"Default (0000)"}</span>
          <button onClick={()=>openEdit(p)} style={{...S.btnGhost, padding:"4px 10px", fontSize:11}}>Edit</button>
          <button onClick={()=>del(p)} style={{...S.btnGhost, padding:"4px 10px", fontSize:11, color:C.red, borderColor:C.red}}>✕</button>
        </div>
      ))}
    </div>
  );
}

function BracketEditor({bracket, saveBracket, toast_}) {
  const [activeRound, setActiveRound] = useState("r32");
  const matches = bracket[activeRound] || [];

  const updateTeam = (matchId, side, value) => {
    const nb = JSON.parse(JSON.stringify(bracket));
    const m = nb[activeRound].find(x=>x.id===matchId);
    m[side] = value;
    saveBracket(nb);
  };
  const updateMeta = (matchId, field, value) => {
    const nb = JSON.parse(JSON.stringify(bracket));
    const m = nb[activeRound].find(x=>x.id===matchId);
    m[field] = value;
    saveBracket(nb);
  };
  const updateResult = (matchId, field, value) => {
    const nb = JSON.parse(JSON.stringify(bracket));
    const m = nb[activeRound].find(x=>x.id===matchId);
    const v = value==="" ? null : parseInt(value);
    m.result = { ...(m.result||{}), [field]: v };
    saveBracket(nb);
    toast_(`✅ ${ROUND_LABELS[activeRound]} updated — next round auto-filled`);
  };
  const setWinnerOnDraw = (matchId, winnerTeam) => {
    const nb = JSON.parse(JSON.stringify(bracket));
    const m = nb[activeRound].find(x=>x.id===matchId);
    m.result = { ...(m.result||{}), winner: winnerTeam };
    saveBracket(nb);
    toast_(`✅ Winner set: ${winnerTeam} (after ET/pens)`);
  };

  return (
    <div>
      <div style={{display:"flex", gap:6, overflowX:"auto", marginBottom:14, paddingBottom:4}}>
        {ROUND_ORDER.map(r=>(
          <button key={r} onClick={()=>setActiveRound(r)}
            style={{flexShrink:0, padding:"7px 12px", borderRadius:18, fontSize:11, fontWeight:700, cursor:"pointer",
              background: activeRound===r ? C.blue : C.bgCard, color: activeRound===r ? "#fff" : C.chalkDim,
              border:`1px solid ${activeRound===r?C.blue:C.line}`}}>
            {ROUND_LABELS[r]}
          </button>
        ))}
      </div>

      {activeRound==="r32" && (
        <div style={{fontSize:11, color:C.chalkDim, marginBottom:10, lineHeight:1.6}}>
          Team names and results normally fill in automatically from ESPN above. Use this only to fix a mismatch or fill a gap manually — use full team names (e.g. "Brazil", "Switzerland") so flags and predictions match correctly. Kickoff times are shown in UK time (BST).
        </div>
      )}
      {activeRound!=="r32" && (
        <div style={{fontSize:11, color:C.chalkDim, marginBottom:10, lineHeight:1.6}}>
          Teams auto-fill once the previous round's results are entered. Enter scores below as they're confirmed.
        </div>
      )}

      {matches.map(m=>{
        const tbc = isPlaceholderTeam(m.home) || isPlaceholderTeam(m.away);
        const draw = m.result && m.result.homeGoals!=null && m.result.awayGoals!=null && m.result.homeGoals===m.result.awayGoals;
        return (
          <div key={m.id} style={{...S.card, opacity: tbc && activeRound!=="r32" ? 0.5 : 1}}>
            <div style={{fontSize:11, color:C.chalkFaint, marginBottom:8}}>{m.id.toUpperCase()}</div>

            {activeRound==="r32" ? (
              <div style={{marginBottom:8}}>
                <div style={{display:"flex", gap:8, marginBottom:4}}>
                  <input value={isPlaceholderTeam(m.home)?"":m.home}
                    onChange={e=>updateTeam(m.id,"home",e.target.value||m.slotHome||"TBC")}
                    placeholder={m.slotHome||"Home team"} style={{...S.inp, marginBottom:0, flex:1}}/>
                  <input value={isPlaceholderTeam(m.away)?"":m.away}
                    onChange={e=>updateTeam(m.id,"away",e.target.value||m.slotAway||"TBC")}
                    placeholder={m.slotAway||"Away team"} style={{...S.inp, marginBottom:0, flex:1}}/>
                </div>
                <div style={{fontSize:10, color:C.chalkFaint, fontStyle:"italic"}}>

                </div>

            ) : (
              <div style={{display:"flex", justifyContent:"space-between", marginBottom:8}}>
                <TeamRow name={m.home} size={14}/><span style={{color:C.chalkFaint}}>vs</span><TeamRow name={m.away} size={14}/>
              </div>
            )}

            <div style={{display:"flex", gap:8, marginBottom:8, flexWrap:"wrap"}}>
              <input type="date" value={m.date||""} onChange={e=>updateMeta(m.id,"date",e.target.value)}
                style={{...S.inp, marginBottom:0, width:140, fontSize:12, padding:"7px 8px"}}/>
              <input type="time" value={m.time||""} onChange={e=>updateMeta(m.id,"time",e.target.value)}

              <input value={m.venue||""} onChange={e=>updateMeta(m.id,"venue",e.target.value)} placeholder="Venue"

                    {m.home}
                  </button>
                  <button onClick={()=>setWinnerOnDraw(m.id,m.away)}
                    style={{...S.btnGhost, flex:1, background: m.result.winner===m.away?C.win:"transparent", color: m.result.winner===m.away?"#fff":C.chalk}}>
                    {m.away}
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function RevealPanel({reveals, setReveals, deadlines, setDeadlines, manuallyUnlocked, setManuallyUnlocked, toast_,
  bracket, players, predictions}) {
  const [drafts, setDrafts] = React.useState({}); // tracks onChange edits, used only as a fallback
  const inputRefs = React.useRef({}); // round -> actual <input> DOM node, read directly on Save

  // For a given round, how many matches are actually playable right now (both teams
  // confirmed — a match still showing "Winner Group X" can't be predicted yet, so it
  // shouldn't count against anyone) and how many of those each player has filled in.
  const roundCompletion = (rnd) => {
    const matches = bracket?.[rnd] || [];
    const playable = matches.filter(m => !isPlaceholderTeam(m.home) && !isPlaceholderTeam(m.away));
    const total = playable.length;
    const perPlayer = (players||[]).map(p => {
      const preds = predictions?.[p] || {};
      const done = playable.filter(m => {
        const pred = preds[m.id];
        return pred && pred.homeGoals!=null && pred.awayGoals!=null;
      }).length;
      return { player: p, done, total };
    });
    return { total, perPlayer };
  };

  const saveDeadline = async (rnd) => {
    const val = inputRefs.current[rnd]?.value || drafts[rnd];
    if (!val) { toast_("Pick a date and time first", "error"); return; }
    const nd = { ...deadlines, [rnd]: val };
    setDeadlines(nd);
    try {
      await supa.setState("deadlines", nd);
      toast_(`⏰ ${ROUND_LABELS[rnd]} deadline set: ${fmtDeadline(val)}`);
    } catch(e) {
      toast_(`Save failed: ${e.message}`, "error");
    }
  };

  const clearDeadline = async (rnd) => {
    const nd = { ...deadlines }; delete nd[rnd];
    setDeadlines(nd);
    await supa.setState("deadlines", nd).catch(()=>{});
    setDrafts(d => ({...d, [rnd]: ""}));
    if (inputRefs.current[rnd]) inputRefs.current[rnd].value = "";
    toast_(`Deadline cleared for ${ROUND_LABELS[rnd]}`);
  };

  // Manual toggle: locking always works normally. Unlocking a round that was auto-locked
  // (or previously locked) marks it as manually-unlocked, which the app's auto-lock check
  // respects forever afterwards — it will never re-lock that round on its own again.
  // Clears the "manually unlocked" flag without touching the round's current lock
  // state — for when an admin unlocked a round just to test something and wants
  // the deadline-based auto-lock to resume working normally afterwards.
  const resumeAutoLock = async (rnd) => {
    const nmu = { ...manuallyUnlocked }; delete nmu[rnd];
    setManuallyUnlocked(nmu);
    await supa.setState("manually_unlocked", nmu).catch(()=>{});
    toast_(`${ROUND_LABELS[rnd]} will auto-lock normally at its deadline again`);
  };

  const toggle = async (rnd) => {
    const willUnlock = !!reveals[rnd];
    const nr = { ...reveals, [rnd]: !reveals[rnd] };
    setReveals(nr);
    await supa.setState("reveals", nr).catch(()=>{});
    if (willUnlock) {
      const nmu = { ...manuallyUnlocked, [rnd]: true };
      setManuallyUnlocked(nmu);
      await supa.setState("manually_unlocked", nmu).catch(()=>{});
      toast_(`🔓 ${ROUND_LABELS[rnd]} unlocked — won't auto-lock again until you lock it manually`);
    } else {
      // Locking manually also clears the "manually unlocked" flag, so a future deadline
      // change or admin action starts from a clean state for this round.
      const nmu = { ...manuallyUnlocked }; delete nmu[rnd];
      setManuallyUnlocked(nmu);
      await supa.setState("manually_unlocked", nmu).catch(()=>{});
      toast_(`🔒 ${ROUND_LABELS[rnd]} locked — predictions revealed`);
    }
  };

  return (
    <div>
      <p style={{fontSize:12, color:C.chalkDim, marginBottom:14, lineHeight:1.6}}>
        Set a deadline for each round — players see it on the Predict tab. The round locks
        automatically once the deadline passes. If you unlock it again, it stays unlocked
        until you lock it manually; the app won't auto-lock it a second time.
      </p>
      {ROUND_ORDER.map(r=>{
        const deadlinePassed = deadlines[r] && new Date(deadlines[r]) <= new Date();
        return (
          <div key={r} style={{padding:"12px 0", borderBottom:`1px solid ${C.lineSoft}`}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
              <span style={{color:C.chalk, fontWeight:700, fontSize:14}}>{ROUND_LABELS[r]}</span>
              <button onClick={()=>toggle(r)} style={{...S.btnGhost,
                background: reveals[r]?C.winSoft:"transparent", color: reveals[r]?C.win:C.chalkDim,
                borderColor: reveals[r]?C.win:C.line}}>
                {reveals[r] ? "🔓 Revealed" : "🔒 Hidden"}
              </button>
            </div>
            <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
              <input type="datetime-local"
                ref={el => { inputRefs.current[r] = el; }}
                defaultValue={deadlines[r] ?? ""}
                onChange={e=>setDrafts(d=>({...d, [r]: e.target.value}))}
                style={{...S.inp, marginBottom:0, width:"100%", minWidth:240, fontSize:13, padding:"8px 10px"}}/>
              <button onClick={()=>saveDeadline(r)}
                style={{...S.btnGhost, fontSize:12}}>
                Save
              </button>
              {deadlines[r] && (
                <button onClick={()=>clearDeadline(r)} style={{...S.btnGhost, fontSize:12, color:C.red, borderColor:C.red}}>
                  Clear
                </button>
              )}
            </div>
            {deadlines[r] && (
              <div style={{fontSize:11, marginTop:6, color: deadlinePassed && !reveals[r] ? C.red : C.chalkDim}}>
                {deadlinePassed && !reveals[r]
                  ? "⚠️ Deadline passed — will auto-lock within a minute"
                  : `Players see: "Predictions close: ${fmtDeadline(deadlines[r])}"`}
              </div>
            )}
            {manuallyUnlocked[r] && (
              <div style={{fontSize:10, color:C.gold, marginTop:4, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                <span>⚡ Manually unlocked — won't auto-lock again until you lock it yourself</span>
                <button onClick={()=>resumeAutoLock(r)} style={{...S.btnGhost, fontSize:10, padding:"2px 8px"}}>
                  Resume auto-lock
                </button>
              </div>
            )}
            {!reveals[r] && (() => {
              const { total, perPlayer } = roundCompletion(r);
              if (total === 0) return (
                <div style={{fontSize:11, color:C.chalkFaint, marginTop:8}}>No playable matches yet for this round</div>
              );
              const allDone = perPlayer.every(p => p.done === total);
              return (
                <div style={{marginTop:10, paddingTop:10, borderTop:`1px solid ${C.lineSoft}`}}>
                  <div style={{fontSize:11, fontWeight:700, color:C.chalkDim, marginBottom:6}}>
                    Who's predicted ({total} match{total!==1?"es":""} playable)
                    {allDone && <span style={{color:C.win}}> — everyone's done ✅</span>}
                  </div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                    {perPlayer.map(({player, done}) => {
                      const complete = done === total;
                      return (
                        <span key={player} style={{
                          display:"inline-flex", alignItems:"center", gap:4,
                          padding:"4px 9px", borderRadius:8, fontSize:11, fontWeight:600,
                          background: complete ? C.winSoft : C.bgCard2,
                          color: complete ? C.win : C.chalkDim,
                          border:`1px solid ${complete ? C.win : C.line}`}}>
                          {complete ? "✓" : `${done}/${total}`} {player}
                        </span>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
          </div>
        );
      })}
    </div>
  );
}

function EntryFeePanel({players, entryFees, setEntryFees, ENTRY_FEE, toast_}) {
  const paidCount = players.filter(p => (entryFees[p]||{}).paid === "Y").length;
  const pot = paidCount * ENTRY_FEE;

  const update = async (p, field, value) => {
    const updated = { ...entryFees, [p]: { ...(entryFees[p]||{}), [field]: value } };
    setEntryFees(updated);
    await supa.setState("entry_fees", updated).catch(()=>{});
  };

  return (
    <div>
      <div style={{background:C.goldDim, border:`1px solid ${C.gold}`, borderRadius:10, padding:"12px 14px", marginBottom:14, textAlign:"center"}}>
        <div style={{fontSize:11, color:C.chalkDim, fontWeight:600}}>PRIZE POT · WINNER TAKES ALL</div>
        <div style={{fontSize:28, fontWeight:800, color:C.chalk, fontFamily:"'Archivo Black',sans-serif", marginTop:2}}>£{pot}</div>
        <div style={{fontSize:11, color:C.chalkDim, marginTop:2}}>{paidCount}/{players.length} paid · £{ENTRY_FEE} per person</div>
      </div>
      <table style={{width:"100%", borderCollapse:"collapse", fontSize:13}}>
        <thead>
          <tr style={{borderBottom:`1px solid ${C.line}`}}>
            <th style={{textAlign:"left", padding:"6px 6px", color:C.chalkDim, fontWeight:600}}>Player</th>
            <th style={{textAlign:"center", padding:"6px 6px", color:C.chalkDim, fontWeight:600}}>Paid</th>
            <th style={{textAlign:"center", padding:"6px 6px", color:C.chalkDim, fontWeight:600}}>Method</th>
            <th style={{textAlign:"left", padding:"6px 6px", color:C.chalkDim, fontWeight:600}}>Date</th>
          </tr>
        </thead>
        <tbody>
          {players.map(p => {
            const fee = entryFees[p] || {paid:"N", method:"", date:""};
            return (
              <tr key={p} style={{borderBottom:`1px solid ${C.lineSoft}`}}>
                <td style={{padding:"8px 6px", color:playerColour(p), fontWeight:700}}>{p}</td>
                <td style={{padding:"8px 6px", textAlign:"center"}}>
                  <button onClick={()=>update(p,"paid", fee.paid==="Y"?"N":"Y")}
                    style={{background: fee.paid==="Y"?C.winSoft:C.redSoft, color: fee.paid==="Y"?C.win:C.red,
                      border:"none", borderRadius:6, padding:"4px 12px", fontSize:12, fontWeight:700, cursor:"pointer"}}>
                    {fee.paid==="Y" ? "✓ Paid" : "✗ Unpaid"}
                  </button>
                </td>
                <td style={{padding:"8px 6px", textAlign:"center"}}>
                  <select value={fee.method||""} onChange={e=>update(p,"method",e.target.value)}
                    style={{...S.inp, marginBottom:0, padding:"4px 6px", fontSize:12, width:90}}>
                    <option value="">—</option>
                    <option value="Cash">Cash</option>
                    <option value="Transfer">Transfer</option>
                  </select>
                </td>
                <td style={{padding:"8px 6px"}}>
                  <input type="date" value={fee.date||""} onChange={e=>update(p,"date",e.target.value)}
                    style={{...S.inp, marginBottom:0, padding:"4px 6px", fontSize:12, width:130}}/>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <p style={{fontSize:11, color:C.chalkFaint, marginTop:10}}>Winner takes the full pot — no split for runners-up.</p>
    </div>
  );
}


function ResetPanel({saveBracket, setReveals, setPredictions, setEntryFees, toast_}) {
  const [confirm, setConfirm] = useState("");
  const [busy, setBusy] = useState(false);
  const doReset = async () => {
    setBusy(true);
    try {
      const fresh = buildInitialBracket();
      await saveBracket(fresh);
      setReveals({}); await supa.setState("reveals", {}).catch(()=>{});
      setPredictions({}); await supa.setState("predictions", {}).catch(()=>{});
      if (setEntryFees) { setEntryFees({}); await supa.setState("entry_fees", {}).catch(()=>{}); }
      toast_("✅ Fixtures reset — ready for a new tournament");
      setConfirm("");
    } catch(e) { toast_("Reset failed: "+e.message, "error"); }
    setBusy(false);
  };
  return (
    <div>
      <p style={{fontSize:12, color:C.chalkDim, marginBottom:12, lineHeight:1.6}}>
        ⚠️ This clears all fixtures, results, predictions, and entry fee records. Players and PINs are kept. Use this to start fresh for a future tournament.
      </p>
      <div style={{fontSize:11, color:C.chalkDim, marginBottom:6}}>Type RESET to confirm:</div>
      <input value={confirm} onChange={e=>setConfirm(e.target.value)} style={{...S.inp, textAlign:"center", letterSpacing:2}}/>
      <button disabled={busy||confirm.toUpperCase()!=="RESET"} onClick={doReset}
        style={{...S.btn, width:"100%", background:C.red, color:"#fff", opacity:(busy||confirm.toUpperCase()!=="RESET")?0.4:1}}>
        {busy?"Resetting…":"🔄 Reset Fixtures"}
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
