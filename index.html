    if(reveals[mw]){toast_("This match week has been revealed — predictions are locked.","error");return;}
    if(isPast(mw)){toast_("Deadline passed!","error");return;}

    // Validate jokers before saving
    const draftJokerCount=Object.values(draft).filter(p=>p.joker).length;
    if(draftJokerCount>1){
      toast_("Only 1 joker allowed per match week — please remove the extra joker before saving","error");
      return;
    }
    if(draftJokerCount===1){
      const h=half(mw);
      const df3=displayFixtures||fixtures;
      const fxDMW3={};
      Object.entries(df3).forEach(([mwStr,fxList])=>{ fxList.forEach(fx=>{ fxDMW3[fx.id]=parseInt(mwStr); }); });
      const pPreds=predictions[me]||{};
      let jkOtherMWs=0;
      Object.entries(pPreds).forEach(([fxId,pred])=>{
        if(!pred?.joker) return;
        const origMW=parseInt(fxId.split('-')[0]);
        const displayedMW=fxDMW3[fxId]||origMW;
        if(half(origMW)===h && displayedMW!==mw) jkOtherMWs++;
      });
      if(jkOtherMWs>=5){
        toast_("Joker limit — you've already used 5 jokers this half-season","error");
        return;
      }
    }
    const pr2={...predictions,[me]:{...(predictions[me]||{}),...draft}};
    const jk2={...jokers};if(!jk2[me])jk2[me]={};
    if(Object.values(draft).some(p=>p.joker)&&canJoker(me,mw))jk2[me][mw]=true;
    setPredictions(pr2);setJokers(jk2);
    saveAll({pr:pr2,jk:jk2});
    // Save predictions to Supabase so all devices see them
    const mwDraft = draft;
    saveAllPredictions(me, Object.fromEntries(
      Object.entries(mwDraft).map(([fxId,p])=>[fxId,{
        homeGoals:p.homeGoals!==undefined?p.homeGoals:null,
        awayGoals:p.awayGoals!==undefined?p.awayGoals:null,
        joker:p.joker||false
      }])
    )).then(()=>{
      toast_("Saved! 🎯");
    }).catch(e=>{
      toast_("Saved locally — sync to server failed","error");
      console.log("Supabase prediction save failed:",e.message);
    });
    setDraft({});
  };


  const props={fixtures,displayFixtures,predictions,reveals,deadlines,players,jokers,isPast,jokersUsed,hasJoker,canJoker};

  return(
    <div style={S.app}>
      <header style={S.hdr}>
        <div style={S.hdrIn}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={S.badge}>⚽</div>
            <div><div style={S.title}>HPL Predictions</div><div style={S.sub}>2025/26 · <span style={{color:"#7C3AED"}}>v5.1</span> · <span style={{color:"#475569",fontSize:10}}>
  Built 13 May 2026 12:59 BST
  {lastRefresh&&<span style={{marginLeft:8,color:"#34D39988"}}>· Refreshed {lastRefresh}</span>}
</span></div></div>
          </div>
          {me&&<div style={S.chip}><span style={S.dot}/>{me}</div>}
        </div>
        {/* Global instruction banner */}
        <div style={{background:"#1E293B",borderBottom:"1px solid #334155",
          padding:"10px 16px",fontSize:15,fontWeight:600,color:"#E2E8F0",textAlign:"center",letterSpacing:0.2}}>
          📱 To enter predictions: tap <b style={{color:"#A78BFA"}}>Predictions</b> → enter your name
        </div>
        <nav style={S.nav}>
          {[["predict","🎯 Predictions"],["results","📊 Results"],["league","🏆 Progress"],["season","📅 League"],["admin","⚙️ Admin"]].map(([id,lbl])=>(
            <button key={id} style={{...S.nb,...(tab===id?S.nba:{})}} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </nav>
      </header>
      {toast&&<div style={{...S.toast,background:toast.type==="error"?"#EF4444":"#10B981"}}>{toast.msg}</div>}



      {/* Supabase loading */}
      {supaLoading&&(
        <div style={{background:"#1E1B4B",padding:"10px 16px",fontSize:13,color:"#A78BFA",
          display:"flex",alignItems:"center",gap:8}}>
          <span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>
          Loading latest predictions from server...
        </div>
      )}
      {supaError&&!supaLoading&&(
        <div style={{background:"#7F1D1D22",borderBottom:"1px solid #EF444444",
          padding:"8px 16px",fontSize:12,color:"#EF4444"}}>
          ⚠️ Could not connect to server — showing local data. Check your connection.
        </div>
      )}
      {refreshStatus==="loading"&&(
        <div style={{background:"#1E293B",padding:"8px 16px",fontSize:12,color:"#60A5FA",display:"flex",alignItems:"center",gap:8}}>
          <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>
          Checking results from last 280 days (full season)...
        </div>
      )}
      {refreshStatus&&refreshStatus!=="loading"&&(refreshStatus.updated>0||refreshStatus.dateChanges>0)&&(
        <div style={{background:"#065F4622",borderBottom:"1px solid #34D39944",padding:"8px 16px",fontSize:12,color:"#34D399"}}>
          ✅ {[refreshStatus.updated>0&&`${refreshStatus.updated} result${refreshStatus.updated>1?"s":""} updated`,refreshStatus.dateChanges>0&&`${refreshStatus.dateChanges} fixture date${refreshStatus.dateChanges>1?"s":""} updated`].filter(Boolean).join(" · ")}
        </div>
      )}
      <main style={S.main}>
        {tab==="predict"&&<Predict {...props} me={me} setMe={setMe} pins={pins} setPins={setPins} pinScreen={pinScreen} setPinScreen={setPinScreen} saveAll={saveAll} mw={mw} setMw={setMw} draft={draft} setDraft={setDraft} submit={submit} search={search} setSearch={setSearch} setPredictions={setPredictions} setAdmin={setAdmin}/>}
        {tab==="results"&&<Results {...props} me={me} expMW={expMW} setExpMW={setExpMW} search={search} setSearch={setSearch} searchMode={searchMode} setSearchMode={setSearchMode} homeQ={homeQ} setHomeQ={setHomeQ} awayQ={awayQ} setAwayQ={setAwayQ}/>}
        {tab==="season"&&<SeasonTab
          players={players} me={me}
          seasonPreds={seasonPreds} setSeasonPreds={setSeasonPreds}
          seasonActual={seasonActual} seasonPts={seasonPts} seasonGP={seasonGP}
          saveAll={saveAll} toast_={toast_} setTab={setTab}
        />}
        {tab==="league"&&<League {...props} me={me}/>}
        {tab==="admin"&&<Admin {...props} fixtures={fixtures} displayFixtures={displayFixtures} setFixtures={setFixtures} predictions={predictions} setPredictions={setPredictions} jokers={jokers} setJokers={setJokers} pins={pins} setPins={setPins} reveals={reveals} setReveals={setReveals} deadlines={deadlines} setDeadlines={setDeadlines} players={players} setPlayers={setPlayers} admin={admin} setAdmin={setAdmin} toast_={toast_} saveAll={saveAll} syncStatus={syncStatus} setSupaLoading={setSupaLoading} seasonActual={seasonActual} setSeasonActual={setSeasonActual} seasonPreds={seasonPreds} setSeasonPreds={setSeasonPreds} seasonPts={seasonPts} setSeasonPts={setSeasonPts} seasonGP={seasonGP} standingsSource={standingsSource}/>}
      </main>
    </div>
  );
}

function Predict({fixtures,displayFixtures,predictions,reveals,deadlines,players,jokers,isPast,jokersUsed,hasJoker,canJoker,me,setMe,pins,setPins,pinScreen,setPinScreen,saveAll,mw,setMw,draft,setDraft,submit,setPredictions,setAdmin}){
  const fxList=(displayFixtures||fixtures)[mw]||[];
  const past=isPast(mw),revealed=reveals[mw];
  const ep=me?(predictions[me]||{}):{};
  // jUsed = true only if joker is on a fixture currently displayed in this MW
  // (not moved fixtures whose joker was set in a different MW)
  const jUsed=me?(
    Object.values(draft).some(p=>p.joker) ||
    fxList.some(fx=>(predictions[me]||{})[fx.id]?.joker && !draft[fx.id]?.joker && draft[fx.id]?.joker!==false)
  ):false;
  // Can play joker if: not already used in this displayed MW, and under 5 for half-season
  const jOk=me&&!jUsed&&jokersUsed(me,half(mw))<5;
  const merged=(id)=>draft[id]||ep[id]||{};
  const set_=(id,f,v)=>{
    setDraft(d=>{
      const updated={...d,[id]:{...(d[id]||ep[id]||{}),[f]:v}};
      const pred=updated[id];
      const hg=pred.homeGoals; const ag=pred.awayGoals;
      const bothFilled = hg!==undefined && hg!=="" && ag!==undefined && ag!=="";
      const bothBlank = (hg===undefined||hg==="") && (ag===undefined||ag==="");
      if((bothFilled||bothBlank) && !past && !revealed && me){
        const hgVal=bothBlank?null:parseInt(hg);
        const agVal=bothBlank?null:parseInt(ag);
        const jkVal=pred.joker||false;
        savePrediction(me,id,hgVal,agVal,jkVal)
          .then(()=>{
            setPredictions(pr=>({...pr,[me]:{...(pr[me]||{}),[id]:{homeGoals:hgVal,awayGoals:agVal,joker:jkVal}}}));
            // Clear from draft once saved - reads from predictions state going forward
            setDraft(d=>{const nd={...d};delete nd[id];return nd;});
          }).catch(console.error);
      }
      return updated;
    });
  };
  const toggleJ=(id)=>{
    const cur=(draft[id]||ep[id]||{}).joker;
    if(cur){
      // Turning OFF — always allowed, clear from all fixtures in MW and auto-save
      const nd={...draft};
      fxList.forEach(fx=>{
        if(nd[fx.id]?.joker) nd[fx.id]={...nd[fx.id],joker:false};
        if(!nd[fx.id]&&ep[fx.id]?.joker) nd[fx.id]={...ep[fx.id],joker:false};
      });
      setDraft(nd);
      // Save the cleared joker to Supabase
      if(me){
        const pred=nd[id]||ep[id]||{};
        savePrediction(me,id,pred.homeGoals??null,pred.awayGoals??null,false).catch(console.error);
      }
    } else {
      // Turning ON — validate half-season limit (excluding current MW)
      const h=half(mw);
      // Count jokers in OTHER MWs this half (using display MW for accuracy)
      const df2=displayFixtures||fixtures;
      const fxDMW={};
      Object.entries(df2).forEach(([mwStr,fxList])=>{
        fxList.forEach(fx=>{ fxDMW[fx.id]=parseInt(mwStr); });
      });
      const pPreds=predictions[me]||{};
      let jkOtherMWs=0;
      Object.entries(pPreds).forEach(([fxId,pred])=>{
        if(!pred?.joker) return;
        const displayedMW=fxDMW[fxId]||parseInt(fxId.split('-')[0]);
        // A moved fixture's joker counts for its ORIGINAL half (H1 fixture stays H1)
        // but only counts against CURRENT week's limit if it shows in current MW
        const origMW=parseInt(fxId.split('-')[0]);
        if(half(origMW)===h && displayedMW!==mw) jkOtherMWs++;
      });
      if(jkOtherMWs>=5){
        toast_("Joker limit — you've used all 5 jokers this half-season","error");
        return;
      }
      // Check not already using a joker in this MW (different fixture)
      const hasOtherJoker=fxList.some(fx=>{
        if(fx.id===id) return false;
        return (draft[fx.id]?.joker)||(ep[fx.id]?.joker&&draft[fx.id]?.joker!==false);
      });
      if(hasOtherJoker){
        toast_("Only 1 joker allowed per match week — remove the other joker first","error");
        return;
      }
      // Set joker, clearing others, and auto-save
      const nd={...draft};
      fxList.forEach(fx=>{
        if(nd[fx.id]?.joker) nd[fx.id]={...nd[fx.id],joker:false};
        if(!nd[fx.id]&&ep[fx.id]?.joker) nd[fx.id]={...ep[fx.id],joker:false};
      });
      nd[id]={...(nd[id]||ep[id]||{}),joker:true};
      setDraft(nd);
      // Auto-save joker to Supabase
      if(me){
        const pred=nd[id]||ep[id]||{};
        savePrediction(me,id,pred.homeGoals??null,pred.awayGoals??null,true).catch(console.error);
        // Clear joker from others
        fxList.forEach(fx=>{
          if(fx.id!==id && (nd[fx.id]?.joker===false || (!nd[fx.id]&&ep[fx.id]?.joker))){
            const p=nd[fx.id]||ep[fx.id]||{};
            savePrediction(me,fx.id,p.homeGoals??null,p.awayGoals??null,false).catch(console.error);
          }
        });
      }
    }
  };

  const[changingPin,setChangingPin]=useState(false);

  const handleSelectPlayer=(p)=>{
    if(pins[p]){
      setPinScreen({player:p,mode:"enter"});
    } else {
      setPinScreen({player:p,mode:"set"});
    }
  };

  const[nameInput,setNameInput]=useState("");
  const[nameError,setNameError]=useState("");

  const handleNameSubmit=()=>{
    const trimmed=nameInput.trim();
    const match=players.find(p=>p.toLowerCase()===trimmed.toLowerCase());
    if(!match){
      setNameError("Name not recognised — please check your spelling");
      return;
    }
    setNameError("");
    handleSelectPlayer(match);
  };

  if(!me) return (
    <div>
      {!pinScreen ? (
        <div style={S.card}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:40,marginBottom:8}}>⚽</div>
            <div style={S.ct}>Welcome to HPL Predictions</div>
            <p style={{color:"#64748B",fontSize:13,marginTop:6}}>
              Enter your name to get started
            </p>
          </div>
          <div style={{marginBottom:12}}>
            <input
              type="text"
              value={nameInput}
              onChange={e=>{setNameInput(e.target.value);setNameError("");}}
              onKeyDown={e=>{if(e.key==="Enter")handleNameSubmit();}}
              placeholder="Your first name..."
              autoFocus
              style={{...S.inp,fontSize:18,padding:"14px 16px",textAlign:"center",
                border:`2px solid ${nameError?"#EF4444":nameInput?"#7C3AED":"#334155"}`,
                borderRadius:12}}
            />
            {nameError&&(
              <div style={{color:"#EF4444",fontSize:13,marginTop:8,textAlign:"center"}}>
                ⚠️ {nameError}
              </div>
            )}
          </div>
          <button
            onClick={handleNameSubmit}
            disabled={!nameInput.trim()}
            style={{...S.bb,padding:"14px",fontSize:16,fontWeight:700,
              opacity:nameInput.trim()?1:0.4}}>
            Continue →
          </button>
          <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"#475569"}}>
            If you've forgotten your PIN, enter your name then tap <b style={{color:"#F59E0B"}}>Forgot PIN?</b>
          </div>
        </div>
      ) : (
        <PinScreen
          player={pinScreen.player}
          mode={pinScreen.mode}
          pins={pins}
          onSuccess={(p)=>{ setMe(p); setPinScreen(null); setNameInput(""); setAdmin(false); }}
          onSavePin={(p,pin)=>{
            const newPins={...pins};
            if(pin===null){delete newPins[p];}else{newPins[p]=pin;}
            setPins(newPins);
            saveAll({pins:newPins});
            if(pin!==null){setMe(p);setAdmin(false);}
            setPinScreen(null);
            setNameInput("");
          }}
          onCancel={()=>{setPinScreen(null);}}
        />
      )}
    </div>
  );

  return(
    <div>
      {/* Logged-in user banner */}
      <div style={{background:playerColour(me)+"22",border:`2px solid ${playerColour(me)}55`,
        borderRadius:12,padding:"12px 16px",marginBottom:14,
        display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:playerColour(me),flexShrink:0}}/>
          <div>
            <div style={{fontSize:11,color:"#64748B",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>
              Logged in as
            </div>
            <div style={{fontSize:20,fontWeight:800,color:playerColour(me),lineHeight:1.1}}>{me}</div>
            <div style={{fontSize:11,color:"#64748B",marginTop:2}}>
              {(()=>{
                const df=displayFixtures||fixtures;
                const revs=Object.entries(reveals||{}).filter(([,v])=>v).map(([k])=>parseInt(k));
                let tot=0;
                revs.forEach(w=>{
                  (df[w]||[]).forEach(fx=>{
                    if(!fx.result)return;
                    const pred=(predictions[me]||{})[fx.id];if(!pred)return;
                    const pts=calcPts(pred,fx.result);if(pts===null)return;
                    tot+=pts*(pred.joker?2:1);
                  });
                });
                return <span style={{color:playerColour(me),fontWeight:700,fontSize:14}}>{tot} pts</span>;
              })()}
            </div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.sb,fontSize:13,padding:"6px 14px"}} onClick={()=>{setMe(null);setAdmin(false);}}>
              🔄 Switch User
            </button>
            <button style={{...S.sb,color:"#F59E0B",border:"1px solid #F59E0B44",fontSize:13,padding:"6px 14px"}}
              onClick={()=>setChangingPin(true)}>
              🔑 PIN
            </button>
          </div>
          {[1,2].map(h=>{
              const used=jokersUsed(me,h);
              const remaining=5-used;
              return(
                <div key={h} style={{background:"#1E293B",border:`1px solid ${remaining>0?"#F59E0B44":"#EF444444"}`,
                  borderRadius:8,padding:"6px 10px",fontSize:12}}>
                  <div style={{color:"#64748B",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>
                    {h===1?"H1 Jokers":"H2 Jokers"}
                  </div>
                  <div style={{display:"flex",gap:3,marginBottom:4}}>
                    {Array.from({length:5},(_,i)=>(
                      <div key={i} style={{width:16,height:8,borderRadius:3,
                        background:i<used?"#F59E0B":"#334155"}}/>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:6,fontSize:11}}>
                    <span style={{color:"#F59E0B"}}>{used} used</span>
                    <span style={{color:"#475569"}}>·</span>
                    <span style={{color:remaining>0?"#34D399":"#EF4444",fontWeight:700}}>{remaining} left</span>
                  </div>
                </div>
              );
            })}
        </div>
      </div>

      {changingPin&&(
        <PinScreen
          player={me}
          mode="change"
          pins={pins}
          onSuccess={()=>setChangingPin(false)}
          onSavePin={(p,pin)=>{
            const newPins={...pins};
            if(pin===null){delete newPins[p];}else{newPins[p]=pin;}
            setPins(newPins);
            saveAll({pins:newPins});
            setChangingPin(false);
          }}
          onCancel={()=>setChangingPin(false)}
        />
      )}

      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={S.ct}>Match Week</span>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button style={S.sb} onClick={()=>setMw(m=>Math.max(1,m-1))}>◀</button>
            <span style={{...S.badge,background:"#7C3AED",fontSize:14,padding:"5px 12px"}}>MW {mw}</span>
            <button style={S.sb} onClick={()=>setMw(m=>Math.min(38,m+1))}>▶</button>
          </div>
        </div>
        {/* W/c date for selected MW */}
        {(()=>{
          const fxList=(displayFixtures||fixtures)[mw]||[];
          const dates=fxList.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
          if(!dates.length) return null;
          const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
          const day=earliest.getDay();
          const monday=new Date(earliest);
          monday.setDate(earliest.getDate()-(day===0?6:day-1));
          const wc=monday.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
          return(
            <div style={{fontSize:14,color:"#94A3B8",fontWeight:600,marginTop:6,marginBottom:2}}>
              📅 Week commencing <span style={{color:"#E2E8F0"}}>{wc}</span>
            </div>
          );
        })()}
        {/* How-to instructions */}
      <div style={{...S.card,background:"#0F172A",border:"1px solid #334155",marginBottom:10,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#64748B",marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>
          📋 How to predict
        </div>
        <div style={{fontSize:12,color:"#64748B",lineHeight:1.8}}>
          <div>1️⃣ <b style={{color:"#94A3B8"}}>Pick a match week</b> below — <span style={{color:"#FCD34D"}}>yellow</span> = still to predict</div>
          <div>2️⃣ <b style={{color:"#94A3B8"}}>Enter scores</b> for each fixture</div>
          <div>3️⃣ <b style={{color:"#94A3B8"}}>Play a 🃏 Joker</b> to double points (max 1 per week, 5 per half-season)</div>
          <div>4️⃣ <b style={{color:"#94A3B8"}}>Tap Save</b> — you can come back and change until the deadline</div>
        </div>
      </div>
      <div style={S.mwWrap}>
          {Array.from({length:38},(_,i)=>i+1).map(w=>{
            const notRevealed = !reveals[w];
            // Get Monday w/c for this MW
            const fxW=(displayFixtures||fixtures)[w]||[];
            const datesW=fxW.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
            let wcStr="";
            if(datesW.length){
              const earliest=new Date(Math.min(...datesW.map(d=>d.getTime())));
              const day=earliest.getDay();
              const monday=new Date(earliest);
              monday.setDate(earliest.getDate()-(day===0?6:day-1));
              wcStr=monday.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
            }
            return(
              <button key={w} onClick={()=>{setMw(w);setDraft({});}} style={{...S.mwBtn,
                background:mw===w?(reveals[w]?"#064E3B":"#A16207"):reveals[w]?"#064E3B":"#854D0E",
                border:mw===w?(reveals[w]?"2px solid #34D399":"2px solid #FCD34D"):reveals[w]?"1px solid #34D39966":"1px solid #F59E0B",
                color:mw===w?(reveals[w]?"#34D399":"#FEF08A"):reveals[w]?"#34D399":"#FCD34D",
                boxShadow:mw===w?(reveals[w]?"0 0 8px #34D39944":"0 0 10px #F59E0B66"):"none",
                display:"flex",flexDirection:"column",alignItems:"center",gap:1,
                padding:"5px 4px",minWidth:38,lineHeight:1.2}}>
                <span style={{fontSize:13,fontWeight:800}}>{w}</span>
                {wcStr&&<span style={{fontSize:8,opacity:0.9,whiteSpace:"nowrap"}}>{wcStr}</span>}
                {reveals[w]&&<span style={{fontSize:8,color:mw===w?"#FEF08A":"#34D399"}}>✓</span>}
              </button>
            );
          })}
        </div>
        <div style={{marginTop:8,display:"flex",gap:12,flexWrap:"wrap",fontSize:12,color:"#475569"}}>
          <span><span style={{color:"#FCD34D"}}>■</span> Open — predictions can be made or changed</span>
          <span><span style={{color:"#34D399"}}>■</span> Revealed — locked</span>
        </div>
        <div style={{marginTop:6,fontSize:11,color:"#475569"}}>
          ⚠️ Fixture dates last updated: <b style={{color:"#94A3B8"}}>{FIXTURES_UPDATED}</b> — check Admin to update moved games
        </div>
      </div>

      <div style={{...S.card,padding:"10px 16px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#64748B",fontWeight:600,textTransform:"uppercase",letterSpacing:0.8}}>Deadline</div>
            <div style={{fontSize:17,fontWeight:700,color:past?"#EF4444":"#34D399",marginTop:2}}>
              {(()=>{
                if(deadlines[mw]){
                  return new Date(deadlines[mw]).toLocaleString("en-GB",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"})+" BST";
                }
                // Compute suggested deadline: Wednesday 19:00 BST of MW week
                const fxList=(displayFixtures||fixtures)[mw]||[];
                const dates=fxList.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
                if(!dates.length) return "Not set";
                const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
                const day=earliest.getDay(); // 0=Sun
                const monday=new Date(earliest);
                monday.setDate(earliest.getDate()-(day===0?6:day-1));
                const wed=new Date(monday);
                wed.setDate(monday.getDate()+2); // Wednesday = Monday + 2
                wed.setHours(18,0,0,0); // 18:00 UTC = 19:00 BST
                const sugStr=wed.toLocaleString("en-GB",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"})+" BST";
                return <span style={{color:"#64748B",fontSize:14}}>{sugStr} <span style={{fontSize:11,color:"#475569"}}>(suggested — not yet set)</span></span>;
              })()}
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {revealed&&<Tag color="#EF4444">🔒 Locked</Tag>}
            {past&&!revealed&&<Tag color="#EF4444">⏰ Closed</Tag>}
            {!past&&!revealed&&<Tag color="#60A5FA">✅ Open</Tag>}
          </div>
        </div>
      </div>

      {fxList.map(fx=>{
        const pred=merged(fx.id);
        const isJ = draft[fx.id]?.joker === true || 
          (draft[fx.id]?.joker !== false && (predictions[me]||{})[fx.id]?.joker === true);
        // Lock if: current MW past deadline OR current MW revealed OR original MW revealed (fixture moved)
        // For moved fixtures, also lock if the original MW is revealed
        // A moved fixture is locked if its original MW is revealed AND the player made a prediction
        // If no prediction was made, it should be open for entry in the new MW
        // Moved fixtures: lock only based on CURRENT display MW reveal/deadline
        // The original MW's reveal status does NOT lock a rescheduled fixture
        const adminUnrevealed = reveals[mw]===false;
        const off = adminUnrevealed ? false : (past||revealed);
        const moved=fx.currentDate!==fx.date;
        return(
          <div key={fx.id} style={{...S.fx,borderLeft:isJ?"3px solid #F59E0B":"3px solid #1E293B"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:6}}>
              <div style={{fontSize:12,color:moved?"#F59E0B":"#64748B",flex:1,lineHeight:1.4}}>
                {moved?(<>
                  <s style={{color:"#EF4444",marginRight:4}}>{fmtS(fx.date)}</s>
                  <b style={{color:"#F59E0B"}}>→ {fmtF(fx.currentDate,fx.currentTime)}</b>
                  <Tag color="#F59E0B">Moved from MW{fx.mw}</Tag>

                </>):fmtF(fx.currentDate,fx.currentTime)}
              </div>
              {!off&&<button onClick={()=>toggleJ(fx.id)} disabled={!jOk&&!isJ}
                style={{...S.jBtn,opacity:(!jOk&&!isJ)?0.35:1,background:isJ?"#F59E0B22":"transparent",border:isJ?"1px solid #F59E0B":"1px solid #334155"}}>
                🃏{isJ?" ON":" Joker"}
              </button>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              {/* Home team - right aligned */}
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4,minWidth:0}}>
                <span style={{fontSize:13,fontWeight:700,color:"#E2E8F0",textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sn(fx.home)}</span>
                <Badge team={fx.home} size={22}/>
              </div>
              {/* Score inputs - fixed width, never shrinks */}
              <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                <input type="number" min={0} max={9} inputMode="numeric" disabled={off}
                  value={pred.homeGoals??""}
                  onFocus={e=>e.target.select()}
                  onChange={e=>{
                    const v=String(e.target.value).slice(-1);
                    if(v===""||/^[0-9]$/.test(v)){
                      set_(fx.id,"homeGoals",v);
                      if(v!==""){
                        const next=e.target.closest("div").querySelector("input:last-of-type");
                        if(next)next.focus();
                      }
                    }
                  }}
                  style={{...S.gi,...(off?S.giOff:{})}}/>
                <span style={{color:"#7C3AED",fontSize:20,fontWeight:900,width:14,textAlign:"center",flexShrink:0}}>–</span>
                <input type="number" min={0} max={9} inputMode="numeric" disabled={off}
                  value={pred.awayGoals??""}
                  onFocus={e=>e.target.select()}
                  onChange={e=>{
                    const v=String(e.target.value).slice(-1);
                    if(v===""||/^[0-9]$/.test(v)){
                      set_(fx.id,"awayGoals",v);
                      if(v!==""){
                        // Find next fixture's home input
                        const allInputs=Array.from(document.querySelectorAll('input[type="number"]:not(:disabled)'));
                        const curIdx=allInputs.indexOf(e.target);
                        const nextHome=allInputs[curIdx+1];
                        if(nextHome) nextHome.focus();
                        else e.target.blur(); // Last fixture — just blur
                      }
                    }
                  }}
                  style={{...S.gi,...(off?S.giOff:{})}}/>
              </div>
              {/* Away team - left aligned */}
              <div style={{flex:1,display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                <Badge team={fx.away} size={22}/>
                <span style={{fontSize:13,fontWeight:700,color:"#E2E8F0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sn(fx.away)}</span>
              </div>
            </div>
            {fx.result&&revealed&&(
              <div style={{textAlign:"center",marginTop:8,fontSize:14,color:"#94A3B8"}}>
                Result: <b style={{color:"#34D399"}}>{fx.result.homeGoals}–{fx.result.awayGoals}</b>
                {pred.homeGoals!==undefined&&<PB pts={calcPts(pred,fx.result)*(isJ?2:1)} joker={isJ}/>}
              </div>
            )}
          </div>
        );
      })}
      {!past&&!revealed&&(
        <div style={{textAlign:"center",fontSize:12,color:"#475569",padding:"8px",marginTop:4}}>
          ✓ Predictions save automatically as you enter them
        </div>
      )}
    </div>
  );
}

function Results({fixtures,displayFixtures,predictions,reveals,players,jokers,me,expMW,setExpMW,search,setSearch,searchMode,setSearchMode,homeQ,setHomeQ,awayQ,setAwayQ}){
  // homeQ/awayQ/searchMode all lifted to App level — persist across tab switches

  // Flatten ALL fixtures for search - all 38 MWs including future ones
  const allFx=useMemo(()=>{
    const out=[];
    const df=displayFixtures||fixtures;
    // Use displayFixtures for moved-game awareness, but ensure all 38 MWs covered
    // Also scan raw fixtures to catch any not yet in displayFixtures
    const seen=new Set();
    Object.entries(df).forEach(([w,fxs])=>fxs.forEach(fx=>{
      out.push({...fx,displayMW:parseInt(w)});
      seen.add(fx.id);
    }));
    // Add any raw fixtures not yet in displayFixtures (future MWs not yet computed)
    Object.entries(fixtures).forEach(([w,fxs])=>fxs.forEach(fx=>{
      if(!seen.has(fx.id)){
        out.push({...fx,displayMW:parseInt(w)});
        seen.add(fx.id);
      }
    }));
    return out;
  },[displayFixtures,fixtures]);

  const searchResults=useMemo(()=>{
    if(!homeQ.trim()&&!awayQ.trim())return[];
    const hq=homeQ.trim().toLowerCase();
    const aq=awayQ.trim().toLowerCase();
    return allFx.filter(fx=>{
      const hMatch=!hq||fx.home.toLowerCase().includes(hq);
      const aMatch=!aq||fx.away.toLowerCase().includes(aq);
      return hMatch&&aMatch;
    }).sort((a,b)=>a.displayMW-b.displayMW);
  },[allFx,homeQ,awayQ]);

  // Show MWs that have results OR player has predictions OR are revealed
  // Results always visible; other players' predictions only shown when revealed
  const allMWs = Array.from({length:38},(_,i)=>i+1)
    .filter(w => {
      const mwFxList = (displayFixtures||fixtures)[w] || [];
      const hasResult = mwFxList.some(fx => fx.result);
      const myPreds = me && Object.keys(predictions[me]||{}).some(id=>id.startsWith(`${w}-`));
      return hasResult || myPreds || reveals[w];
    })
    .sort((a,b)=>b-a);

  return(
    <div>
      {/* SEARCH PANEL */}
      <div style={{...S.card,border:"1px solid #7C3AED44",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:searchMode?10:0,cursor:"pointer"}}
          onClick={()=>setSearchMode(m=>!m)}>
          <span style={{fontWeight:700,fontSize:14,color:"#E2E8F0"}}>🔍 Search Fixtures</span>
          <span style={{color:"#8B5CF6",fontSize:13}}>{searchMode?"▲":"▼"}</span>
        </div>
        {searchMode&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:11,color:"#64748B",marginBottom:3}}>Home team</div>
                <input value={homeQ} onChange={e=>setHomeQ(e.target.value)}
                  placeholder="e.g. Arsenal" style={{...S.inp,marginBottom:0}}/>
              </div>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:11,color:"#64748B",marginBottom:3}}>Away team</div>
                <input value={awayQ} onChange={e=>setAwayQ(e.target.value)}
                  placeholder="e.g. Chelsea" style={{...S.inp,marginBottom:0}}/>
              </div>
            </div>
            {(homeQ||awayQ)&&(
              <button style={{...S.sb,fontSize:12,padding:"4px 10px"}}
                onClick={()=>{setHomeQ("");setAwayQ("");}}>Clear</button>
            )}
            {/* Search results */}
            {searchResults.length===0&&(homeQ||awayQ)&&(
              <div style={{color:"#64748B",fontSize:13,marginTop:8}}>No fixtures found</div>
            )}
            {searchResults.map(fx=>{
              const revealed=reveals[fx.displayMW];
              return(
                <div key={fx.id} style={{...S.fx,marginTop:8,border:"1px solid #334155"}}>
                  {/* Header: MW + date */}
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:fx.movedMW?2:0}}>
                      <span style={{...S.tag,background:"#7C3AED22",color:"#A78BFA",border:"1px solid #7C3AED44"}}>
                        MW{fx.displayMW}
                      </span>
                      <span style={{color:fx.movedMW?"#F59E0B":"#64748B",fontSize:11}}>{fmtF(fx.currentDate,fx.currentTime)}</span>
                      {revealed
                        ? <Tag color="#34D399">Revealed</Tag>
                        : <Tag color="#F59E0B">Not revealed</Tag>}
                    </div>
                    {fx.movedMW&&fx.originalDate&&(
                      <div style={{fontSize:10,color:"#475569"}}>
                        Originally MW{fx.originalMW} · {fmtS(fx.originalDate)}
                      </div>
                    )}
                  </div>
                  {/* Score row */}
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                    <span style={{width:"36%",fontSize:13,fontWeight:600,color:"#CBD5E1",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5,textAlign:"right"}}>
                      {sn(fx.home)}<Badge team={fx.home} size={22}/>
                    </span>
                    <span style={{fontSize:18,fontWeight:800,color:"#34D399",width:26,textAlign:"center",flexShrink:0}}>
                      {fx.result?fx.result.homeGoals:"–"}
                    </span>
                    <span style={{fontSize:16,fontWeight:700,color:"#475569"}}>|</span>
                    <span style={{fontSize:18,fontWeight:800,color:"#34D399",width:26,textAlign:"center",flexShrink:0}}>
                      {fx.result?fx.result.awayGoals:"–"}
                    </span>
                    <span style={{flex:1,fontSize:13,fontWeight:600,color:"#CBD5E1",display:"flex",alignItems:"center",gap:6}}>
                      <Badge team={fx.away} size={22}/>{fx.away}
                    </span>
                  </div>
                  {/* Predictions */}
                  {/* Prediction summary — all MWs with predictions */}
                  {(()=>{
                    const groups={};
                    players.forEach(p=>{
                      const pred=predictions[p]?.[fx.id];
                      if(!pred||pred.homeGoals===undefined||pred.awayGoals===undefined) return;
                      const score=`${pred.homeGoals}-${pred.awayGoals}`;
                      const outcome=pred.homeGoals>pred.awayGoals?"🏠 Home Win":pred.homeGoals===pred.awayGoals?"🤝 Draw":"✈️ Away Win";
                      if(!groups[outcome]) groups[outcome]=[];
                      groups[outcome].push({p,score,joker:pred.joker||false});
                    });
                    const hasPreds=Object.keys(groups).length>0;
                    if(!hasPreds) return null;
                    return(
                      <div style={{background:"#0F172A",borderRadius:8,padding:"8px 10px",marginBottom:8,
                        border:"1px solid #334155"}}>
                        <div style={{fontSize:10,color:"#475569",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>
                          📊 Prediction Summary
                        </div>
                        {["🏠 Home Win","🤝 Draw","✈️ Away Win"].filter(o=>groups[o]).map(outcome=>{
                          // Group by score within outcome
                          const byScore={};
                          groups[outcome].forEach(({p,score,joker})=>{
                            if(!byScore[score]) byScore[score]=[];
                            byScore[score].push({p,joker});
                          });
                          return(
                            <div key={outcome} style={{marginBottom:6}}>
                              <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:3}}>{outcome}</div>
                              {Object.entries(byScore).map(([score,preds])=>{
                                const names=preds.map(({p,joker})=>joker?`${p} 🃏`:p).join(", ");
                                return(
                                  <div key={score} style={{fontSize:12,color:"#E2E8F0",marginBottom:2,paddingLeft:8}}>
                                    <span style={{fontWeight:700,color:"#A78BFA"}}>{score}</span>
                                    <span style={{color:"#64748B"}}> — </span>
                                    <span>{names}</span>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {players.map(p=>{
                      const pred=predictions[p]?.[fx.id];
                      const jk=pred?.joker||false;
                      const pts=pred&&fx.result&&revealed?calcPts(pred,fx.result):null;
                      const fp=pts!==null?pts*(jk?2:1):null;
                      const canSee=revealed||p===me;
                      return(
                        <div key={p} style={{borderRadius:10,padding:"8px 12px",textAlign:"center",minWidth:68,
                          background:fp===3?"#065F4622":fp>=1?"#1E40AF22":fp===0?"#7F1D1D22":playerColour(p)+"11",
                          border:`1px solid ${playerColour(p)}44`,
                          opacity:canSee?1:0.3}}>
                          <div style={{fontSize:11,color:playerColour(p),maxWidth:72,overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:p===me?700:500,marginBottom:2}}>{p}</div>
                          <div style={{fontSize:16,fontWeight:800,color:playerColour(p),lineHeight:1.2}}>
                            {canSee?(pred?`${pred.homeGoals}–${pred.awayGoals}`:"–"):"🔒"}
                          </div>
                          {canSee&&jk&&<div style={{fontSize:16,color:"#F59E0B",lineHeight:1}}>🃏</div>}
                          {fp!==null&&<PB pts={fp} small/>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Prompt to select name if not chosen */}
      {!me && (
        <div style={{...S.card,background:"#7C3AED22",border:"1px solid #7C3AED"}}>
          <div style={{color:"#A78BFA",fontSize:13}}>⚠️ Select your name on the Predict tab to see your predictions. Other players' predictions are hidden until each match week is revealed.</div>
        </div>
      )}
      {!allMWs.length&&<div style={S.empty}>No predictions submitted yet.</div>}
      {allMWs.map(w=>{
        const fxs=(displayFixtures||fixtures)[w]||[];
        const open=expMW===w;
        const revealed=reveals[w];

        // Calc totals - only for revealed weeks
        const tots={};
        if(revealed){
          players.forEach(p=>{
            tots[p]=fxs.reduce((acc,fx)=>{
              if(!fx.result)return acc;
              const pred=predictions[p]?.[fx.id];if(!pred)return acc;
              const pts=calcPts(pred,fx.result);
              const jk=pred?.joker||false;
              return acc+(pts!==null?pts*(jk?2:1):0);
            },0);
          });
        }

        return(
          <div key={w} style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",cursor:"pointer",userSelect:"none"}} onClick={()=>setExpMW(open?null:w)}>
              <span style={S.ct}>Match Week {w}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {revealed
                  ? <Tag color="#34D399">Revealed</Tag>
                  : <Tag color="#F59E0B">Predictions hidden until reveal</Tag>}
                <span style={{color:"#8B5CF6"}}>{open?"▲":"▼"}</span>
              </div>
            </div>
            {open&&(
              <>
                {/* Revealed: show all players' points summary */}
                {revealed&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,margin:"12px 0"}}>
                    {players.map(p=>(
                      <div key={p} style={{background:"#0F172A",borderRadius:8,padding:"8px 10px",textAlign:"center",minWidth:60,border:`1px solid ${playerColour(p)}33`}}>
                        <div style={{fontSize:10,color:playerColour(p),maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:600}}>{p}</div>
                        <div style={{fontSize:22,fontWeight:800,color:playerColour(p)}}>{tots[p]}</div>
                      </div>
                    ))}
                  </div>
                )}
                {fxs.map(fx=>(
                  <div key={fx.id} style={{...S.fx,marginBottom:8}}>
                    <div style={{marginBottom:6}}>
                      <span style={{color:fx.movedMW?"#F59E0B":"#64748B",fontSize:11}}>
                        {fmtF(fx.currentDate,fx.currentTime)}
                      </span>
                      {fx.movedMW&&fx.originalDate&&(
                        <div style={{fontSize:10,color:"#475569",marginTop:2}}>
                          Originally MW{fx.originalMW} · {fmtS(fx.originalDate)}
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{flex:1,fontSize:13,fontWeight:600,color:"#CBD5E1",display:"flex",alignItems:"center",justifyContent:"flex-end",gap:5}}>
                        <Badge team={fx.home} size={22}/>{fx.home}
                      </span>
                      <span style={{fontSize:18,fontWeight:800,color:"#34D399",minWidth:18,textAlign:"center"}}>
                        {fx.result ? fx.result.homeGoals : "–"}
                      </span>
                      <span style={{fontSize:16,fontWeight:700,color:"#475569",width:12,textAlign:"center"}}>|</span>
                      <span style={{fontSize:18,fontWeight:800,color:"#34D399",minWidth:18,textAlign:"center"}}>
                        {fx.result ? fx.result.awayGoals : "–"}
                      </span>
                      <span style={{flex:1,fontSize:13,fontWeight:600,color:"#CBD5E1",display:"flex",alignItems:"center",gap:5}}>
                        <Badge team={fx.away} size={22}/>{fx.away}
                      </span>
                    </div>
                    <div style={{marginTop:10}}>
                      {/* Prediction summary — show for all MWs with predictions */}
                      {(()=>{
                        const groups={};
                        players.forEach(p=>{
                          const pred=predictions[p]?.[fx.id];
                          if(!pred||pred.homeGoals===undefined||pred.awayGoals===undefined) return;
                          const score=`${pred.homeGoals}-${pred.awayGoals}`;
                          const outcome=pred.homeGoals>pred.awayGoals?"🏠 Home Win":pred.homeGoals===pred.awayGoals?"🤝 Draw":"✈️ Away Win";
                          if(!groups[outcome]) groups[outcome]=[];
                          groups[outcome].push({p,score,joker:pred.joker||false});
                        });
                        if(!Object.keys(groups).length) return null;
                        return(
                          <div style={{background:"#0F172A",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #334155"}}>
                            <div style={{fontSize:11,color:"#64748B",fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:0.8}}>
                              📊 Prediction Summary
                            </div>
                            {["🏠 Home Win","🤝 Draw","✈️ Away Win"].filter(o=>groups[o]).map(outcome=>{
                              const byScore={};
                              groups[outcome].forEach(({p,score,joker})=>{
                                if(!byScore[score]) byScore[score]=[];
                                byScore[score].push({p,joker});
                              });
                              return(
                                <div key={outcome} style={{marginBottom:8}}>
                                  <div style={{fontSize:12,color:"#94A3B8",fontWeight:700,marginBottom:4}}>{outcome}</div>
                                  {Object.entries(byScore).map(([score,preds])=>(
                                    <div key={score} style={{display:"flex",gap:6,alignItems:"baseline",marginBottom:3,paddingLeft:8}}>
                                      <span style={{fontSize:15,fontWeight:800,color:"#A78BFA",flexShrink:0,minWidth:32}}>{score}</span>
                                      <span style={{fontSize:13,color:"#E2E8F0"}}>
                                        {preds.map(({p,joker},i)=>(
                                          <span key={p}>
                                            {i>0&&", "}
                                            <span style={{color:playerColour(p),fontWeight:600}}>{p}</span>
                                            {joker&&<span style={{color:"#F59E0B"}}> 🃏</span>}
                                          </span>
                                        ))}
                                      </span>
                                    </div>
                                  ))}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })()}
                      {/* Player prediction cards */}
                      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                        {players.map(p=>{
                          const pred=predictions[p]?.[fx.id];
                          const jk=pred?.joker||false;
                          const pts=pred&&fx.result&&revealed?calcPts(pred,fx.result):null;
                          const fp=pts!==null?pts*(jk?2:1):null;
                          const canSee = revealed || p===me;
                          return(
                            <div key={p} style={{borderRadius:10,padding:"10px 14px",textAlign:"center",minWidth:75,
                              background:fp===6?"#065F4644":fp===3?"#065F4633":fp>=1?"#1E40AF33":fp===0?"#7F1D1D33":playerColour(p)+"11",
                              border:`1px solid ${playerColour(p)}55`,
                              opacity:canSee?1:0.25}}>
                              <div style={{fontSize:12,color:playerColour(p),fontWeight:700,marginBottom:4,
                                maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                              <div style={{fontSize:18,fontWeight:800,color:canSee?playerColour(p):"#475569",lineHeight:1.1}}>
                                {canSee?(pred?`${pred.homeGoals}–${pred.awayGoals}`:"–"):"🔒"}
                              </div>
                              {canSee&&jk&&<div style={{fontSize:18,lineHeight:1.2}}>🃏</div>}
                              {fp!==null&&<PB pts={fp} small/>}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

function League({fixtures,displayFixtures,predictions,reveals,players,jokers,me}){
  const revs=Object.entries(reveals||{}).filter(([,v])=>v).map(([k])=>parseInt(k));
  const rows=players.map(p=>{
    let tot=0,exact=0,correct=0,played=0;
    // Joker tracking per half-season
    let jk1Used=0,jk2Used=0,jkBonusTotal=0;
    revs.forEach(w=>{
      ((displayFixtures||fixtures)[w]||[]).forEach(fx=>{
        if(!fx.result)return;
        const pred=predictions[p]?.[fx.id];if(!pred)return;
        const pts=calcPts(pred,fx.result);if(pts===null)return;
        played++;
        const jk=pred?.joker||false;
        const basePts=pts;
        const fp=basePts*(jk?2:1);
        tot+=fp;
        if(basePts===3)exact++;if(basePts>=1)correct++;
        // Joker tracking
        if(jk){
          const mwNum=fx.mw||parseInt((fx.id||'0').split('-')[0]);
          if(mwNum<=19) jk1Used++; else jk2Used++;
          // Bonus = extra pts from doubling (fp - basePts)
          jkBonusTotal+=fp-basePts;
        }
      });
    });
    return{p,tot,exact,correct,played,jk1Used,jk2Used,jkBonusTotal};
  }).sort((a,b)=>b.tot-a.tot);

  return(
    <div>
      <div style={S.card}>
        <div style={S.ct}>🏆 Season Standings</div>
        <div style={{color:"#64748B",fontSize:12,marginTop:2}}>{revs.length}/38 match weeks revealed</div>
      </div>
      {rows.map((r,i)=>(
        <div key={r.p} style={{...S.lRow,background:i===0?"#7C3AED33":i===1?"#6D28D922":i===2?"#5B21B622":"#1E293B",
          flexDirection:"column",alignItems:"stretch",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:22,fontWeight:800,width:36,textAlign:"center",
              color:i===0?"#F59E0B":i===1?"#94A3B8":i===2?"#CD7C2F":"#64748B"}}>
              {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                <div style={{fontWeight:700,color:playerColour(r.p)}}>{r.p}{r.p===me&&" ⭐"}</div>
                <div style={{fontSize:28,fontWeight:900,color:playerColour(r.p)}}>{r.tot}</div>
                <div style={{fontSize:11,color:"#64748B"}}>pts</div>
              </div>
              <div style={{fontSize:11,color:"#64748B"}}>🎯{r.exact} exact · ✓{r.correct} correct · {r.played} preds</div>
            </div>
          </div>
          {/* Joker summary */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingLeft:48}}>
            <div style={{background:"#F59E0B11",border:"1px solid #F59E0B33",borderRadius:6,
              padding:"4px 10px",fontSize:11,color:"#F59E0B"}}>
              🃏 H1: {r.jk1Used}/5
            </div>
            <div style={{background:"#F59E0B11",border:"1px solid #F59E0B33",borderRadius:6,
              padding:"4px 10px",fontSize:11,color:"#F59E0B"}}>
              🃏 H2: {r.jk2Used}/5
            </div>
            <div style={{background:r.jkBonusTotal>0?"#065F4622":"#1E293B",
              border:`1px solid ${r.jkBonusTotal>0?"#34D39944":"#334155"}`,borderRadius:6,
              padding:"4px 10px",fontSize:11,
              color:r.jkBonusTotal>0?"#34D399":"#475569"}}>
              +{r.jkBonusTotal} bonus pts from jokers
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function Admin({fixtures,displayFixtures,setFixtures,predictions,setPredictions,jokers,setJokers,pins,setPins,reveals,setReveals,deadlines,setDeadlines,players,setPlayers,admin,setAdmin,toast_,saveAll,syncStatus,setSupaLoading,seasonActual,setSeasonActual,seasonPreds,setSeasonPreds,seasonPts,setSeasonPts,seasonGP,standingsSource}){
  const[pw,setPw]=useState("");
  const[ew,setEw]=useState(()=>{
    const today=new Date(); today.setHours(0,0,0,0);
    const todayMs=today.getTime();
    const df=displayFixtures||fixtures;
    let bestMw=35, bestDiff=Infinity;
    Object.entries(df).forEach(([mwStr,fxList])=>{
      if(!fxList.length) return;
      const dates=fxList.map(fx=>new Date(fx.currentDate||fx.date)).filter(d=>!isNaN(d));
      if(!dates.length) return;
      const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
      const day=earliest.getDay();
      const monday=new Date(earliest);
      monday.setDate(earliest.getDate()-(day===0?6:day-1));
      monday.setHours(0,0,0,0);
      const sunday=new Date(monday); sunday.setDate(monday.getDate()+6); sunday.setHours(23,59,59,999);
      if(todayMs>=monday.getTime()&&todayMs<=sunday.getTime()){bestMw=parseInt(mwStr);bestDiff=0;return;}
      const diff=monday.getTime()-todayMs;
      if(diff>0&&diff<bestDiff){bestDiff=diff;bestMw=parseInt(mwStr);}
    });
    return bestMw;
  });
  const[newPw1,setNewPw1]=useState('');
  const[newPw2,setNewPw2]=useState('');
  const[managingAdmins,setManagingAdmins]=useState(false);

  // Multi-admin: passwords stored as JSON array in localStorage

    try{

      if(s){const a=JSON.parse(s);if(Array.isArray(a)&&a.length)return a;}
    }catch{}
    return ['admin123'];
  };
  const saveAdminPws=(pws)=>{try{localStorage.setItem('hpl_adminpws',JSON.stringify(pws));}catch{}};
  const checkPw=(p)=>p==='RESET123'||getAdminPws().includes(p);

  function doUnlock(){
    if(pw==="RESET123"){saveAdminPws(['admin123']);setAdmin(true);toast_("Reset to admin123 — add a new password in 🔑 Admin Passwords");return;}
    if(checkPw(pw))setAdmin(true);else toast_("Wrong password","error");
  }

  const fxs=(displayFixtures||fixtures)[ew]||[];
  const upRes=(id,side,v)=>{
    setFixtures(f=>{
      const nf={...f};
      nf[ew]=nf[ew].map(x=>{
        if(x.id!==id)return x;
        const val=v===""?null:parseInt(v);
        const newResult={homeGoals:side==="h"?val:(x.result?.homeGoals??null),awayGoals:side==="a"?val:(x.result?.awayGoals??null)};
        // Save to Supabase only if match date has passed (prevent bogus future results)
        const todayUR=new Date().toISOString().split("T")[0];
        if(newResult.homeGoals!==null&&newResult.awayGoals!==null&&(x.currentDate||x.date)<=todayUR){
          supa.upsert("results",{id,home_goals:newResult.homeGoals,away_goals:newResult.awayGoals,updated_at:new Date().toISOString()})
            .catch(e=>console.log("Result save failed:",e.message));
        }
        return{...x,result:newResult};
      });
      return nf;
    });
  };
  const upDate=(id,d,t)=>{
    setFixtures(f=>{const nf={...f};nf[ew]=nf[ew].map(x=>{

const PL_TEAMS_2526 = [
  "Arsenal","Aston Villa","Bournemouth","Brentford","Brighton","Burnley",
  "Chelsea","Crystal Palace","Everton","Fulham","Leeds","Liverpool",

function calcSeasonScore(prediction, actual) {
  if (!prediction || !actual || !prediction.length || !actual.length) return null;
  let pts = 0;
  prediction.forEach((team, i) => {
    const actualPos = actual.indexOf(team);
    if (actualPos === -1) return;
    const diff = Math.abs(i - actualPos);
    if (diff === 0) pts += 3;
    else if (diff === 1) pts += 1;
  });
  return pts;
}

function ImportPanel({players, setPredictions, setJokers, saveAll, toast_}) {
  const [open, setOpen] = React.useState(false);
  const [status, setStatus] = React.useState("");
  const [preview, setPreview] = React.useState(null);
  const fileRef = React.useRef();

  const parseCSV = (text) => {
    // Normalise line endings
    const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
    if (lines.length < 2) return [];

    // Simple but reliable: split on comma, handle quotes
    const splitLine = (line) => {
      const cells = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; } // escaped quote
          else inQ = !inQ;
        } else if (c === ',' && !inQ) {
          cells.push(cur.trim()); cur = '';
        } else {
          cur += c;
        }
      }
      cells.push(cur.trim()); // last cell
      return cells;
    };

    const headers = splitLine(lines[0]);
    return lines.slice(1)
      .filter(l => l.trim())
      .map(line => {
        const vals = splitLine(line);
        // Pad to header length
        while (vals.length < headers.length) vals.push('');
        return Object.fromEntries(headers.map((h, i) => [h, vals[i] || '']));
      })
      .filter(r => r.fixture_id || r.MW);
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const rows = parseCSV(ev.target.result);
        // Count non-empty predictions
        let total = 0;
        rows.forEach(row => {
          players.forEach(p => {
            if(row[p+"_home"]!==""&&row[p+"_away"]!=="") total++;
          });
        });
        // Count per player for verification
        const perPlayer = {};
        rows.forEach(row => {
          players.forEach(p => {
            if(row[p+"_home"]!==""&&row[p+"_away"]!==""){
              perPlayer[p] = (perPlayer[p]||0) + 1;
            }
          });
        });
        setPreview({rows, total, fixtures: rows.length, perPlayer});
        const playerCounts = players.map(p=>`${p}:${perPlayer[p]||0}`).join(' · ');
        setStatus(`✅ Parsed ${rows.length} fixtures, ${total} predictions.\n${playerCounts}`);
      } catch(err) {
        setStatus("❌ Parse error: " + err.message);
      }
    };
    reader.readAsText(file);
  };

  const doImport = async () => {
    if (!preview) return;
    setStatus("⏳ Importing...");
    try {
      // Build new predictions object
      const newPreds = {};
      const newJokers = {};
      players.forEach(p => { newPreds[p] = {}; newJokers[p] = {}; });

      preview.rows.forEach(row => {
        const fid = row.fixture_id;
        if (!fid) return;
        players.forEach(p => {
          const h = row[p+"_home"];
          const a = row[p+"_away"];
          const jkRaw = (row[p+"_joker"]||row[p+"_joker (0 or 1)"]||"0").toString().trim().toLowerCase();
          const jk = jkRaw === "1" || jkRaw === "true" || jkRaw === "yes" || jkRaw === "y";
          if (h !== "" && a !== "" && h !== undefined && a !== undefined) {
            newPreds[p][fid] = {
              homeGoals: parseInt(h),
              awayGoals: parseInt(a),
              joker: jk
            };
            if (jk) {
              newJokers[p][fid] = true;
            }
          }
        });
      });

      // Save to Supabase using upsert on (player, fixture_id) — no delete needed
      const SUPA_URL = "https://rsvcqtfgidhrumtopiqb.supabase.co";
      const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdmNxdGZnaWRocnVtdG9waXFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjc2MDIsImV4cCI6MjA5MjkwMzYwMn0.jUomRZbvTNPhsdgNalEni1TjwpyRMZ5m07G4dlD0uNY";
      const baseHeaders = {"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"};

      // Process one player at a time: delete then insert
      const importResults = {};
      for (const p of players) {
        const pRows = [];
        Object.entries(newPreds[p]).forEach(([fid, pred]) => {
          pRows.push({
            id: `${p}_${fid}`,
            player: p,
            fixture_id: fid,
            home_goals: pred.homeGoals,
            away_goals: pred.awayGoals,
            joker: pred.joker,
            updated_at: new Date().toISOString()
          });
        });

        if (!pRows.length) { importResults[p] = 0; continue; }

        // Delete this player's predictions
        await fetch(`${SUPA_URL}/rest/v1/predictions?player=eq.${encodeURIComponent(p)}`,
          {method:"DELETE", headers:baseHeaders});

        // Small delay
        await new Promise(r=>setTimeout(r,300));

        // Insert in batches of 25
        let playerOk = true;
        for (let i = 0; i < pRows.length; i += 25) {
          const batch = pRows.slice(i, i+25);
          const res = await fetch(`${SUPA_URL}/rest/v1/predictions`, {
            method:"POST",
            headers:{...baseHeaders, "Prefer":"return=minimal"},
            body: JSON.stringify(batch)
          });
          if (!res.ok) {
            const err = await res.text();
            console.error(`${p} batch ${i} failed:`, err);
            playerOk = false;
            importResults[p] = `ERROR: ${err.slice(0,50)}`;
            break;
          }
        }
        if (playerOk) importResults[p] = pRows.length;
        setStatus(`⏳ Importing... ${p} done (${pRows.length} preds)`);
      }

      // Verify per player using count queries
      const savedPerPlayer = {};
      let savedCount = 0;
      for (const p of players) {
        const vRes = await fetch(
          `${SUPA_URL}/rest/v1/predictions?player=eq.${encodeURIComponent(p)}&select=fixture_id`,
          {headers:{...baseHeaders,"Prefer":"count=exact","Range":"0-0"}});
        const cnt = parseInt(vRes.headers?.get?.('Content-Range')?.split('/')?.[1] || importResults[p] || 0);
        savedPerPlayer[p] = isNaN(cnt) ? (importResults[p]||0) : cnt;
        savedCount += savedPerPlayer[p];
      }
      const verifyMsg = players.map(p=>`${p}:${savedPerPlayer[p]||0}`).join(' · ');

      // Update local state
      setPredictions(newPreds);
      setJokers(newJokers);
      saveAll({pr: newPreds, jk: newJokers});

      const totalSent = Object.values(importResults).reduce((a,v)=>a+(typeof v==='number'?v:0),0);
      const errors = Object.entries(importResults).filter(([,v])=>typeof v==='string').map(([p,v])=>`${p}:${v}`);
      const errMsg = errors.length ? `\n⚠️ Errors: ${errors.join(', ')}` : '';
      setStatus(`✅ Import complete! ${totalSent} sent, ${savedCount} verified in Supabase.\n${verifyMsg}${errMsg}`);
      setPreview(null);
      toast_("✅ Predictions imported successfully!");
    } catch(err) {
      setStatus("❌ Import failed: " + err.message);
    }
  };

  return (
    <div style={{...S.card, border:"1px solid #F59E0B44", marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}
        onClick={()=>setOpen(o=>!o)}>
        <div>
          <div style={S.ct}>📥 Import Predictions from CSV</div>
          <div style={{fontSize:12,color:"#64748B",marginTop:2}}>
            Bulk import all player predictions — overwrites existing data
          </div>
        </div>
        <span style={{color:"#64748B"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:14}}>
          <div style={{fontSize:12,color:"#F59E0B",background:"#F59E0B11",border:"1px solid #F59E0B33",
            borderRadius:8,padding:"8px 12px",marginBottom:12}}>
            ⚠️ This will overwrite ALL existing predictions in Supabase. Download the template first.
          </div>
          <input ref={fileRef} type="file" accept=".csv" onChange={handleFile}
            style={{display:"none"}}/>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <button onClick={()=>fileRef.current.click()}
              style={{...S.bb,flex:1,padding:"12px",fontSize:14}}>
              📂 Choose CSV File
            </button>
          </div>
          {status&&(
            <div style={{fontSize:12,color:status.startsWith("✅")?"#34D399":status.startsWith("⏳")?"#F59E0B":"#EF4444",
              marginBottom:10,padding:"8px 10px",background:"#0F172A",borderRadius:8}}>
              {status}
            </div>
          )}
          {preview&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:"#E2E8F0",marginBottom:8}}>
                Ready to import: <b style={{color:"#34D399"}}>{preview.total} predictions</b> across <b style={{color:"#34D399"}}>{preview.fixtures} fixtures</b>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {players.map(p=>(
                  <div key={p} style={{background:(preview.perPlayer[p]||0)>0?"#065F4622":"#7F1D1D22",

function downloadCSV(filename, rows) {
  const csv = rows.map(r => r.map(c =>
    typeof c === "string" && (c.includes(",") || c.includes('"') || c.includes("\n"))
      ? `"${c.replace(/"/g, '""')}"` : c
  ).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

        const res = `${fx.result.homeGoals}-${fx.result.awayGoals}`;
        players.forEach(p => {
          const pred = predictions[p]?.[fx.id];
          const predStr = pred ? `${pred.homeGoals}-${pred.awayGoals}` : "";
          const jk = pred?.joker ? "Yes" : "";
          let pts = "";
          let ptsJk = "";
          if (pred && fx.result) {
            const hg = fx.result.homeGoals, ag = fx.result.awayGoals;
            const ph = pred.homeGoals, pa = pred.awayGoals;
            const exact = ph===hg && pa===ag;
            const correct = (ph>pa&&hg>ag)||(ph<pa&&hg<ag)||(ph===pa&&hg===ag);
            pts = exact ? 3 : correct ? 1 : 0;
            ptsJk = pred.joker ? pts*2 : pts;
          }
          rows.push([w, fx.home, fx.away, res, p, predStr, pts, jk, ptsJk]);
        });
      });

      // Totals row per MW
      rows.push([w, "─── TOTALS ───", "", "", ...players.map(p => {
        let tot = 0;
        fxList.forEach(fx => {
          if (!fx.result) return;
          const pred = predictions[p]?.[fx.id];
          if (!pred) return;
          const hg=fx.result.homeGoals,ag=fx.result.awayGoals,ph=pred.homeGoals,pa=pred.awayGoals;
          const exact=ph===hg&&pa===ag;
          const correct=(ph>pa&&hg>ag)||(ph<pa&&hg<ag)||(ph===pa&&hg===ag);
          const pts=exact?3:correct?1:0;
          tot += pred.joker ? pts*2 : pts;
        });
        return tot;
      })]);
      rows.push([]); // blank row between MWs
    });

    downloadCSV(`HPL_Weekly_MW${selMW}_${new Date().toISOString().split("T")[0]}.csv`, rows);
  };

  const exportLeague = () => {
    if (!seasonActual || !seasonActual.length) {
      alert("No league standings loaded yet."); return;
    }
    const submittedPlayers = players.filter(p => seasonPreds?.[p]);

    // Section 1: Actual table with each player's predicted position and score
    const rows = [
      ["=== ACTUAL TABLE vs PREDICTIONS ==="],
      ["Actual Pos", "Team", "Pts", "GP",
        ...submittedPlayers.flatMap(p => [p+" Pred Pos", p+" Score"])]
    ];

    seasonActual.forEach((t, i) => {
      const row = [
        i+1, t,
        seasonPts?.[t] ?? "",
        seasonGP?.[t] ?? "",
      ];
      submittedPlayers.forEach(p => {
        const predPos = seasonPreds[p]?.indexOf(t) ?? -1;
        const diff = predPos >= 0 ? Math.abs(i - predPos) : null;
        const score = diff === 0 ? 3 : diff === 1 ? 1 : diff !== null ? 0 : "";
        row.push(predPos >= 0 ? predPos + 1 : "");
        row.push(score);
      });
      rows.push(row);
    });

    // Totals row
    const totRow = ["", "TOTAL", "", ""];
    submittedPlayers.forEach(p => {
      totRow.push("");
      totRow.push(calcSeasonScore(seasonPreds[p], seasonActual) ?? "");
    });
    rows.push(totRow);

    // Section 2: Each player's full predicted table
    rows.push([]);
    rows.push(["=== PLAYERS PREDICTED TABLES ==="]);
    const headerRow = ["Pred Pos", ...submittedPlayers];
    rows.push(headerRow);

    for (let i = 0; i < 20; i++) {
      const row = [i + 1, ...submittedPlayers.map(p => {
        const team = seasonPreds[p]?.[i] ?? "";
        return team;
      })];
      rows.push(row);
    }

    downloadCSV(`HPL_LeaguePredictions_${new Date().toISOString().split("T")[0]}.csv`, rows);
  };

  const revealedMWs = Object.entries(reveals||{}).filter(([,v])=>v).map(([k])=>parseInt(k)).sort((a,b)=>a-b);

  return (
    <div style={{...S.card, border:"1px solid #34D39944", marginBottom:12}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center",
        cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <div>
          <div style={S.ct}>📥 Export Season Data</div>
          <div style={{fontSize:12, color:"#64748B", marginTop:2}}>
            Download predictions & results as CSV for end-of-season reference
          </div>
        </div>
        <span style={{color:"#64748B"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:14}}>
          {/* Weekly export */}
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"#E2E8F0",marginBottom:8}}>
              📊 Weekly Predictions & Results
            </div>
            <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
              <select
                value={selMW}
                onChange={e=>setSelMW(e.target.value)}
                style={{...S.inp,flex:1,padding:"8px 10px",fontSize:13}}>
                <option value="all">All revealed match weeks</option>
                {revealedMWs.map(w=>(
                  <option key={w} value={w}>Match Week {w}</option>
                ))}
              </select>
            </div>
            <button onClick={exportWeekly}
              style={{...S.bb,padding:"12px",fontSize:14}}>
              ⬇️ Download Weekly CSV
            </button>
            <div style={{fontSize:11,color:"#475569",marginTop:6}}>
              Includes: fixture, result, each player's prediction, points scored, jokers
            </div>
          </div>

          {/* League predictions export */}
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#E2E8F0",marginBottom:8}}>
              🏆 League Predictions vs Actual
            </div>
            <button onClick={exportLeague}
              style={{...S.bb,padding:"12px",fontSize:14}}>
              ⬇️ Download League Predictions CSV
            </button>
            <div style={{fontSize:11,color:"#475569",marginTop:6}}>
              Includes: actual table, each player's predicted position & points per team
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SeasonResetPanel({setReveals, setDeadlines, setPredictions, setJokers,
  setSeasonPreds, setSeasonActual, setFixtures, toast_}) {
  const [open, setOpen] = useState(false);
  const [confirm, setConfirm] = useState("");
  const [busy, setBusy] = useState(false);

  const doTestReset = async () => {
    setBusy(true);
    try {
      // Simulate reset locally only — no Supabase writes
      setReveals({});
      setDeadlines({});
      setPredictions({});
      setJokers({});
      setSeasonPreds({});
      setSeasonActual(null);
      setFixtures(buildFixtures());
      toast_("🧪 Test reset complete — local state cleared. Supabase NOT touched. Refresh to restore.", "error");
      setOpen(false);
      setConfirm("");
    } catch(e) {
      toast_("Test reset failed: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  const doReset = async () => {
    if (confirm.trim().toUpperCase() !== "NEW SEASON") {
      toast_("Type NEW SEASON to confirm", "error");
      return;
    }
    setBusy(true);
    try {
      // First: backup current season data
      const backupKey = `season_backup_2526`;
      try {
        const [curPreds, curActual, curRevs] = await Promise.all([
          supa.getState("season_preds").catch(()=>null),
          supa.getState("season_actual").catch(()=>null),
          supa.getState("reveals").catch(()=>null),
        ]);
        await supa.setState(backupKey, {
          season_preds: curPreds || {},
          season_actual: curActual || [],
          reveals: curRevs || {},
          backed_up_at: new Date().toISOString(),
        });
        console.log("✅ Season 25/26 backed up to Supabase key:", backupKey);
      } catch(backupErr) {
        console.log("Backup warning:", backupErr.message);
      }

      // Clear Supabase tables — keep pins (same players, same PINs each season)
      await Promise.all([
        supa.setState("reveals", {}),
        supa.setState("deadlines", {}),
        supa.setState("season_preds", {}),
        supa.setState("season_actual", null),
      ]);

      // Clear results table
      const rows = await supa.get("results", "select=id");
      if (rows && rows.length) {
        await Promise.all(rows.map(r =>
          fetch(`${SUPA_URL}/rest/v1/results?id=eq.${r.id}`, {
            method: "DELETE",
            headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
          })
        ));
      }

      // Clear predictions table
      const pRows = await supa.get("predictions", "select=id");
      if (pRows && pRows.length) {
        await Promise.all(pRows.map(r =>
          fetch(`${SUPA_URL}/rest/v1/predictions?id=eq.${encodeURIComponent(r.id)}`, {
            method: "DELETE",
            headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
          })
        ));
      }

      // Reset local state — keep pins
      setReveals({});
      setDeadlines({});
      setPredictions({});
      setJokers({});
      setSeasonPreds({});
      setSeasonActual(null);
      setFixtures(buildFixtures());

      // Clear localStorage except pins
      try {
        const saved = loadAll();
        const pinsToKeep = saved.pins || {};
        localStorage.removeItem(MASTER);
        saveAll_master({pins: pinsToKeep});
      } catch {}

      toast_("✅ Season reset complete! All predictions and results cleared.");
      setOpen(false);
      setConfirm("");
    } catch(e) {
      toast_("Reset failed: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{...S.card, border:"1px solid #EF444444", marginBottom:12}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center",
        cursor:"pointer"}} onClick={()=>{ setOpen(o=>!o); setConfirm(""); }}>
        <div>
          <div style={{...S.ct, color:"#EF4444"}}>🔄 New Season Reset</div>
          <div style={{fontSize:12, color:"#64748B", marginTop:2}}>
            Clears all predictions, results, reveals and season data for a fresh start
          </div>
        </div>
        <span style={{color:"#64748B"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:14}}>
          <div style={{background:"#7F1D1D22", border:"1px solid #EF444444",
            borderRadius:8, padding:12, marginBottom:12, fontSize:12, color:"#FCA5A5",
            lineHeight:1.7}}>
            ⚠️ <b>This will permanently delete:</b><br/>
            • All players' weekly predictions<br/>
            • All match results<br/>
            • All reveal and deadline settings<br/>
            • All season (league table) predictions<br/><br/>
            ✅ <b>Player PINs and colours are kept.</b><br/>
            <b>This cannot be undone.</b>
          </div>
          <div style={{fontSize:12, color:"#94A3B8", marginBottom:6}}>
            Type <b style={{color:"#EF4444"}}>NEW SEASON</b> to confirm:
          </div>
          <input
            value={confirm}
            onChange={e=>setConfirm(e.target.value)}
            placeholder="NEW SEASON"
            style={{...S.inp, marginBottom:10, fontWeight:700,
              borderColor: confirm.trim().toUpperCase()==="NEW SEASON"?"#EF4444":"#334155",
              color: confirm.trim().toUpperCase()==="NEW SEASON"?"#EF4444":"#E2E8F0"}}
          />
          <button
            onClick={doReset}
            disabled={busy || confirm.trim().toUpperCase()!=="NEW SEASON"}
            style={{width:"100%", padding:"14px", background:"#7F1D1D",
              border:"2px solid #EF4444", borderRadius:10, color:"#FCA5A5",
              fontSize:15, fontWeight:800, cursor:"pointer",
              opacity: confirm.trim().toUpperCase()==="NEW SEASON"?1:0.4}}>
            {busy?"⏳ Resetting...":"🔄 Reset for New Season"}
          </button>
          <button
            onClick={doTestReset}
            disabled={busy}
            style={{width:"100%", padding:"12px", background:"#0F172A",
              border:"2px solid #F59E0B", borderRadius:10, color:"#F59E0B",
              fontSize:13, fontWeight:700, cursor:"pointer", marginTop:8}}>
            🧪 Test Mode — Preview Reset (no data deleted)
          </button>
        </div>
      )}
    </div>
  );
}
