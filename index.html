function SeasonTab({players, me, seasonPreds, setSeasonPreds, seasonActual, seasonPts, seasonGP, saveAll, toast_, setTab}) {
  const [draft, setDraft] = useState([...PL_TEAMS_2526].sort());
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const myPred = seasonPreds?.[me] || null;
  const touchDragRef = useRef(null);

  useEffect(() => {
    if (myPred && myPred.length === 20) {
      setSubmitted(true);
      setDraft([...myPred]); // restore saved order
    } else if (!myPred) {
      setSubmitted(false);
      setDraft([...PL_TEAMS_2526].sort());
    }
  }, [me, myPred]);

  // Move a team from index 'from' to index 'to'
  const moveTo = (from, to) => {
    if (from === to) return;
    const d = [...draft];
    const [item] = d.splice(from, 1);
    d.splice(to, 0, item);
    setDraft(d);
  };

  // Mouse/pointer drag handlers
  const onDragStart = (i) => setDragIdx(i);
  const onDragOver = (e, i) => { e.preventDefault(); setDragOver(i); };
  const onDrop = (i) => { if(dragIdx!==null) moveTo(dragIdx, i); setDragIdx(null); setDragOver(null); };
  const onDragEnd = () => { setDragIdx(null); setDragOver(null); };

  // Touch drag handlers
  const onTouchStart = (e, i) => {
    touchDragRef.current = { startIdx: i, startY: e.touches[0].clientY };
  };
  const onTouchMove = (e) => {
    e.preventDefault();
    if (!touchDragRef.current) return;
    const y = e.touches[0].clientY;
    const el = document.elementFromPoint(e.touches[0].clientX, y);
    const row = el?.closest('[data-season-idx]');
    if (row) {
      const overIdx = parseInt(row.getAttribute('data-season-idx'));
      if (!isNaN(overIdx)) setDragOver(overIdx);
    }
  };
  const onTouchEnd = () => {
    if (touchDragRef.current && dragOver !== null) {
      moveTo(touchDragRef.current.startIdx, dragOver);
    }
    touchDragRef.current = null;
    setDragOver(null);
    setDragIdx(null);
  };

  const handleSubmit = async () => {
    if (!me) { toast_("Please log in first","error"); return; }
    if (submitted) return;
    if (!window.confirm("Submit your league prediction? This cannot be changed once submitted.")) return;
    const newPreds = {...(seasonPreds||{}), [me]: draft};
    setSeasonPreds(newPreds);
    setSubmitted(true);
    // Save to localStorage immediately as backup
    try {
      saveAll_master({season_preds: newPreds});
    } catch {}
    // Save to Supabase
    try {
      await supa.setState("season_preds", newPreds);
      toast_("League prediction saved! 🏆");
    } catch(e) {
      toast_("Saved locally — sync to server failed. Will retry next open.","error");
    }
  };

  // Scores if actual table is set
  const scores = seasonActual ? players.map(p => ({
    p, pts: calcSeasonScore(seasonPreds?.[p], seasonActual)
  })).sort((a,b) => b.pts - a.pts) : null;

  return (
    <div style={{padding:"12px 8px"}}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:800,color:"#E2E8F0"}}>🏆 League Predictions</div>
        <div style={{fontSize:13,color:"#64748B",marginTop:4}}>
          Predict the final 2025/26 Premier League table
        </div>
        <div style={{fontSize:12,color:"#475569",marginTop:2,background:"#1E293B",
          borderRadius:8,padding:"6px 10px",display:"inline-block"}}>
          🟢 Exact position = <b style={{color:"#34D399"}}>3pts</b> &nbsp;
          🔵 One place off = <b style={{color:"#60A5FA"}}>1pt</b> &nbsp;
          Max <b style={{color:"#A78BFA"}}>60pts</b>
        </div>
        {seasonActual&&seasonActual.length>0
          ? <div style={{fontSize:11,color:"#34D399",marginTop:4}}>
              📡 Live: {seasonActual[0]} · {seasonActual[1]} · {seasonActual[2]} — updates every open
            </div>
          : <div style={{fontSize:11,color:"#F59E0B",marginTop:4}}>
              ⏳ Fetching live standings...
            </div>
        }
      </div>

      {/* Leaderboard — always show if any predictions submitted */}
      {Object.keys(seasonPreds||{}).length > 0 && (
        <div style={{...S.card,marginBottom:16}}>
          <div style={{...S.ct,marginBottom:2}}>🏆 League Predictions Leaderboard</div>
          <div style={{fontSize:11,color:"#64748B",marginBottom:10}}>
            {seasonActual&&seasonActual.length>0
              ? "Based on current PL standings — updates live each week"
              : "⏳ Fetching live standings... reopen the app if scores don't appear shortly"}
          </div>
          {(() => {
            // Build scored list and sort by pts desc
            const scored = players.map(p => ({
              p,
              hasPred: !!(seasonPreds?.[p]&&seasonPreds[p].length===20),
              pts: (seasonActual&&seasonActual.length===20&&seasonPreds?.[p]&&seasonPreds[p].length===20)
                ? calcSeasonScore(seasonPreds[p], seasonActual) : null
            }));
            // Sort: submitted with pts first (desc), then submitted no pts, then not submitted
            scored.sort((a,b) => {
              if(a.pts!==null && b.pts!==null) return b.pts - a.pts;
              if(a.pts!==null) return -1;
              if(b.pts!==null) return 1;
              if(a.hasPred && !b.hasPred) return -1;
              if(!a.hasPred && b.hasPred) return 1;
              return 0;
            });
            let rank = 0;
            return scored.map(({p, hasPred, pts}) => {
              if(pts!==null) rank++;
              return (
                <div key={p} style={{display:"flex",alignItems:"center",gap:10,
                  padding:"10px 8px",borderBottom:"1px solid #1E293B",
                  background:p===me?"#7C3AED11":"transparent",
                  borderRadius:p===me?6:0}}>
                  <span style={{fontSize:15,fontWeight:800,color:"#475569",width:24,textAlign:"center",flexShrink:0}}>
                    {pts!==null ? rank : "–"}
                  </span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                      <span style={{fontWeight:700,fontSize:15,color:playerColour(p)}}>
                        {p}{p===me?" 👤":""}
                      </span>
                      {hasPred && (
                        <span style={{fontSize:22,fontWeight:800,color:playerColour(p),lineHeight:1}}>
                          {pts!==null ? pts : "–"}
                        </span>
                      )}
                      {hasPred && pts!==null && (
                        <span style={{fontSize:11,color:"#64748B",fontWeight:600}}>pts</span>
                      )}
                    </div>
                    {hasPred && pts===null && (
                      <div style={{fontSize:11,color:"#64748B"}}>⏳ loading standings</div>
                    )}
                    {!hasPred && (
                      <div style={{fontSize:12,color:"#475569",fontStyle:"italic"}}>not submitted</div>
                    )}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {/* Other players' predictions */}
      {seasonActual && (
        <div style={{...S.card,marginBottom:16}}>
          <div style={{...S.ct,marginBottom:10}}>All Predictions vs Actual</div>
          {/* ROW_H=36 consistent across all columns so positions align */}
          <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:8}}>

            {/* Team name column */}
            <div style={{minWidth:115,flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:700,color:"#34D399",marginBottom:6,
                textAlign:"left",height:22,lineHeight:"22px",paddingLeft:4}}>Team</div>
              {seasonActual.map((t,i) => (
                <div key={t} style={{
                  height:36,padding:"0 6px",background:"#065F4622",
                  borderRadius:6,marginBottom:3,color:"#34D399",
                  display:"flex",alignItems:"center",gap:4}}>
                  <span style={{color:"#64748B",fontSize:11,flexShrink:0,width:18,textAlign:"right"}}>{i+1}.</span>
                  <Badge team={t} size={18}/>
                  <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontSize:12,fontWeight:600}}>{sn(t)}</span>
                </div>
              ))}
              {/* Spacer to match total row */}
              <div style={{height:36,marginTop:4}}/>
            </div>
            <div style={{minWidth:38,flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:700,color:"#60A5FA",marginBottom:6,
                textAlign:"center",height:22,lineHeight:"22px"}}>Pts</div>
              {seasonActual.map((t,i) => (
                <div key={t} style={{
                  height:36,background:"#1E40AF22",borderRadius:6,marginBottom:3,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#60A5FA"}}>
                    {seasonPts[t]!==undefined ? seasonPts[t] : "–"}
                  </span>
                </div>
              ))}
              <div style={{height:36,marginTop:4,borderRadius:6,background:"#1E40AF22",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:10,color:"#60A5FA",fontWeight:600}}>Pts</span>
              </div>
            </div>

            {/* GP column */}
            <div style={{minWidth:34,flexShrink:0}}>
              <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,
                textAlign:"center",height:22,lineHeight:"22px"}}>GP</div>
              {seasonActual.map((t,i) => (
                <div key={t} style={{
                  height:36,background:"#1E293B",borderRadius:6,marginBottom:3,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:12,color:"#475569"}}>
                    {seasonGP?.[t]!==undefined ? seasonGP[t] : "–"}
                  </span>
                </div>
              ))}
              <div style={{height:36,marginTop:4,borderRadius:6,background:"#1E293B",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:10,color:"#475569",fontWeight:600}}>GP</span>
              </div>
            </div>

            {/* Divider */}
            <div style={{width:2,background:"#334155",borderRadius:2,flexShrink:0,margin:"22px 2px 0"}}/>

            {/* Each player: prediction column + pts column */}
            {players.filter(p=>seasonPreds?.[p]).map(p => {
              const totalPts = calcSeasonScore(seasonPreds[p], seasonActual);
              return (
                <React.Fragment key={p}>
                  {/* Prediction column */}
                  <div style={{minWidth:80,flexShrink:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:playerColour(p),
                      marginBottom:6,textAlign:"center",height:22,lineHeight:"22px",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                    {seasonPreds[p].map((t,i) => {
                      const actualPos = seasonActual.indexOf(t);
                      const diff = Math.abs(i - actualPos);
                      const bg = diff===0?"#065F4622":diff===1?"#1E40AF22":"#1E293B";
                      const col = diff===0?"#34D399":diff===1?"#60A5FA":"#64748B";
                      const rowPts = diff===0?3:diff===1?1:0;
                      return (
                        <div key={t} style={{
                          height:36,padding:"0 6px",background:bg,
                          borderRadius:6,marginBottom:3,color:col,
                          display:"flex",alignItems:"center",gap:4,
                          overflow:"hidden"}}>
                          <span style={{flexShrink:0,fontSize:11,color:"#475569",width:16,textAlign:"right"}}>{i+1}.</span>
                          <Badge team={t} size={16}/>
                          <span style={{overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",fontSize:12}}>{sn(t)}</span>
                        </div>
                      );
                    })}
                    {/* Total row */}
                    <div style={{height:32,marginTop:4,borderRadius:6,
                      background:playerColour(p)+"22",border:`1px solid ${playerColour(p)}44`,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:13,fontWeight:800,color:playerColour(p)}}>
                        {totalPts!==null?totalPts:"–"}
                      </span>
                    </div>
                  </div>

                  {/* Pts per row column */}
                  <div style={{minWidth:28,flexShrink:0}}>
                    <div style={{fontSize:10,fontWeight:700,color:playerColour(p),
                      marginBottom:6,textAlign:"center",height:22,lineHeight:"22px"}}>+</div>
                    {seasonPreds[p].map((t,i) => {
                      const actualPos = seasonActual.indexOf(t);
                      const diff = Math.abs(i - actualPos);
                      const rowPts = diff===0?3:diff===1?1:0;
                      return (
                        <div key={t} style={{
                          height:36,borderRadius:6,marginBottom:3,
                          background:"#0F172A",
                          display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {rowPts>0
                            ? <span style={{fontSize:12,fontWeight:700,
                                color:rowPts===3?"#34D399":"#60A5FA"}}>+{rowPts}</span>
                            : <span style={{fontSize:11,color:"#334155"}}>·</span>}
                        </div>
                      );
                    })}
                    {/* Total pts label */}
                    <div style={{height:32,marginTop:4,borderRadius:6,background:"#0F172A",
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <span style={{fontSize:10,color:"#475569",fontWeight:600}}>pts</span>
                    </div>
                  </div>

                  {/* Small gap between players */}
                  <div style={{width:4,flexShrink:0}}/>
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}

      {/* My prediction / entry form */}
      {me ? (
        submitted ? (
          <div style={S.card}>
            <div style={{...S.ct,color:"#34D399",marginBottom:6}}>
              ✅ Your prediction is locked in
            </div>
            {/* Column headers */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"0 8px",marginBottom:4}}>
              <span style={{width:24,fontSize:10,color:"#334155",textAlign:"center"}}>#</span>
              <span style={{width:20}}/>
              <span style={{flex:1,fontSize:10,color:"#334155"}}>Team</span>
              <span style={{width:38,textAlign:"center",fontSize:10,color:"#A78BFA",fontWeight:700}}>Score</span>
              <span style={{width:40,textAlign:"center",fontSize:10,color:"#60A5FA",fontWeight:700}}>Pts</span>
              <span style={{width:32,textAlign:"center",fontSize:10,color:"#475569",fontWeight:700}}>GP</span>
            </div>
            {(myPred||[]).map((t,i) => {
              const actualIdx = seasonActual ? seasonActual.indexOf(t) : -1;
              const diff = actualIdx>=0 ? Math.abs(i - actualIdx) : null;
              const scorePts = diff===0?3:diff===1?1:0;
              return (
                <div key={t} style={{display:"flex",alignItems:"center",gap:8,
                  padding:"7px 8px",background:"#0F172A",borderRadius:8,marginBottom:3,
                  border:`1px solid ${diff===0?"#34D39933":diff===1?"#3B82F633":"transparent"}`}}>
                  <span style={{fontSize:13,fontWeight:800,color:"#475569",width:24,textAlign:"center",flexShrink:0}}>{i+1}</span>
                  <Badge team={t} size={20}/>
                  <span style={{flex:1,fontSize:13,fontWeight:600,color:"#E2E8F0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t}</span>
                  <div style={{width:38,textAlign:"center",flexShrink:0}}>
                    {diff!==null&&<span style={{fontSize:13,fontWeight:800,
                      color:scorePts===3?"#34D399":scorePts===1?"#60A5FA":"#334155"}}>
                      {scorePts>0?`+${scorePts}`:"0"}
                    </span>}
                  </div>
                  <div style={{width:40,textAlign:"center",flexShrink:0}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#60A5FA"}}>
                      {seasonPts[t]!==undefined?seasonPts[t]:"–"}
                    </span>
                  </div>
                  <div style={{width:32,textAlign:"center",flexShrink:0}}>
                    <span style={{fontSize:12,color:"#475569"}}>
                      {seasonGP?.[t]!==undefined?seasonGP[t]:"–"}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={S.card}>
            <div style={{...S.ct,marginBottom:4}}>📝 Set Your Prediction</div>
            <div style={{fontSize:12,color:"#64748B",marginBottom:12}}>
              Drag teams up or down to rank them 1st to 20th. Once submitted it cannot be changed.
            </div>
            {draft.map((t,i) => (
              <div
                key={t}
                data-season-idx={i}
                draggable
                onDragStart={()=>onDragStart(i)}
                onDragOver={e=>onDragOver(e,i)}
                onDrop={()=>onDrop(i)}
                onDragEnd={onDragEnd}
                onTouchStart={e=>onTouchStart(e,i)}
                onTouchMove={onTouchMove}
                onTouchEnd={onTouchEnd}
                style={{
                  display:"flex",alignItems:"center",gap:10,
                  padding:"10px 12px",
                  background:dragOver===i?"#4C1D9544":dragIdx===i?"#1E293B88":"#0F172A",
                  borderRadius:10,marginBottom:5,
                  border:dragOver===i?"2px solid #7C3AED":"2px solid #1E293B",
                  cursor:"grab",userSelect:"none",
                  transform:dragIdx===i?"scale(0.98)":"scale(1)",
                  transition:"background 0.1s,border 0.1s",
                  touchAction:"none",
                }}>
                <span style={{fontSize:16,fontWeight:800,color:"#7C3AED",width:28,textAlign:"center",flexShrink:0}}>{i+1}</span>
                <Badge team={t} size={28}/>
                <span style={{flex:1,fontSize:16,fontWeight:700,color:"#E2E8F0"}}>{t}</span>
                <span style={{fontSize:20,color:"#334155",flexShrink:0}}>⠿</span>
              </div>
            ))}
            <button style={{...S.bb,marginTop:14,padding:"16px",fontSize:16,fontWeight:800}}
              onClick={handleSubmit}>
              🔒 Submit League Prediction
            </button>
          </div>
        )
      ) : (
        <div style={{...S.card,textAlign:"center"}}>
          <div style={{fontSize:18,marginBottom:8}}>👤</div>
          <div style={{fontWeight:700,color:"#E2E8F0",marginBottom:6}}>You're not logged in</div>
          <div style={{color:"#64748B",fontSize:13,marginBottom:14}}>
            Log in on the Weekly Preds tab to submit your league prediction.
          </div>
          <button
            onClick={()=>setTab("predict")}
            style={{...S.bb,padding:"12px 24px",fontSize:15}}>
            👤 Go to Login
          </button>
        </div>
      )}
    </div>
  );
}
function PinScreen({player,mode,pins,onSuccess,onSavePin,onCancel}){
  // steps: "enter" (enter current or new PIN) | "confirm" (confirm new PIN) | "verify" (verify old PIN before changing)
  const initStep = mode==="change" ? "verify" : mode==="set" ? "enter" : "enter";
  const[digits,setDigits]=useState(["","","",""]);
  const[confirm,setConfirm]=useState(["","","",""]);
  const[step,setStep]=useState(initStep);
  const[error,setError]=useState("");
  const refs=[useRef(),useRef(),useRef(),useRef()];

  const handleDigit=(i,val,arr,setArr)=>{
    if(!/^[0-9]?$/.test(val))return;
    const nd=[...arr];nd[i]=val;setArr(nd);setError("");
    if(val&&i<3)refs[i+1].current?.focus();
  };
  const handleKey=(i,e,arr,setArr)=>{
    if(e.key==="Backspace"&&!arr[i]&&i>0){refs[i-1].current?.focus();}
  };

  const doSubmit=()=>{
    const pin=digits.join("");
    if(pin.length<4){setError("Enter all 4 digits");return;}

    if(mode==="enter"){
      if(pin===pins[player]){onSuccess(player);}
      else{setError("Wrong PIN. Try again.");setDigits(["","","",""]);refs[0].current?.focus();}

    } else if(mode==="set"){
      if(step==="enter"){setStep("confirm");setConfirm(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);}
      else{
        const c=confirm.join("");
        if(c===pin){onSavePin(player,pin);}
        else{setError("PINs don't match. Try again.");setStep("enter");setDigits(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);}
      }

    } else if(mode==="change"){
      if(step==="verify"){
        // Verify existing PIN first
        if(pin===pins[player]){
          setStep("enter");setDigits(["","","",""]);setError("");
          setTimeout(()=>refs[0].current?.focus(),50);
        } else {
          setError("Wrong current PIN. Try again.");setDigits(["","","",""]);refs[0].current?.focus();
        }
      } else if(step==="enter"){
        setStep("confirm");setConfirm(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);
      } else {
        const c=confirm.join("");
        if(c===pin){onSavePin(player,pin);}
        else{setError("PINs don't match. Try again.");setStep("enter");setDigits(["","","",""]);setTimeout(()=>refs[0].current?.focus(),50);}
      }
    }
  };

  const current=step==="confirm"?confirm:digits;
  const setCurrent=step==="confirm"?setConfirm:setDigits;

  const title=
    mode==="enter" ? "🔒 Enter Your PIN" :
    mode==="change" && step==="verify" ? "🔑 Enter Current PIN" :
    mode==="change" && step==="enter" ? "🔑 Choose New PIN" :
    mode==="change" && step==="confirm" ? "🔑 Confirm New PIN" :
    step==="confirm" ? "🔒 Confirm Your PIN" : "🔒 Set Your PIN";

  const subtitle=
    mode==="enter" ? `Welcome back, ${player}! Enter your 4-digit PIN.` :
    mode==="change" && step==="verify" ? `Enter your current PIN to verify it's you, ${player}.` :
    mode==="change" && step==="enter" ? "Enter your new 4-digit PIN." :
    mode==="change" && step==="confirm" ? "Enter your new PIN again to confirm." :
    step==="enter" ? `Hi ${player}! Choose a 4-digit PIN to protect your predictions.` :
    "Enter your PIN again to confirm.";

  const btnLabel=
    mode==="enter" ? "Log In" :
    mode==="change" && step==="verify" ? "Verify →" :
    mode==="change" && step==="enter" ? "Next →" :
    mode==="change" && step==="confirm" ? "Save New PIN" :
    step==="enter" ? "Next →" : "Set PIN & Log In";

  return(
    <div style={{...S.card,border:"2px solid #7C3AED",padding:24}}>

      {/* Player name badge */}
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{display:"inline-block",background:"#7C3AED22",border:"2px solid #7C3AED",
          borderRadius:12,padding:"8px 20px",marginBottom:10}}>
          <span style={{fontSize:20,fontWeight:800,color:playerColour(player)}}>{player}</span>
        </div>
        <div style={{fontSize:18,fontWeight:700,color:"#E2E8F0"}}>{title}</div>
        <p style={{color:"#94A3B8",fontSize:13,margin:"6px 0 0"}}>{subtitle}</p>
      </div>

      {/* PIN digit boxes */}
      <div style={{display:"flex",gap:14,justifyContent:"center",marginBottom:20}}>
        {[0,1,2,3].map(i=>(
          <input key={i} ref={refs[i]} type="password" inputMode="numeric" maxLength={1}
            value={current[i]}
            onChange={e=>handleDigit(i,e.target.value,current,setCurrent)}
            onKeyDown={e=>handleKey(i,e,current,setCurrent)}
            style={{
              width:64,height:72,textAlign:"center",fontSize:36,fontWeight:800,
              background:current[i]?"#4C1D9533":"#1E293B",
              border:`3px solid ${error?"#EF4444":current[i]?"#7C3AED":"#475569"}`,
              borderRadius:14,color:"#E2E8F0",outline:"none",
              boxShadow:current[i]?"0 0 12px #7C3AED66":"none",
              transition:"all 0.15s"
            }}
          />
        ))}
      </div>

      {error&&(
        <div style={{background:"#7F1D1D33",border:"1px solid #EF444466",borderRadius:8,
          padding:"10px",color:"#EF4444",fontSize:14,textAlign:"center",marginBottom:14,fontWeight:600}}>
          ⚠️ {error}
        </div>
      )}

      <button style={{...S.bb,padding:"16px",fontSize:16,fontWeight:800}} onClick={doSubmit}>
        {btnLabel}
      </button>
      <button style={{...S.sb,width:"100%",marginTop:10,padding:"12px",fontSize:14}} onClick={onCancel}>
        ← Back
      </button>

      {mode==="enter"&&(
        <div style={{marginTop:16,padding:"14px 16px",background:"#F59E0B11",
          border:"1px solid #F59E0B44",borderRadius:10,textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#F59E0B",marginBottom:4}}>🔑 Forgot your PIN?</div>
          <div style={{color:"#94A3B8",fontSize:12,marginBottom:12}}>
            Tap below to reset it. You'll set a new PIN next time you log in.
          </div>
          <button onClick={()=>{
              if(window.confirm(`Reset ${player}'s PIN? You'll set a new one when you next log in.`)){
                onSavePin(player,null);
              }
            }}
            style={{width:"100%",padding:"12px",background:"#F59E0B22",
              border:"2px solid #F59E0B",borderRadius:10,
              color:"#F59E0B",fontSize:15,fontWeight:700,cursor:"pointer"}}>
            🔄 Reset My PIN
          </button>
        </div>
      )}
    </div>
  );
}

function Tag({color,children}){return <span style={{background:`${color}22`,color,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,marginLeft:4,display:"inline-block"}}>{children}</span>;}
function PB({pts,joker,small}){const c=pts>=3?"#34D399":pts>=1?"#60A5FA":"#EF4444";return <span style={{display:"inline-block",background:`${c}22`,color:c,borderRadius:4,padding:small?"1px 4px":"2px 7px",fontSize:small?9:11,fontWeight:700,marginLeft:4}}>{pts>0?`+${pts}`:"0"}{joker&&pts>0?" ×2":""}</span>;}

  nba:{background:"#0F172A",color:"#A78BFA",borderBottom:"3px solid #7C3AED"},

  card:{background:"#1E293B",borderRadius:12,padding:16,marginBottom:12,border:"1px solid #334155"},

  giOff:{opacity:0.5,cursor:"not-allowed",border:"2px solid #334155"},
  bb:{width:"100%",padding:"13px",background:"linear-gradient(135deg,#6D28D9,#7C3AED)",border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8},
  sb:{padding:"6px 14px",background:"#1E293B",border:"1px solid #334155",borderRadius:8,color:"#94A3B8",fontSize:13,cursor:"pointer",fontWeight:600},
  inp:{width:"100%",background:"#0F172A",border:"1px solid #334155",borderRadius:8,color:"#E2E8F0",padding:"10px 12px",fontSize:14,outline:"none",marginBottom:8,boxSizing:"border-box"},
  pBtn:{padding:"9px 18px",background:"#1E293B",border:"1px solid #4C1D95",borderRadius:20,color:"#A78BFA",fontSize:14,fontWeight:600,cursor:"pointer"},

  tag:{borderRadius:6,padding:"5px 12px",fontSize:13,fontWeight:600},
  empty:{textAlign:"center",color:"#64748B",padding:"40px 20px",fontSize:14,lineHeight:1.8},
  lRow:{borderRadius:12,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid #334155"},
