// Load all shared state from Supabase
async function loadFromSupabase() {
  const [reveals, deadlines, pins, predRows] = await Promise.all([
    supa.getState("reveals"),
    supa.getState("deadlines"),
    supa.getState("pins"),
    // Fetch all predictions in pages (Supabase default limit is 1000)
    (async () => {
      const allRows = [];
      let from = 0;
      const pageSize = 1000;
      while (true) {
        const rows = await supa.get("predictions",
          `select=player,fixture_id,home_goals,away_goals,joker&limit=${pageSize}&offset=${from}`
        );
        if (!rows || !rows.length) break;
        allRows.push(...rows);
        if (rows.length < pageSize) break;
        from += pageSize;
      }
      return allRows;
    })(),
  ]);

  // Rebuild predictions object: { playerName: { fixtureId: {homeGoals,awayGoals,joker} } }
  const predictions = {};
  (predRows || []).forEach(r => {
    if (!predictions[r.player]) predictions[r.player] = {};
    predictions[r.player][r.fixture_id] = {
      homeGoals: r.home_goals,
      awayGoals: r.away_goals,
      joker: r.joker === true || r.joker === 1 || r.joker === "true" || r.joker === "1" || false,
    };
  });
  console.log("Loaded predictions from Supabase:", Object.keys(predictions).length, "players,",
    Object.values(predictions).reduce((a,p)=>a+Object.keys(p).length,0), "predictions");

  // Load results from Supabase (overrides hardcoded REAL_RESULTS)
  const resultRows = await supa.get("results","select=id,home_goals,away_goals").catch(()=>[]);
  const supaResults = {};
  (resultRows||[]).forEach(r=>{supaResults[r.id]={homeGoals:r.home_goals,awayGoals:r.away_goals};});

  // Load football-data.org token
  const fdToken = await supa.getState("fd_token").catch(()=>null);
  if(fdToken && typeof fdToken === 'string'){
    try{ localStorage.setItem("hpl_fdorg_key", fdToken); }catch{}
  }

  // Load season predictions
  const seasonPreds = await supa.getState("season_preds").catch(()=>null);
  const seasonActual = await supa.getState("season_actual").catch(()=>null);
  // Merge with localStorage backup
  let mergedSeasonPreds = seasonPreds || {};
  try {
    const local = loadAll();
    if (local.season_preds && Object.keys(mergedSeasonPreds).length === 0) {
      mergedSeasonPreds = local.season_preds;
    }
  } catch {}

  // Load MW overrides
  const mwOverridesRaw = await supa.getState("mw_overrides").catch(()=>null);
  const mwOverridesLoaded = mwOverridesRaw || {};
  const entryFeesRaw = await supa.getState("entry_fees").catch(()=>null);
  const entryFeesLoaded = entryFeesRaw || {};
  // Load live fixtures (built by ESPN auto-refresh when SEASON_FIXTURES is empty)
  const liveFixturesRaw = await supa.getState("live_fixtures").catch(()=>null);
  const seasonLabelRaw = await supa.getState("season_label").catch(()=>null);
  const playerConfigRaw = await supa.getState("player_config").catch(()=>null);
  const emailsRaw = await supa.getState("emails_hpl").catch(()=>null);

  return {
    reveals: reveals,
    mwOverrides: mwOverridesLoaded,
    entryFees: entryFeesLoaded,
    liveFixtures: liveFixturesRaw || null,
    seasonLabel: seasonLabelRaw || null,
    playerConfig: playerConfigRaw || null,
    emails: emailsRaw || {},
    deadlines: deadlines || {},
    pins: pins || {},
    predictions,
    supaResults,
    seasonPreds: mergedSeasonPreds,
    seasonActual: seasonActual || null,
  };
}

// Save all predictions for a player (batch)
async function saveAllPredictions(player, preds) {
  const rows = Object.entries(preds).map(([fixtureId, p]) => ({
    id: `${player}_${fixtureId}`,
    player,
    fixture_id: fixtureId,
    home_goals: p.homeGoals !== "" ? parseInt(p.homeGoals) : null,
    away_goals: p.awayGoals !== "" ? parseInt(p.awayGoals) : null,
    joker: p.joker || false,
    updated_at: new Date().toISOString(),
  }));
  if (!rows.length) return;
  return supa.upsert("predictions", rows);
}

// Calculate PL standings from match results already in fixtures
function deriveStandings(allFixtures) {
  const pts = {}, gd = {}, gf = {};
  const TEAMS = ["Arsenal","Man City","Man Utd","Liverpool","Aston Villa","Bournemouth",
    "Brentford","Brighton","Chelsea","Coventry","Crystal Palace","Everton","Fulham","Hull",
    "Ipswich","Leeds","Newcastle","Nottm Forest","Sunderland","Spurs"];
  TEAMS.forEach(t=>{ pts[t]=0; gd[t]=0; gf[t]=0; });

  Object.values(allFixtures).forEach(mwList=>{
    mwList.forEach(fx=>{
      if(!fx.result) return;
      const h=fx.home, a=fx.away;
      const hg=fx.result.homeGoals, ag=fx.result.awayGoals;
      if(!TEAMS.includes(h)||!TEAMS.includes(a)) return;
      gf[h]=(gf[h]||0)+hg; gf[a]=(gf[a]||0)+ag;
      gd[h]=(gd[h]||0)+(hg-ag); gd[a]=(gd[a]||0)+(ag-hg);
      if(hg>ag){ pts[h]=(pts[h]||0)+3; }
      else if(hg<ag){ pts[a]=(pts[a]||0)+3; }
      else { pts[h]=(pts[h]||0)+1; pts[a]=(pts[a]||0)+1; }
    });
  });

  const sorted = TEAMS.filter(t=>pts[t]!==undefined)
    .sort((a,b)=> pts[b]-pts[a] || gd[b]-gd[a] || gf[b]-gf[a] || a.localeCompare(b));
  const gp = {};
  TEAMS.forEach(t=>{ gp[t]=0; });
  Object.values(allFixtures).forEach(mwList=>{
    mwList.forEach(fx=>{
      if(!fx.result) return;
      if(TEAMS.includes(fx.home)) gp[fx.home]=(gp[fx.home]||0)+1;
      if(TEAMS.includes(fx.away)) gp[fx.away]=(gp[fx.away]||0)+1;
    });
  });
  return { standings: sorted, standingsPts: pts, standingsGP: gp };
}

    "Chelsea":"Chelsea","Chelsea FC":"Chelsea",
    "Crystal Palace":"Crystal Palace","Crystal Palace FC":"Crystal Palace",
    "Everton":"Everton","Everton FC":"Everton",
    "Fulham":"Fulham","Fulham FC":"Fulham",
    "Leeds United":"Leeds","Leeds":"Leeds","Leeds United FC":"Leeds",
    "Liverpool":"Liverpool","Liverpool FC":"Liverpool",
    "Manchester City":"Man City","Man City":"Man City","Manchester City FC":"Man City","Man. City":"Man City",
    "Manchester United":"Man Utd","Man Utd":"Man Utd","Manchester United FC":"Man Utd","Man United":"Man Utd","Man. United":"Man Utd","Manchester Utd":"Man Utd",
    "Newcastle United":"Newcastle","Newcastle":"Newcastle","Newcastle United FC":"Newcastle","Newcastle Utd":"Newcastle",
    "Nottingham Forest":"Nottm Forest","Nottm Forest":"Nottm Forest","Nottingham Forest FC":"Nottm Forest","Nott'm Forest":"Nottm Forest","Nott'ham Forest":"Nottm Forest",
    "Sunderland":"Sunderland","Sunderland AFC":"Sunderland",
    "Tottenham Hotspur":"Spurs","Spurs":"Spurs","Tottenham":"Spurs","Tottenham Hotspur FC":"Spurs","Tottenham FC":"Spurs",
    "Coventry City":"Coventry","Coventry":"Coventry","Coventry City FC":"Coventry",
    "Hull City":"Hull","Hull":"Hull","Hull City AFC":"Hull","Hull City FC":"Hull",
    "Ipswich Town":"Ipswich","Ipswich":"Ipswich","Ipswich Town FC":"Ipswich",
  };

  // Fuzzy fallback — partial match if exact not found
  const norm = t => {
    if(!t) return t;
    if(ESPN_TEAM_MAP[t]) return ESPN_TEAM_MAP[t];
    // Try case-insensitive
    const tl = t.toLowerCase();
    for(const [k,v] of Object.entries(ESPN_TEAM_MAP)){
      if(k.toLowerCase()===tl) return v;
    }
    // Try contains match for known short names
    if(tl.includes("bournemouth")) return "Bournemouth";
    if(tl.includes("brighton")) return "Brighton";
    if(tl.includes("manchester city")||tl.includes("man city")) return "Man City";
    if(tl.includes("manchester united")||tl.includes("man united")||tl.includes("man utd")) return "Man Utd";
    if(tl.includes("newcastle")) return "Newcastle";
    if(tl.includes("nottingham")||tl.includes("nottm")) return "Nottm Forest";
    if(tl.includes("tottenham")||tl.includes("hotspur")) return "Spurs";
    if(tl.includes("coventry")) return "Coventry";
    if(tl.includes("hull")) return "Hull";
    if(tl.includes("ipswich")) return "Ipswich";
    if(tl.includes("aston villa")) return "Aston Villa";
    if(tl.includes("crystal palace")) return "Crystal Palace";
    if(tl.includes("sunderland")) return "Sunderland";
    if(tl.includes("arsenal")) return "Arsenal";
    if(tl.includes("brentford")) return "Brentford";
    if(tl.includes("chelsea")) return "Chelsea";
    if(tl.includes("everton")) return "Everton";
    if(tl.includes("fulham")) return "Fulham";
    if(tl.includes("leeds")) return "Leeds";
    if(tl.includes("liverpool")) return "Liverpool";
    return t;
  };

  try {
    const now = new Date();
    const fmt = d => d.toISOString().split("T")[0].replace(/-/g,"");
    const fixturesAreEmptyCheck = !fixtures || Object.keys(fixtures).length === 0 ||
      Object.values(fixtures).every(mwList => mwList.length === 0);

    // First-ever load (no fixtures yet): fetch the WHOLE season once to build the list.
    // After that: just fetch a rolling 60-day window around today for live results/date changes.
    const seasonStart = new Date('2026-08-01');
    const seasonEnd = new Date('2027-06-05');
    let rangeStart, fetchEnd;
    if (fixturesAreEmptyCheck) {
      rangeStart = seasonStart;
      fetchEnd = seasonEnd;
    } else {
      rangeStart = new Date(now); rangeStart.setDate(rangeStart.getDate() - 14);
      fetchEnd = new Date(now); fetchEnd.setDate(fetchEnd.getDate() + 60);
    }

    const events = [];
    const seen = new Set();
    let chunkStart = new Date(rangeStart);

    while (chunkStart < fetchEnd) {
      const chunkEnd = new Date(chunkStart);
      chunkEnd.setDate(chunkEnd.getDate() + 30);
      if (chunkEnd > fetchEnd) chunkEnd.setTime(fetchEnd.getTime());

      try {
        const r = await fetchWithTimeout(
          `https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard?dates=${fmt(chunkStart)}-${fmt(chunkEnd)}&limit=200`
        );
        if (r.ok) {
          const d = await r.json();
          (d.events || []).forEach(ev => {
            if (!seen.has(ev.id)) { seen.add(ev.id); events.push(ev); }
          });
        }
      } catch(e) { console.log(`Chunk ${fmt(chunkStart)} failed:`, e.message); }

      chunkStart.setDate(chunkStart.getDate() + 30);
    }

    console.log(`ESPN: fetched ${events.length} events (${fixturesAreEmptyCheck ? "full season" : "rolling window"})`);
    if (!events.length) return { fixtures, updated: 0, dateChanges: 0 };

    // ── AUTO-BUILD FIXTURES FROM ESPN ──────────────────────────────────────
    // When SEASON_FIXTURES is empty (new season, fixtures not yet hardcoded),
    // build the fixture list directly from ESPN events using week number.
    const fixturesAreEmpty = Object.keys(fixtures).length === 0 ||
      Object.values(fixtures).every(mwList => mwList.length === 0);

    if (fixturesAreEmpty && events.length > 0) {
      console.log("📋 No hardcoded fixtures — building from ESPN data");
      const PL_TEAMS = new Set([
        "Arsenal","Aston Villa","Bournemouth","Brentford","Brighton",
        "Chelsea","Coventry","Crystal Palace","Everton","Fulham","Hull",
        "Ipswich","Leeds","Liverpool","Man City","Man Utd","Newcastle",
        "Nottm Forest","Spurs","Sunderland",
      ]);

      // Pass 1: collect all valid PL fixtures with parsed data
      const validEvents = [];
      events.forEach(ev => {
        const comps = ev.competitions?.[0];
        if (!comps) return;
        const competitors = comps.competitors || [];
        const homeComp = competitors.find(c => c.homeAway === "home");
        const awayComp = competitors.find(c => c.homeAway === "away");
        if (!homeComp || !awayComp) return;
        const home = norm(homeComp.team?.displayName || homeComp.team?.name || "");
        const away = norm(awayComp.team?.displayName || awayComp.team?.name || "");
        if (!home || !away) return;
        if (!PL_TEAMS.has(home) || !PL_TEAMS.has(away)) return; // Skip non-PL games

        const evDateObj = ev.date ? new Date(ev.date) : null;
        if (!evDateObj || isNaN(evDateObj)) return;

        const espnMw = ev.week?.number || ev.competitions?.[0]?.week?.number || null;
        const completed = ev.status?.type?.completed === true || ev.status?.type?.state === "post";
        const hasScores = homeComp.score !== null && homeComp.score !== undefined && homeComp.score !== "";
        let result = null;
        if (completed && hasScores) {
          const h = parseInt(homeComp.score), a = parseInt(awayComp.score);
          if (!isNaN(h) && !isNaN(a)) result = { homeGoals: h, awayGoals: a };
        }
        validEvents.push({ home, away, dateObj: evDateObj, espnMw, result });
      });

      if (validEvents.length === 0) return { fixtures, updated: 0, dateChanges: 0 };

      // Sort all fixtures by date, then assign exactly 10 per match week.
      // This ensures 38 MWs of 10 games each regardless of ESPN's week numbering.
      // Within each MW, order by date then home team name.
      const sorted = [...validEvents].sort((a, b) => {
        if (a.dateObj - b.dateObj !== 0) return a.dateObj - b.dateObj;
        return a.home.localeCompare(b.home);
      });

      // Deduplicate (same home+away pair)
      const seen = new Set();
      const deduped = sorted.filter(e => {
        const key = `${e.home}|${e.away}`;
        if (seen.has(key)) return false;
        seen.add(key); return true;
      });

      const GAMES_PER_MW = 10;
      const built = {};
      deduped.forEach((e, i) => {
        const mw = Math.floor(i / GAMES_PER_MW) + 1;
        if (mw > 38) return; // cap at 38 MWs
        const evDate = e.dateObj.toLocaleDateString("en-CA", {timeZone:"Europe/London"});
        const evTime = e.dateObj.toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", timeZone:"Europe/London"});
        if (!built[mw]) built[mw] = [];
        const idx = built[mw].length;
        built[mw].push({ id: `${mw}-${idx}`, mw, home: e.home, away: e.away,
          date: evDate, time: evTime, currentDate: evDate, currentTime: evTime, result: e.result });
      });

      // Auto-set deadlines: Wednesday 19:00 before the first game of each MW
      const autoDeadlines = {};
      Object.entries(built).forEach(([mwStr, fxs]) => {
        const mwNum = parseInt(mwStr);
        const firstDate = fxs.reduce((min, fx) => fx.date < min ? fx.date : min, fxs[0].date);
        const d = new Date(firstDate + "T12:00:00");
        // Find the Wednesday before (or on) the first game
        const day = d.getDay(); // 0=Sun,1=Mon,...,3=Wed,...,6=Sat
        const daysBack = day >= 3 ? day - 3 : day + 4; // days back to Wednesday
        d.setDate(d.getDate() - daysBack);
        autoDeadlines[mwNum] = `${d.toLocaleDateString("en-CA")}T19:00`;
      });

      if (Object.keys(built).length > 0) {
        console.log(`✅ Built ${Object.keys(built).length} match weeks from ESPN (10 games/MW)`);
        // Save fixtures and auto-deadlines to Supabase
        supa.setState("live_fixtures", built).catch(e =>
          console.log("live_fixtures save failed:", e.message)
        );
        // Only set deadlines if none exist yet (don't overwrite admin-set ones)
        supa.getState("deadlines").then(existing => {
          if (!existing || Object.keys(existing).length === 0) {
            supa.setState("deadlines", autoDeadlines).catch(()=>{});
            console.log("✅ Auto-set deadlines (Wed 19:00 before each MW)");
          }
        }).catch(()=>{});
        return {
          fixtures: built,
          updated: Object.values(built).reduce((n,l)=>n+l.filter(f=>f.result).length,0),
          dateChanges: 0,
          fixturesBuilt: true,
        };
      }
    }
    // ── END AUTO-BUILD ─────────────────────────────────────────────────────

    const newFx = JSON.parse(JSON.stringify(fixtures));
    let updated = 0, dateChanges = 0;

    events.forEach(ev => {
      const comps = ev.competitions?.[0];
      if (!comps) return;
      const competitors = comps.competitors || [];
      const homeComp = competitors.find(c => c.homeAway === "home");
      const awayComp = competitors.find(c => c.homeAway === "away");
      if (!homeComp || !awayComp) return;

      const home = norm(homeComp.team?.displayName || homeComp.team?.name || "");
      const away = norm(awayComp.team?.displayName || awayComp.team?.name || "");
      if (!home || !away) return;

      const state = ev.status?.type?.state;
      const completed = ev.status?.type?.completed === true;
      const statusDesc = (ev.status?.type?.description||ev.status?.type?.name||"").toLowerCase();
      const isPost = state === "post";
      const isIn = state === "in";
      const liveOrPre = isIn || state === "pre" ||
        statusDesc.includes("progress") || statusDesc.includes("half") ||
        statusDesc.includes("live") || statusDesc.includes("scheduled");
      const hasScores = homeComp.score !== null && homeComp.score !== undefined && 
                        awayComp.score !== null && awayComp.score !== undefined &&
                        homeComp.score !== "" && awayComp.score !== "";
      const isFT = statusDesc.includes("full time") || statusDesc.includes("final") || 
                   statusDesc.includes("ft") || statusDesc.includes("aet") ||
                   statusDesc.includes("full-time") || statusDesc.includes("ended");
      // Broadly detect finished: any post-state with valid scores, or completed flag
      const fullyFinished = completed || isFT || (isPost && hasScores && !isIn);

      const evDateObj = ev.date ? new Date(ev.date) : null;
      const evDate = evDateObj ? evDateObj.toLocaleDateString("en-CA",{timeZone:"Europe/London"}) : null; // YYYY-MM-DD in BST
      const evTime = evDateObj ? evDateObj.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/London"}) : null;

      Object.values(newFx).forEach(mwList => {
        mwList.forEach(fx => {
          if (norm(fx.home) !== home || norm(fx.away) !== away) return;

          if (fullyFinished) {
            const h = parseInt(homeComp.score);
            const a = parseInt(awayComp.score);
            if (!isNaN(h) && !isNaN(a)) {
              // Trust ESPN's completed status — don't check local time
              if (!fx.result || fx.result.homeGoals !== h || fx.result.awayGoals !== a) {
                fx.result = { homeGoals: h, awayGoals: a };
                updated++;
                // Auto-save to Supabase results table
                supa.upsert("results", {
                  id: fx.id,
                  home_goals: h,
                  away_goals: a,
                  updated_at: new Date().toISOString()
                }).catch(e=>console.log("Auto-save result failed:", e.message));
              }
            }
          }

          // Update date/time ONLY for outstanding (unplayed) fixtures
          // Never overwrite date/time of games that already have a result
          // Never overwrite if admin has manually assigned MW
          const hasManualOverride = mwOverrides && mwOverrides[fx.id];
          const alreadyPlayed = !!fx.result;
          if (evDate && evTime && !hasManualOverride && !alreadyPlayed) {
            const dateChanged = evDate !== fx.currentDate;
            const timeChanged = evTime !== fx.currentTime;
            if (dateChanged || timeChanged) {
              fx.currentDate = evDate;
              fx.currentTime = evTime;
              dateChanges++;
            }
          }
        });
      });
    });

    // Fetch current PL standings — multiple endpoints with fallback
    let standings = null;
    let standingsPts = {};
    let standingsGP = {};

    const TEAM_MAP = {
      // ESPN names → app names
      "Arsenal FC":"Arsenal","Arsenal":"Arsenal",
      "Manchester City":"Man City","Manchester City FC":"Man City",
      "Manchester United":"Man Utd","Manchester United FC":"Man Utd",
      "Liverpool FC":"Liverpool","Liverpool":"Liverpool",
      "Aston Villa":"Aston Villa","Aston Villa FC":"Aston Villa",
      "AFC Bournemouth":"Bournemouth","Bournemouth":"Bournemouth",
      "Brentford FC":"Brentford","Brentford":"Brentford",
      "Brighton & Hove Albion":"Brighton","Brighton & Hove Albion FC":"Brighton","Brighton":"Brighton",
      "Chelsea FC":"Chelsea","Chelsea":"Chelsea",
      "Coventry City":"Coventry","Coventry City FC":"Coventry","Coventry":"Coventry",
      "Crystal Palace FC":"Crystal Palace","Crystal Palace":"Crystal Palace",
      "Everton FC":"Everton","Everton":"Everton",
      "Fulham FC":"Fulham","Fulham":"Fulham",
      "Hull City":"Hull","Hull City AFC":"Hull","Hull City FC":"Hull","Hull":"Hull",
      "Ipswich Town":"Ipswich","Ipswich Town FC":"Ipswich","Ipswich":"Ipswich",
      "Leeds United":"Leeds","Leeds United FC":"Leeds","Leeds":"Leeds",
      "Nottingham Forest":"Nottm Forest","Nottingham Forest FC":"Nottm Forest","Nottm Forest":"Nottm Forest",
      "Newcastle United":"Newcastle","Newcastle United FC":"Newcastle","Newcastle":"Newcastle",
      "Sunderland AFC":"Sunderland","Sunderland":"Sunderland",
      "Tottenham Hotspur":"Spurs","Tottenham Hotspur FC":"Spurs","Spurs":"Spurs",
    };
    const mapTeam = n => TEAM_MAP[n] || norm(n||"");

    // API 1: football-data.org (most reliable if key set)
    try {
      const fdKey = localStorage.getItem("hpl_fdorg_key")||"";
      if (fdKey) {
        const r = await fetchWithTimeout("https://api.football-data.org/v4/competitions/PL/standings?season=2026",
          {headers:{"X-Auth-Token":fdKey}});
        if (r.ok) {
          const d = await r.json();
          const table = d.standings?.find(s=>s.type==="TOTAL")?.table||[];
          if (table.length >= 18) {
            standings = table.sort((a,b)=>a.position-b.position)
              .map(t=>mapTeam(t.team?.name)||mapTeam(t.team?.shortName)).filter(Boolean);
            table.forEach(t=>{
              const tn=mapTeam(t.team?.name)||mapTeam(t.team?.shortName);
              if(tn){ standingsPts[tn]=t.points; standingsGP[tn]=t.playedGames; }
            });
            console.log("✅ Standings: football-data.org", standings.length, standings[0]);
          }
        }
      }
    } catch(e){ console.log("fd.org failed:", e.message); }

    // API 2: ESPN scoreboard (standings embedded in leagues array)
    if (!standings) try {
      const r = await fetchWithTimeout("https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard");
      if (r.ok) {
        const d = await r.json();
        const entries = d.leagues?.[0]?.standings?.entries||[];
        if (entries.length >= 18) {
          const sorted = [...entries].sort((a,b)=>{
            const rv = e => {
              const s = e.stats?.find(x=>x.name==="rank"||x.shortDisplayName==="RK"||x.name==="position");
              return parseInt(s?.displayValue||s?.value||"99");
            };
            return rv(a)-rv(b);
          });
          standings = sorted.map(e=>mapTeam(e.team?.displayName||e.team?.name||"")).filter(Boolean);
          sorted.forEach(e=>{
            const tn=mapTeam(e.team?.displayName||e.team?.name||"");
            if(!tn) return;
            if(Object.keys(standingsPts).length===0 && e.stats?.length){
              console.log("ESPN stats:", e.stats.map(s=>`${s.name}(${s.shortDisplayName})=${s.value}`).join(", "));
            }
            const ptsStat = e.stats?.find(x=>
              ["points","pts","PTS","totalPoints"].includes(x.name) ||
              ["PTS","Pts","pts","P"].includes(x.shortDisplayName) ||
              x.displayName==="Points"
            );
            const gpStat = e.stats?.find(x=>
              ["gamesPlayed","played","GP"].includes(x.name) ||
              ["GP","P","Pld"].includes(x.shortDisplayName) ||
              x.displayName==="Games Played"
            );
            if(ptsStat) standingsPts[tn]=parseInt(ptsStat.value||ptsStat.displayValue||0);
            if(gpStat) standingsGP[tn]=parseInt(gpStat.value||gpStat.displayValue||0);
          });
          console.log("✅ Standings: ESPN scoreboard", standings.length, "pts sample:", JSON.stringify(standingsPts).slice(0,80));
        }
      }
    } catch(e){ console.log("ESPN scoreboard failed:", e.message); }

    // API 3: ESPN league table endpoint (different URL structure)
    if (!standings) try {
      const r = await fetchWithTimeout("https://site.api.espn.com/apis/v2/sports/soccer/eng.1/standings?season=2026&sort=rank:asc");
      if (r.ok) {
        const d = await r.json();
        const entries = d.standings?.[0]?.entries||d.children?.[0]?.standings?.entries||[];
        if (entries.length >= 18) {
          const sorted = [...entries].sort((a,b)=>{
            const rv = e => parseInt(e.stats?.find(x=>x.name==="rank")?.value||"99");
            return rv(a)-rv(b);
          });
          standings = sorted.map(e=>mapTeam(e.team?.displayName||e.team?.name||"")).filter(Boolean);
          sorted.forEach(e=>{
            const tn=mapTeam(e.team?.displayName||e.team?.name||"");
            const ptsStat=e.stats?.find(x=>x.name==="points"||x.shortDisplayName==="PTS"||x.displayName==="Points");
            if(tn&&ptsStat) standingsPts[tn]=parseInt(ptsStat.value||ptsStat.displayValue||0);
          });
          console.log("✅ Standings: ESPN v2", standings.length, standings[0]);
        }
      }
    } catch(e){ console.log("ESPN v2 failed:", e.message); }

    // API 4: ESPN core standings
    if (!standings) try {
      const r = await fetchWithTimeout("https://sports.core.api.espn.com/v2/sports/soccer/leagues/eng.1/seasons/2026/types/2/groups/1/standings/0?limit=25");
      if (r.ok) {
        const d = await r.json();
        const entries = d.standings?.entries||d.entries||[];
        if (entries.length >= 18) {
          const sorted = [...entries].sort((a,b)=>{
            const rv = e => parseInt(e.stats?.find(x=>x.name==="rank")?.value||"99");
            return rv(a)-rv(b);
          });
          standings = sorted.map(e=>mapTeam(e.team?.displayName||e.team?.name||"")).filter(Boolean);
          console.log("✅ Standings: ESPN core", standings.length, standings[0]);
        }
      }
    } catch(e){ console.log("ESPN core failed:", e.message); }

    // If all APIs failed, derive standings from match results we already have
    if (!standings) {
      try {
        const derived = deriveStandings(newFx);
        if(derived.standings.length >= 18){
          standings = derived.standings;
          standingsPts = derived.standingsPts;
          standingsGP = derived.standingsGP||{};
          console.log("✅ Standings derived from results:", standings[0], standingsPts[standings[0]]+"pts");
        }
      } catch(e){ console.log("Derive standings failed:", e.message); }
    }
    // Always try to fill in missing pts from derived results
    if(standings && Object.keys(standingsPts).length < 10){
      try {
        const derived = deriveStandings(newFx);
        standingsPts = derived.standingsPts;
        if(Object.keys(standingsGP).length < 10) standingsGP = derived.standingsGP||{};
        console.log("📊 Pts derived from results:", standingsPts["Arsenal"]+"pts for Arsenal");
      } catch(e){}
    }
    if (!standings) console.log("⚠️ All standings methods failed");
    // standingsPts populated below

    return { fixtures: newFx, updated, dateChanges, standings, standingsPts, standingsGP };
  } catch(e) {
    console.log("ESPN refresh error:", e.message);
    return liveRefreshFallback(fixtures);
  }
}

// Fallback: football-data.org (requires API key)
async function liveRefreshFallback(fixtures) {
  const apiKey = (() => { try { return localStorage.getItem("hpl_fdorg_key") || ""; } catch { return ""; } })();
  if (!apiKey) return { fixtures, updated: 0, dateChanges: 0 };
  try {
    const res = await fetch("https://api.football-data.org/v4/competitions/PL/matches?season=2026",
      { headers: { "X-Auth-Token": apiKey } });
    if (!res.ok) return { fixtures, updated: 0, dateChanges: 0 };
    const data = await res.json();
    if (!data.matches) return { fixtures, updated: 0, dateChanges: 0 };
    const newFx = JSON.parse(JSON.stringify(fixtures));
    let updated = 0, dateChanges = 0;
    const now = new Date();
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-280); // Full season
    const FD_MAP = {
      "Arsenal FC":"Arsenal","AFC Bournemouth":"Bournemouth","Brentford FC":"Brentford",
      "Brighton & Hove Albion FC":"Brighton","Burnley FC":"Burnley","Chelsea FC":"Chelsea",
      "Crystal Palace FC":"Crystal Palace","Everton FC":"Everton","Fulham FC":"Fulham",
      "Leeds United FC":"Leeds","Liverpool FC":"Liverpool","Manchester City FC":"Man City",
      "Manchester United FC":"Man Utd","Newcastle United FC":"Newcastle",
      "Nottingham Forest FC":"Nottm Forest","Sunderland AFC":"Sunderland",
      "Tottenham Hotspur FC":"Spurs","West Ham United FC":"West Ham",
      "Wolverhampton Wanderers FC":"Wolves","Aston Villa FC":"Aston Villa",
    };
    data.matches.forEach(m => {
      const home = FD_MAP[m.homeTeam?.name] || m.homeTeam?.shortName;
      const away = FD_MAP[m.awayTeam?.name] || m.awayTeam?.shortName;
      if (!home || !away) return;
      Object.values(newFx).forEach(mwList => {
        mwList.forEach(fx => {
          if (norm(fx.home) !== home || norm(fx.away) !== away) return;
          if (m.status === "FINISHED" && m.score?.fullTime) {
            const h = m.score.fullTime.home, a = m.score.fullTime.away;
            if (h !== null && a !== null) {
              const mDT = new Date(`${fx.currentDate}T${fx.currentTime}:00`);
              if (mDT < now && mDT >= cutoff) {
                if (!fx.result || fx.result.homeGoals !== h || fx.result.awayGoals !== a) {
                  fx.result = { homeGoals: h, awayGoals: a }; updated++;
                }
              }
            }
          }
        });
      });
    });
    return { fixtures: newFx, updated, dateChanges };
  } catch(e) { return { fixtures, updated: 0, dateChanges: 0 }; }

const DATE_OVERRIDES = {
  // Add moved/postponed fixtures here
};
const buildFixtures = () => {
  const now = new Date();
  const out = {};
  Object.entries(SEASON_FIXTURES).forEach(([mwStr, list]) => {
    const mw = parseInt(mwStr);
    const results = REAL_RESULTS[mw] || [];
    out[mw] = list.map((f, i) => {
      const res = results[i];
      const id = `${mw}-${i}`;
      const override = DATE_OVERRIDES[id] || {};
      const currentDate = override.currentDate || f.date;
      const currentTime = override.currentTime || f.time;
      // Only show hardcoded result if match date is in the past
      // This prevents bogus results appearing for future fixtures
      const matchDateTime = new Date(`${currentDate}T${currentTime}:00`);
      const matchPlayed = matchDateTime < now;
      return { id, mw, home:f.home, away:f.away,
        date:f.date, time:f.time,
        currentDate, currentTime,
        result: (res && matchPlayed) ? { homeGoals:res[0], awayGoals:res[1] } : null };
    });
  });
  return out;
};

// Given all fixtures, build a map of {mw: {start, end}} date ranges
// Then given a new date, find which MW it belongs to
function getMWDateRanges(fixturesByMW) {
  const ranges = {};
  Object.entries(fixturesByMW).forEach(([mw, fxs]) => {
    const dates = fxs.map(f => f.date).sort();
    ranges[parseInt(mw)] = { start: dates[0], end: dates[dates.length-1] };
  });
  return ranges;
}

function getDisplayMW(fx, mwRanges) {
  // If fixture hasn't moved, return original mw
  if (fx.currentDate === fx.date) return fx.mw;
  // Find which MW window the new date falls into
  const d = fx.currentDate;
  // Find closest MW by date proximity
  let bestMW = fx.mw;
  let bestDist = Infinity;
  Object.entries(mwRanges).forEach(([mw, range]) => {
    // Check if date is within or near this MW's window (within 5 days)
    const start = new Date(range.start + "T00:00:00");
    const end = new Date(range.end + "T23:59:59");
    const target = new Date(d + "T12:00:00");
    if (target >= start && target <= end) {
      bestMW = parseInt(mw);
      bestDist = 0;
      return;
    }
    // Distance from window
    const dist = target < start
      ? (start - target) / 86400000
      : (target - end) / 86400000;
    if (dist < bestDist) { bestDist = dist; bestMW = parseInt(mw); }
  });
  return bestMW;
}

// Safety fallback ONLY — used if Supabase reveals data is unreachable on first load.
// Once Supabase responds (within ~1s), the real reveals state (set via Admin) takes over.

// Get the MW a fixture should display in:
// - If moved, always show in new MW regardless of MW range windows
// - originalMW stored for reference display
function getTargetMW(fx, allFixtures) {
  // Not moved - stays in original MW
  if (fx.currentDate === fx.date) return fx.mw;
  
  // Moved - find which MW contains fixtures closest to the new date
  // Simply find the MW whose average date is closest to currentDate
  const newD = new Date(fx.currentDate + "T12:00:00");
  let bestMW = fx.mw;
  let bestDist = Infinity;
  
  Object.entries(allFixtures).forEach(([mwStr, list]) => {
    const mw = parseInt(mwStr);
    if (mw === fx.mw) return; // skip original MW
    if (!list.length) return;
    // Use the median date of fixtures in this MW
    const dates = list
      .filter(f => f.id !== fx.id)
      .map(f => new Date(f.currentDate + "T12:00:00").getTime());
    if (!dates.length) return;
    const median = dates.sort((a,b)=>a-b)[Math.floor(dates.length/2)];
    const dist = Math.abs(newD.getTime() - median);
    if (dist < bestDist) { bestDist = dist; bestMW = mw; }
  });
  
  return bestMW;
}

function calcPts(pred,result){
  if(!result||result.homeGoals===null||result.homeGoals===undefined)return null;
  const pH=parseInt(pred.homeGoals),pA=parseInt(pred.awayGoals);
  const rH=parseInt(result.homeGoals),rA=parseInt(result.awayGoals);
  if(isNaN(pH)||isNaN(pA))return null;
  if(pH===rH&&pA===rA)return 3;
  const po=pH>pA?"H":pH<pA?"A":"D",ro=rH>rA?"H":rH<rA?"A":"D";
  return po===ro?1:0;
}

    const check=()=>{
      const now=new Date();
      let changed=false;
      const nr={...reveals};
      Object.keys(deadlines).forEach(w=>{
        const mwNum=parseInt(w);
        if(nr[mwNum]) return; // already locked
        if(manuallyUnlocked[mwNum]) return; // admin unlocked — leave it
        if(new Date(deadlines[w])<=now){ nr[mwNum]=true; changed=true; }
      });
      if(changed){
        setReveals(nr);
        supa.setState("reveals",nr).catch(()=>{});
      }
    };
    check();
    const t=setInterval(check,60*1000);
    return ()=>clearInterval(t);
  },[supaLoading,deadlines,manuallyUnlocked,reveals]);

  // Load manuallyUnlocked and publicReveals from Supabase on startup
  useEffect(()=>{
    supa.getState("manually_unlocked").then(mu=>{ if(mu) setManuallyUnlocked(mu); }).catch(()=>{});
    supa.getState("public_reveals").then(pr=>{ if(pr) setPublicReveals(pr); }).catch(()=>{});
  },[]);

  // Auto public-reveal: at 10:00 AM the morning after admin reveals a MW, make it visible to everyone.
  // Checks every minute. Once public-revealed, stays that way permanently.
  useEffect(()=>{
    if(supaLoading) return;
    const checkPublic=()=>{
      const now=new Date();
      let changed=false;
      const npr={...publicReveals};
      Object.keys(reveals).forEach(w=>{
        const mwNum=parseInt(w);
        if(!reveals[mwNum]) return; // not admin-revealed yet
        if(npr[mwNum]) return; // already public
        // Find the morning after the deadline (or now if no deadline) at 10:00 AM
        const base=deadlines[w]?new Date(deadlines[w]):now;
        const morning=new Date(base);
        morning.setDate(morning.getDate()+1);
        morning.setHours(10,0,0,0);
        if(now>=morning){ npr[mwNum]=true; changed=true; }
      });
      if(changed){
        setPublicReveals(npr);
        supa.setState("public_reveals",npr).catch(()=>{});
      }
    };
    checkPublic();
    const t=setInterval(checkPublic,60*1000);
    return ()=>clearInterval(t);
  },[supaLoading,reveals,deadlines,publicReveals]);

  // Joker helpers - check saved predictions for joker usage
  const jokersUsed=(p,h)=>{
    const pPreds=predictions[p]||{};
    // Build fixture_id -> display MW map (accounts for moved fixtures)
    const fxDisplayMW={};
    const df=displayFixtures||fixtures;
    Object.entries(df).forEach(([mwStr,fxList])=>{
      const mwNum=parseInt(mwStr);
      fxList.forEach(fx=>{ fxDisplayMW[fx.id]=mwNum; });
    });
    let count=0;
    Object.entries(pPreds).forEach(([fxId,pred])=>{
      if(!pred?.joker)return;
      // Use display MW if known, fall back to original MW from id
      const mwNum=fxDisplayMW[fxId]||parseInt(fxId.split('-')[0]);
      if(half(mwNum)===h)count++;
    });
    return count;
  };
  const hasJoker=(p,w)=>{
    // Check if joker already used in any fixture currently displayed in this MW
    // This correctly handles moved fixtures
    const pPreds=predictions[p]||{};
    const fxsInMW=(displayFixtures||fixtures)[w]||[];
    return fxsInMW.some(fx=>pPreds[fx.id]?.joker);
  };
  const canJoker=(p,w)=>{
    if(!p)return false;
    if(hasJoker(p,w))return false; // already has joker this MW
    if(jokersUsed(p,half(w))>=5)return false; // used 5 this half-season
    return true;
  };

  const submit=async()=>{
    if(!me)return;
    if(reveals[mw]){toast_("This match week has been revealed — predictions are locked.","error");return;}
    if(isPast(mw)){toast_("Deadline passed!","error");return;}

    // Validate jokers before saving
    const draftJokerCount=Object.values(draft).filter(p=>p.joker).length;
    if(draftJokerCount>1){
      toast_("Only 1 joker allowed per match week — please remove the extra joker before saving","error");
      return;
    }
    if(draftJokerCount===1){
      const h=half(mw);
      const df3=displayFixtures||fixtures;
      const fxDMW3={};
      Object.entries(df3).forEach(([mwStr,fxList])=>{ fxList.forEach(fx=>{ fxDMW3[fx.id]=parseInt(mwStr); }); });
      const pPreds=predictions[me]||{};
      let jkOtherMWs=0;
      Object.entries(pPreds).forEach(([fxId,pred])=>{
        if(!pred?.joker) return;
        const origMW=parseInt(fxId.split('-')[0]);
        const displayedMW=fxDMW3[fxId]||origMW;
        if(half(origMW)===h && displayedMW!==mw) jkOtherMWs++;
      });
      if(jkOtherMWs>=5){
        toast_("Joker limit — you've already used 5 jokers this half-season","error");
        return;
      }
    }
    const pr2={...predictions,[me]:{...(predictions[me]||{}),...draft}};
    const jk2={...jokers};if(!jk2[me])jk2[me]={};
    if(Object.values(draft).some(p=>p.joker)&&canJoker(me,mw))jk2[me][mw]=true;
    setPredictions(pr2);setJokers(jk2);
    saveAll({pr:pr2,jk:jk2});
    // Save predictions to Supabase so all devices see them

      Object.entries(mwDraft).map(([fxId,p])=>[fxId,{
        homeGoals:p.homeGoals!==undefined?p.homeGoals:null,
        awayGoals:p.awayGoals!==undefined?p.awayGoals:null,
        joker:p.joker||false

    "Alasdair":{"d1-0":{homeGoals:4,awayGoals:1},"d1-1":{homeGoals:0,awayGoals:2},"d1-2":{homeGoals:1,awayGoals:0},"d1-3":{homeGoals:1,awayGoals:2},"d1-4":{homeGoals:3,awayGoals:0},"d2-0":{homeGoals:1,awayGoals:2},"d2-1":{homeGoals:0,awayGoals:4},"d2-2":{homeGoals:2,awayGoals:2}},
  };
  // Demo jokers: Cos plays joker in MW1, Trev in MW2
  const DEMO_JOKERS = { "Cos":{1:true}, "Trev":{2:true} };
  // Demo season: fake PL table for league tab preview
  const DEMO_SEASON_ACTUAL = ["Man City","Arsenal","Liverpool","Chelsea","Spurs","Man Utd","Newcastle","Aston Villa","Brighton","Nottm Forest","Brentford","West Ham","Fulham","Wolves","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"];
  const DEMO_SEASON_PREDS = {
    "Trev":    ["Man City","Liverpool","Arsenal","Chelsea","Spurs","Man Utd","Newcastle","Aston Villa","Brighton","Nottm Forest","Brentford","West Ham","Fulham","Wolves","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"],
    "Cos":     ["Arsenal","Man City","Liverpool","Spurs","Chelsea","Newcastle","Man Utd","Aston Villa","Brighton","Wolves","Nottm Forest","West Ham","Fulham","Brentford","Crystal Palace","Bournemouth","Everton","Ipswich","Leicester","Southampton"],
    "Steve":   ["Liverpool","Man City","Arsenal","Chelsea","Newcastle","Spurs","Man Utd","Brighton","Aston Villa","Nottm Forest","West Ham","Wolves","Fulham","Brentford","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"],
    "Clive":   ["Man City","Arsenal","Chelsea","Liverpool","Spurs","Man Utd","Newcastle","Brighton","Aston Villa","Brentford","Nottm Forest","West Ham","Wolves","Fulham","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"],

    "Pete":    ["Arsenal","Man City","Liverpool","Chelsea","Spurs","Newcastle","Man Utd","Aston Villa","Brighton","Nottm Forest","Wolves","West Ham","Brentford","Fulham","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"],
    "Terry":   ["Man City","Arsenal","Liverpool","Chelsea","Spurs","Man Utd","Newcastle","Aston Villa","Brighton","Nottm Forest","Brentford","Fulham","West Ham","Wolves","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"],
    "Alasdair":["Liverpool","Arsenal","Man City","Chelsea","Newcastle","Spurs","Man Utd","Brighton","Aston Villa","Nottm Forest","West Ham","Wolves","Brentford","Fulham","Crystal Palace","Everton","Bournemouth","Ipswich","Leicester","Southampton"],
  };
  const effectiveFixtures = demoMode ? DEMO_FIXTURES : displayFixtures;
  const effectivePredictions = demoMode ? DEMO_PREDS : predictions;
  const effectiveReveals = demoMode ? {1:true,2:true} : reveals;
  const effectivePublicReveals = demoMode ? {1:true,2:true} : publicReveals;
  const effectivePlayers = demoMode ? DEMO_PLAYERS : players;
  const effectiveJokers = demoMode ? DEMO_JOKERS : jokers;
  const effectiveSeasonActual = demoMode ? DEMO_SEASON_ACTUAL : seasonActual;
  const effectiveSeasonPreds = demoMode ? DEMO_SEASON_PREDS : seasonPreds;

  const props={fixtures:effectiveFixtures,displayFixtures:effectiveFixtures,predictions:effectivePredictions,reveals:effectiveReveals,publicReveals:effectivePublicReveals,deadlines,players:effectivePlayers,jokers:effectiveJokers,isPast,jokersUsed,hasJoker,canJoker};

  return(

            <div><div style={S.title}>HPL Predictions</div><div style={S.sub}>{seasonLabel} · <span style={{color:"#7C3AED"}}>v1.0</span> · <span style={{color:"#475569",fontSize:10}}>
  Built 14 Jun 2026 — v2.0
  {lastRefresh&&<span style={{marginLeft:8,color:"#34D39988"}}>· Refreshed {lastRefresh}</span>}
</span></div></div>
          </div>

        </div>
        {/* Global instruction banner */}
        <div style={{background:"#1E293B",borderBottom:"1px solid #334155",

      {/* Supabase loading */}

        <div style={{background:"#1E1B4B",padding:"10px 16px",fontSize:13,color:"#A78BFA",

        <div style={{background:supaError.includes("No internet")?"#1C1917":"#7F1D1D22",
          borderBottom:"1px solid #EF444444",
          padding:"10px 16px",fontSize:13,fontWeight:600,
          color:supaError.includes("No internet")?"#FCD34D":"#EF4444",
          textAlign:"center"}}>
          {supaError.includes("No internet")?"📡 ":"⚠️ "}{supaError}
        </div>
      )}
      {refreshStatus==="loading"&&(
        <div style={{background:"#1E293B",padding:"8px 16px",fontSize:12,color:"#60A5FA",display:"flex",alignItems:"center",gap:8}}>
          <span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>
          Checking results from last 280 days (full season)...
        </div>
      )}
      {refreshStatus&&refreshStatus!=="loading"&&(refreshStatus.updated>0||refreshStatus.dateChanges>0)&&(
        <div style={{background:"#065F4622",borderBottom:"1px solid #34D39944",padding:"8px 16px",fontSize:12,color:"#34D399"}}>
          ✅ {[refreshStatus.updated>0&&`${refreshStatus.updated} result${refreshStatus.updated>1?"s":""} updated`,refreshStatus.dateChanges>0&&`${refreshStatus.dateChanges} fixture date${refreshStatus.dateChanges>1?"s":""} updated`].filter(Boolean).join(" · ")}
        </div>
      )}
      <main style={S.main}>
        {tab==="predict"&&<Predict {...props} me={me} setMe={setMe} pins={pins} setPins={setPins} pinScreen={pinScreen} setPinScreen={setPinScreen} saveAll={saveAll} mw={mw} setMw={setMw} draft={draft} setDraft={setDraft} submit={submit} search={search} setSearch={setSearch} setPredictions={setPredictions} setAdmin={setAdmin} isOnline={isOnline} admin={admin} setTab={setTab}/>}
        {tab==="historicresults"&&<HistoricResults fixtures={effectiveFixtures} displayFixtures={effectiveFixtures} predictions={effectivePredictions} reveals={effectiveReveals} publicReveals={effectivePublicReveals} players={effectivePlayers} jokers={effectiveJokers} admin={admin} me={me} demoMode={demoMode} setDemoMode={setDemoMode}/>}
        {tab==="preds"&&<Results {...props} me={me} admin={admin} expMW={expMW} setExpMW={setExpMW} search={search} setSearch={setSearch} searchMode={searchMode} setSearchMode={setSearchMode} homeQ={homeQ} setHomeQ={setHomeQ} awayQ={awayQ} setAwayQ={setAwayQ}/>}

        />}

        {tab==="admin"&&<Admin {...props} fixtures={fixtures} displayFixtures={displayFixtures} demoMode={demoMode} setDemoMode={setDemoMode} setFixtures={setFixtures} predictions={predictions} setPredictions={setPredictions} jokers={jokers} setJokers={setJokers} pins={pins} setPins={setPins} reveals={reveals} setReveals={setReveals} deadlines={deadlines} setDeadlines={setDeadlines} manuallyUnlocked={manuallyUnlocked} setManuallyUnlocked={setManuallyUnlocked} players={players} setPlayers={setPlayers} admin={admin} setAdmin={setAdmin} toast_={toast_} saveAll={saveAll} syncStatus={syncStatus} setSupaLoading={setSupaLoading} seasonActual={seasonActual} setSeasonActual={setSeasonActual} seasonPreds={seasonPreds} setSeasonPreds={setSeasonPreds} seasonPts={seasonPts} setSeasonPts={setSeasonPts} seasonGP={seasonGP} standingsSource={standingsSource} mwOverrides={mwOverrides} setMwOverrides={setMwOverrides} entryFees={entryFees} setEntryFees={setEntryFees} seasonLabel={seasonLabel} setSeasonLabel={setSeasonLabel} emails={emails} setEmails={setEmails} onForceRefresh={()=>{setRefreshStatus("loading");liveRefresh(fixtures, mwOverrides).then(({fixtures:nFx,updated,dateChanges,fixturesBuilt})=>{if(fixturesBuilt||updated>0||dateChanges>0)setFixtures(nFx);setRefreshStatus({updated,dateChanges});setTimeout(()=>setRefreshStatus(null),4000);toast_(fixturesBuilt?`✅ Fixtures loaded from ESPN! ${Object.keys(nFx).length} match weeks`:`ESPN refresh: ${updated} results, ${dateChanges} date changes`);}).catch(e=>{setRefreshStatus(null);toast_("ESPN refresh failed: "+e.message,"error");});}}/>}
      </main>
    </div>
