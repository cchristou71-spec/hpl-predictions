<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{width:100%;margin:0;}
  body{background:#fff;font-family:'DM Sans','Segoe UI',sans-serif;overflow-x:hidden;}
  button{cursor:pointer;border:none;background:none;}
  button:hover{opacity:0.78;}
  input:focus,textarea:focus,select:focus{outline:none;}
  ::placeholder{color:#c0ccd8;opacity:1;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#c0d0e0;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── Offline fallback mode ───────────────────────────────────────────────────
// Visit this page with ?offline=1 in the URL to view the last locally-cached
// copy of the calendar data, with zero network calls and no React/Babel.
// This runs BEFORE React/Babel load, so it works even if the main app is broken.
(function(){
  if (location.search.indexOf('offline=1') === -1) return;

  var LOCAL_CACHE_KEY = "calendar_offline_backup";
  var LOCAL_CACHE_META_KEY = "calendar_offline_backup_time";

  function monthName(m){
    return ["January","February","March","April","May","June","July","August","September","October","November","December"][m];
  }
  function escapeHtml(s){
    if(s == null) return '';
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  var root = document.getElementById('root');
  root.innerHTML =
    '<div style="font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;color:#1a2a3a;min-height:100vh;padding-bottom:40px;">' +
      '<div style="background:#c0392b;color:#fff;padding:10px 14px;font-size:14px;font-weight:700;text-align:center;position:sticky;top:0;z-index:100;">' +
        '\u26A0 OFFLINE COPY \u2014 READ-ONLY, MAY BE OUT OF DATE' +
        '<small style="display:block;font-weight:400;font-size:12px;margin-top:2px;opacity:0.92;">Local snapshot on this device. No internet used. <a href="?" style="color:#fff;text-decoration:underline;">Go to live app</a></small>' +
      '</div>' +
      '<div id="offlineStatus" style="padding:10px 16px;font-size:13px;"></div>' +
      '<div style="padding:10px 16px;"><select id="offlineMonthFilter" style="font-size:13px;padding:6px 8px;border:1px solid #d0d8e0;border-radius:4px;"></select></div>' +
      '<div id="offlineMain" style="padding:6px 16px;"></div>' +
    '</div>';

  var raw, rawTime;
  try {
    raw = localStorage.getItem(LOCAL_CACHE_KEY);
    rawTime = localStorage.getItem(LOCAL_CACHE_META_KEY);
  } catch(e){
    document.getElementById('offlineStatus').textContent = 'Local storage is unavailable in this browser.';
    window.__OFFLINE_MODE__ = true;
    return;
  }

  if (!raw) {
    document.getElementById('offlineMain').innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:#a0b0c0;"><h2 style="font-size:16px;color:#7a8fa8;margin-bottom:8px;">No offline copy found on this device</h2><p>Open the live calendar at least once while it\'s working, and a local copy will save automatically.</p></div>';
    window.__OFFLINE_MODE__ = true;
    return;
  }

  var DATA;
  try { DATA = JSON.parse(raw); }
  catch(e){
    document.getElementById('offlineStatus').textContent = 'Cached data is corrupted.';
    window.__OFFLINE_MODE__ = true;
    return;
  }

  var when = rawTime ? new Date(rawTime) : null;
  document.getElementById('offlineStatus').innerHTML =
    '<span style="color:#2e7d32;">Showing local copy saved on this device at: ' + (when ? when.toLocaleString() : 'unknown time') + '</span>';

  function render(){
    var filter = document.getElementById('offlineMonthFilter').value;
    var main = document.getElementById('offlineMain');
    main.innerHTML = '';
    var keys = Object.keys(DATA).filter(function(k){
      if (!DATA[k] || !DATA[k].length) return false;
      if (!filter) return true;
      var parts = k.split('-');
      return (parts[0] + '-' + parts[1]) === filter;
    });
    keys.sort(function(a,b){
      var ap = a.split('-').map(Number), bp = b.split('-').map(Number);
      return new Date(ap[0],ap[1],ap[2]) - new Date(bp[0],bp[1],bp[2]);
    });
    if (keys.length === 0) {
      main.innerHTML = '<div style="color:#a0b0c0;font-size:13px;padding:20px;text-align:center;">No events found for this view.</div>';
      return;
    }
    keys.forEach(function(key){
      var parts = key.split('-').map(Number);
      var y=parts[0], m=parts[1], d=parts[2];
      var dateObj = new Date(y,m,d);
      var dayName = dateObj.toLocaleDateString(undefined,{weekday:'long'});
      var group = document.createElement('div');
      group.style.marginTop = '14px';
      var h2 = document.createElement('h2');
      h2.style.cssText = 'font-size:14px;color:#1a3a6b;font-weight:700;padding:4px 0;border-bottom:2px solid #2d5f8a;';
      h2.textContent = dayName + ', ' + monthName(m) + ' ' + d + ' ' + y;
      group.appendChild(h2);
      (DATA[key] || []).forEach(function(ev){
        var evEl = document.createElement('div');
        evEl.style.cssText = 'background:#fff;border:1px solid #e0e6ec;border-left:4px solid #5a8fc8;border-radius:4px;padding:8px 10px;margin-top:6px;';
        var timeStr = ev.timeStart ? (ev.timeStart + (ev.timeEnd ? ' \u2013 ' + ev.timeEnd : '')) : '';
        var titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size:14px;font-weight:600;';
        titleEl.textContent = ev.title || '(untitled)';
        var metaEl = document.createElement('div');
        metaEl.style.cssText = 'font-size:11px;color:#8aabcc;margin-top:2px;';
        metaEl.textContent = [timeStr, ev.note].filter(Boolean).join(' \u00B7 ');
        evEl.appendChild(titleEl);
        evEl.appendChild(metaEl);
        group.appendChild(evEl);
      });
      main.appendChild(group);
    });
  }

  var sel = document.getElementById('offlineMonthFilter');
  var yms = {};
  Object.keys(DATA).forEach(function(k){
    var parts = k.split('-');
    yms[parts[0] + '-' + parts[1]] = true;
  });
  var now = new Date();
  var curKey = now.getFullYear() + '-' + now.getMonth();
  yms[curKey] = true;
  var sorted = Object.keys(yms).sort();
  var optsHtml = '<option value="">All months</option>';
  sorted.forEach(function(ym){
    var parts = ym.split('-').map(Number);
    optsHtml += '<option value="' + ym + '">' + monthName(parts[1]) + ' ' + parts[0] + '</option>';
  });
  sel.innerHTML = optsHtml;
  if (yms[curKey]) sel.value = curKey;
  sel.addEventListener('change', render);

  render();

  // Prevent the React app below from mounting over this offline view.
  window.__OFFLINE_MODE__ = true;
})();
</script>

function generateId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function today(){ const d=new Date(); return {year:d.getFullYear(),month:d.getMonth(),day:d.getDate()}; }
function isDayPast(day,month,year,now){
  if(year<now.year)return true; if(year>now.year)return false;
  if(month<now.month)return true; if(month>now.month)return false;
  return day<now.day;
}
function dateInt(year,month,day){ return year*10000+month*100+day; }
function fmtTime(h,m){ if(h===""&&m==="")return ""; return `${h}:${m}`; }
function parseTimeParts(s){
  if(!s)return {h:"",m:""};
  const p=s.match(/^(\d{2}):(\d{2})$/);
  if(p)return {h:p[1],m:p[2]};
  return {h:"",m:""};
}
function contDates(startD, endD){
  const result=[];
  let y=startD.year, mo=startD.month;
  mo++; if(mo>11){mo=0;y++;}
  while(dateInt(y,mo,1)<=dateInt(endD.year,endD.month,endD.day)){
    if(dateInt(y,mo,1)<dateInt(endD.year,endD.month,endD.day)){
      result.push({year:y,month:mo,day:1});
    }
    mo++; if(mo>11){mo=0;y++;}
  }
  return result;
}
function sortedEvents(evs){
  return [...evs].sort((a,b)=>{
    const ta=a.timeStart?parseInt(a.timeStart.replace(":","")):-1;
    const tb=b.timeStart?parseInt(b.timeStart.replace(":","")):-1;
    if(ta===-1&&tb===-1)return 0;
    if(ta===-1)return 1; if(tb===-1)return -1;
    return ta-tb;
  });
}

// ── DayLabel — shared day number/name column ─────────────────────────────────
function DayLabel({day, year, month, nowData, onAddClick}){
  if(!day) return <div style={{width:28,flexShrink:0}}/>;
  const dayName=DAY_NAMES[new Date(year,month,day).getDay()];
  const isTod=day===nowData.day&&month===nowData.month&&year===nowData.year;
  const past=isDayPast(day,month,year,nowData);
  const dow=new Date(year,month,day).getDay();
  const isWeekend=dow===0||dow===6;
  return(
    <div style={{width:28,flexShrink:0,display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"flex-start",padding:"3px 1px 3px 2px",
      position:"relative",
      background:isTod?"#2d5f8a":isWeekend?"rgba(210,225,240,0.4)":"transparent"}}>
      <div onClick={()=>onAddClick(day)} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",width:"100%"}}>
        <div style={{fontFamily:SF,fontSize:12,fontWeight:700,lineHeight:1,
          color:isTod?"#fff":past?"#c0cdd5":"#1a3a6b"}}>{day}</div>
        <div style={{fontFamily:SF,fontSize:7,fontWeight:600,lineHeight:1.1,marginTop:1,
          letterSpacing:"0.02em",
          color:isTod?"rgba(255,255,255,0.7)":past?"#c0cdd5":"#5a7fa8"}}>
          {dayName.slice(0,3).toUpperCase()}
        </div>
      </div>
    </div>

// ── Unified paired grid — both columns share row heights ──────────────────────
function PairedGrid({leftDays, rightDays, year, month, allEvents, nowData, onAddClick, onEventClick}){
  // Build arrow data for both columns
  function buildArrows(days){
    const multiDayEvs=[];
    days.forEach(day=>{
      (allEvents[`${year}-${month}-${day}`]||[]).forEach(ev=>{
        if(ev.endDay&&!multiDayEvs.find(e=>e.id===ev.id))multiDayEvs.push(ev);
      });
    });
    Object.values(allEvents).forEach(arr=>{
      arr.forEach(ev=>{
        if(!ev.endDay)return;
        if(multiDayEvs.find(e=>e.id===ev.id))return;
        const startD=dateInt(ev.date.year,ev.date.month,ev.date.day);
        const endD=dateInt(ev.endYear??ev.date.year,ev.endMonth??ev.date.month,ev.endDay);
        const colStart=dateInt(year,month,days[0]);
        const colEnd=dateInt(year,month,days[days.length-1]);
        if(endD>=colStart&&startD<=colEnd)multiDayEvs.push(ev);
      });
    });
    multiDayEvs.sort((a,b)=>dateInt(a.date.year,a.date.month,a.date.day)-dateInt(b.date.year,b.date.month,b.date.day));
    const slots=[];const evSlot={};
    multiDayEvs.forEach(ev=>{
      const startD=dateInt(ev.date.year,ev.date.month,ev.date.day);
      const endD=dateInt(ev.endYear??ev.date.year,ev.endMonth??ev.date.month,ev.endDay);
      let slot=0;
      while(slots[slot]&&slots[slot]>startD)slot++;
      slots[slot]=endD;evSlot[ev.id]=slot+1;
    });
    const colFirstD=dateInt(year,month,days[0]);
    const arrowsForDay={};
    days.forEach(day=>{
      const thisD=dateInt(year,month,day);
      const arr=[];
      multiDayEvs.forEach(ev=>{
        const startD=dateInt(ev.date.year,ev.date.month,ev.date.day);
        const endD=dateInt(ev.endYear??ev.date.year,ev.endMonth??ev.date.month,ev.endDay);
        if(thisD<startD||thisD>endD)return;
        let role;
        if(thisD===startD)role="start";
        else if(thisD===endD)role="end";
        else if(thisD===colFirstD&&startD<colFirstD)role="contd";
        else role="mid";
        arr.push({ev,role,slot:evSlot[ev.id]});
      });
      arrowsForDay[day]=arr;
    });
    return arrowsForDay;
  }

  const leftArrows=buildArrows(leftDays);
  const rightArrows=buildArrows(rightDays);
  const maxLen=Math.max(leftDays.length,rightDays.length);

  // Calculate row height for each paired row based on max entries in either cell
  function entryCount(day, arrowsForDay){
    if(!day)return 0;
    const arrows=arrowsForDay[day]||[];
    const rawEvs=allEvents[`${year}-${month}-${day}`]||[];
    const arrowLabelIds=new Set(arrows.filter(a=>a.role==="start"||a.role==="end"||a.role==="contd").map(a=>a.ev.id));
    const linkedIds=new Set();
    arrows.forEach(({ev})=>{
      if(ev.endEntryId)linkedIds.add(ev.endEntryId);
      if(ev.contEntryIds)Object.values(ev.contEntryIds).forEach(id=>linkedIds.add(id));
    });
    const evs=rawEvs.filter(ev=>!arrowLabelIds.has(ev.id)&&!linkedIds.has(ev.id));
    return arrows.filter(a=>a.role==="start"||a.role==="end"||a.role==="contd").length+evs.length;
  }

  return(
    <div style={{width:"100%",flex:1,display:"flex",flexDirection:"column",padding:0}}>
      {Array.from({length:maxLen},(_,i)=>{
        const lDay=leftDays[i]||null;
        const rDay=rightDays[i]||null;
        const lCount=entryCount(lDay,leftArrows);
        const rCount=entryCount(rDay,rightArrows);
        const rowHeight=Math.max(36,Math.max(lCount,rCount)*26+10);
        return(
          <div key={i} style={{display:"flex",height:rowHeight,flexShrink:0,borderBottom:"1px solid rgba(0,0,0,0.06)"}}>
            {/* Left day/date — shared column outside both cells */}
            <DayLabel day={lDay} year={year} month={month} nowData={nowData} onAddClick={onAddClick}/>
            {/* Left entry area */}
            <EntryArea day={lDay} year={year} month={month} allEvents={allEvents} nowData={nowData}
              onAddClick={onAddClick} onEventClick={onEventClick}
              spanArrows={lDay?leftArrows[lDay]:[]} isLeft={true}/>
            {/* Centre divider */}
            <div style={{width:1,background:"rgba(0,0,0,0.06)",flexShrink:0}}/>
            {/* Right day/date */}
            <DayLabel day={rDay} year={year} month={month} nowData={nowData} onAddClick={onAddClick}/>
            {/* Right entry area */}
            <EntryArea day={rDay} year={year} month={month} allEvents={allEvents} nowData={nowData}
              onAddClick={onAddClick} onEventClick={onEventClick}
              spanArrows={rDay?rightArrows[rDay]:[]} isLeft={false}/>
          </div>
        );
      })}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const now=today();
  const [year,setYear]=useState(now.year);
  const [month,setMonth]=useState(now.month);

  const [events,setEvents]=useState({});
  const [modal,setModal]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [saving,setSaving]=useState(false);
  const saveTimer=useRef(null);
  const [deletedBH, setDeletedBH] = useState([]);

  useEffect(()=>{
        fetch(SUPA_URL+"/rest/v1/calendar_events?id=eq.deleted_bh&select=data",{headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY}}).then(function(r){return r.json();}).then(function(rows){if(rows&&rows[0]&&rows[0].data&&rows[0].data.length)setDeletedBH(rows[0].data);}).catch(function(){});
    dbLoad().then(data=>{
      const events=data||{};
      // Auto-copy existing birthdays that have no yearlyIds (10 years)
      let changed=false;
      const removeById=(state,id)=>{const out={};for(const[k,arr] of Object.entries(state)){const f=arr.filter(e=>e.id!==id);if(f.length)out[k]=f;}return out;};
      const upsert=(state,dateObj,ev)=>{const k=`${dateObj.year}-${dateObj.month}-${dateObj.day}`;const arr=state[k]?[...state[k]]:[];const idx=arr.findIndex(e=>e.id===ev.id);if(idx>=0)arr[idx]=ev;else arr.push(ev);return{...state,[k]:arr};};
      const allEvs=Object.values(events).flat();
      for(const ev of allEvs){
        if(ev.eventType==="birthday"&&!ev.yearlyParentId&&(!ev.yearlyIds||ev.yearlyIds.length===0)){
          const years=10;
          const yearlyIds=[];
          for(let i=1;i<=years;i++){
            const yYear=ev.date.year+i;
            const yDate={year:yYear,month:ev.date.month,day:ev.date.day};
            const yKey=`${yYear}-${ev.date.month}-${ev.date.day}`;
            const existing=events[yKey]?.find(e=>e.yearlyParentId===ev.id);
            if(!existing){
              const yid=generateId();
              yearlyIds.push(yid);
              Object.assign(events,upsert(events,yDate,{id:yid,title:ev.title,timeStart:ev.timeStart||"",timeEnd:ev.timeEnd||"",note:ev.note||"",colour:ev.colour||DEFAULT_COLOUR,eventType:"birthday",yearlyParentId:ev.id,date:yDate}));
              changed=true;
            } else {
              yearlyIds.push(existing.id);
            }
          }
          // Update parent with yearlyIds
          const pk=`${ev.date.year}-${ev.date.month}-${ev.date.day}`;
          if(events[pk]){
            const idx=events[pk].findIndex(e=>e.id===ev.id);
            if(idx>=0){events[pk][idx]={...events[pk][idx],yearlyIds};changed=true;}
          }
        }
      }
      setEvents(events);
      setLoaded(true);
      if(changed) dbSave(events);
    }).catch(e=>{alert("Load failed: "+e.message);setLoaded(true);});
  },[]);

  const saveEvents=useCallback((ne)=>{
    setEvents(ne);
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      setSaving(true);
      dbSave(ne).finally(()=>setSaving(false));
    },600);
  },[]);

  const handleSave=useCallback(entry=>{
    setEvents(prev=>{
      let next={...prev};
      const removeById=(state,id)=>{const out={};for(const[k,arr] of Object.entries(state)){const f=arr.filter(e=>e.id!==id);if(f.length)out[k]=f;}return out;};
      const upsert=(state,dateObj,ev)=>{const k=`${dateObj.year}-${dateObj.month}-${dateObj.day}`;const arr=state[k]?[...state[k]]:[];const idx=arr.findIndex(e=>e.id===ev.id);if(idx>=0)arr[idx]=ev;else arr.push(ev);return{...state,[k]:arr};};
      let oldEntry=null;
      for(const arr of Object.values(next)){const found=arr.find(e=>e.id===entry.id);if(found){oldEntry=found;break;}}
      const hasNewEnd=!!(entry.endDay);
      const oldEndEntryId=oldEntry?.endEntryId;
      const oldContIds=oldEntry?.contEntryIds||{};
      const newEndDateObj=hasNewEnd?{year:entry.endYear??entry.date.year,month:entry.endMonth??entry.date.month,day:entry.endDay}:null;
      let existingEndEntry=null;
      if(oldEndEntryId){for(const arr of Object.values(next)){const f=arr.find(e=>e.id===oldEndEntryId);if(f){existingEndEntry=f;break;}}}
      let endEntryId=oldEndEntryId;
      if(hasNewEnd){
        if(existingEndEntry){next=removeById(next,existingEndEntry.id);next=upsert(next,newEndDateObj,{...existingEndEntry,date:newEndDateObj});}
        else{endEntryId=generateId();next=upsert(next,newEndDateObj,{id:endEntryId,title:`${entry.title} ends`,timeStart:entry.timeEnd||"",timeEnd:"",note:"",colour:entry.colour||DEFAULT_COLOUR,date:newEndDateObj});}
      }else if(!hasNewEnd&&existingEndEntry){next=removeById(next,existingEndEntry.id);endEntryId=undefined;}
      const newContDates=hasNewEnd?contDates(entry.date,newEndDateObj):[];
      const newContKeys=new Set(newContDates.map(d=>`${d.year}-${d.month}-${d.day}`));
      const oldContKeys=new Set(Object.keys(oldContIds));
      const newContEntryIds={...oldContIds};
      for(const k of oldContKeys){if(!newContKeys.has(k)){next=removeById(next,oldContIds[k]);delete newContEntryIds[k];}}
      for(const d of newContDates){
        const k=`${d.year}-${d.month}-${d.day}`;
        if(!oldContKeys.has(k)){const cid=generateId();newContEntryIds[k]=cid;next=upsert(next,d,{id:cid,title:`${entry.title} (cont'd)`,timeStart:"",timeEnd:"",note:"",colour:entry.colour||DEFAULT_COLOUR,date:d});}
      }
      if(oldEntry)next=removeById(next,entry.id);

      // ── Birthday repeat logic ──
      const oldYearlyIds=oldEntry?.yearlyIds||[];
      let yearlyIds=[];
      if(entry.eventType==="birthday"&&entry.repeatYears){
        const years=parseInt(entry.repeatYears);
        // Remove old yearly copies
        for(const yid of oldYearlyIds) next=removeById(next,yid);
        // Create new yearly copies
        for(let i=1;i<=years;i++){
          const yYear=entry.date.year+i;
          const yDate={year:yYear,month:entry.date.month,day:entry.date.day};
          const yKey=`${yYear}-${entry.date.month}-${entry.date.day}`;
          // Only create if not already there from a previous save
          const existing=next[yKey]?.find(e=>e.yearlyParentId===entry.id);
          if(!existing){
            const yid=generateId();
            yearlyIds.push(yid);
            next=upsert(next,yDate,{
              id:yid,
              title:entry.title,
              timeStart:entry.timeStart,
              timeEnd:entry.timeEnd,
              note:entry.note,
              colour:entry.colour||DEFAULT_COLOUR,
              eventType:"birthday",
              yearlyParentId:entry.id,
              date:yDate,
            });
          } else {
            yearlyIds.push(existing.id);
          }
        }
      } else if(oldYearlyIds.length>0){
        // Type changed away from birthday - remove copies
        for(const yid of oldYearlyIds) next=removeById(next,yid);
      }

      next=upsert(next,entry.date,{...entry,endEntryId:endEntryId||undefined,contEntryIds:Object.keys(newContEntryIds).length>0?newContEntryIds:undefined,yearlyIds:yearlyIds.length>0?yearlyIds:oldYearlyIds});
      saveEvents(next);return next;
    });
    setModal(null);
  },[saveEvents]);

  const handleDelete=useCallback(id=>{
    setEvents(prev=>{
      let next={...prev};
      let target=null;
      for(const arr of Object.values(next)){const f=arr.find(e=>e.id===id);if(f){target=f;break;}}
      const removeById=(state,rid)=>{const out={};for(const[k,arr] of Object.entries(state)){const f=arr.filter(e=>e.id!==rid);if(f.length)out[k]=f;}return out;};
      next=removeById(next,id);
      if(target?.endEntryId)next=removeById(next,target.endEntryId);
      if(target?.contEntryIds){for(const cid of Object.values(target.contEntryIds))next=removeById(next,cid);}
      if(target?.yearlyIds){for(const yid of target.yearlyIds)next=removeById(next,yid);}
      setSaving(true);
      dbSave(next).finally(()=>setSaving(false));
      return next;
    });
    setModal(null);
  },[]);


  const prevMonth=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  // Swipe handling
  const touchStartX=useRef(null);
  const handleTouchStart=e=>{ touchStartX.current=e.touches[0].clientX; };
  const handleTouchEnd=e=>{
    if(touchStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX.current;
    if(Math.abs(dx)>50){ if(dx<0)nextMonth(); else prevMonth(); }
    touchStartX.current=null;
  };
  const dim=getDaysInMonth(year,month);
  const allDays=Array.from({length:dim},(_,i)=>i+1);
  const half=Math.floor(dim/2);
  const leftDays=allDays.slice(0,half);
  const rightDays=allDays.slice(half);
  const openAdd=day=>setModal({date:{year,month,day}});
  const openEdit=(day,ev)=>setModal({date:{year,month,day:ev.date?.day||day},event:ev});

  return(
    <div style={{width:"100vw",minHeight:"100vh",background:"#fff",display:"flex",flexDirection:"column"}}>
      <div style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 6px 6px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"baseline",gap:8}}>
          <span style={{fontFamily:SF,fontSize:20,fontWeight:700,color:"#1a3a6b"}}>{MONTHS[month].toUpperCase()}</span>
          <span style={{fontFamily:SF,fontSize:14,color:"#5a7fa8",fontWeight:500}}>{year}</span>
          {saving&&<span style={{fontFamily:SF,fontSize:11,color:"#8aabcc",marginLeft:8}}>saving…</span>}
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          {[["←",prevMonth],["Today",()=>{setMonth(now.month);setYear(now.year);}],["→",nextMonth]].map(([lbl,fn])=>(
            <button key={lbl} onClick={fn} style={{fontFamily:SF,fontSize:13,fontWeight:700,background:"#2d5f8a",color:"#fff",border:"none",padding:"5px 13px",cursor:"pointer"}}>{lbl}</button>
          ))}

        </div>
      </div>
      {loaded?(
        <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} style={{userSelect:"none",flex:1,display:"flex",flexDirection:"column"}}>
          <PairedGrid leftDays={leftDays} rightDays={rightDays} year={year} month={month} allEvents={events} nowData={now} onAddClick={openAdd} onEventClick={openEdit}/>
        </div>
      ):(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:SF,fontSize:16,color:"#a0b0c0"}}>Loading…</span>
        </div>
      )}
      {modal&&<EventModal date={modal.date} event={modal.event} onSave={handleSave} onDelete={handleDelete} onClose={()=>setModal(null)}/>}
    </div>
  );
}

if (!window.__OFFLINE_MODE__) {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}
</script>
</body>
</html>
