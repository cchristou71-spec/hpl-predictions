name: Daily Calendar Reminders

on:
  schedule:
    # 9am UK time = 8am UTC (GMT) or 7am UTC (BST - summer)
    # Run at both times to cover GMT and BST
    - cron: '0 8 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send reminder emails
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}
          SUPA_KEY: ${{ secrets.SUPA_KEY }}
          EMAILJS_SERVICE: ${{ secrets.EMAILJS_SERVICE }}
          EMAILJS_TEMPLATE: ${{ secrets.EMAILJS_TEMPLATE }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
        run: |
          node << 'SCRIPT'
          const https = require('https');

          const SUPA_URL = process.env.SUPA_URL;
          const SUPA_KEY = process.env.SUPA_KEY;
          const EMAILJS_SERVICE = process.env.EMAILJS_SERVICE;
          const EMAILJS_TEMPLATE = process.env.EMAILJS_TEMPLATE;
          const EMAILJS_PUBLIC_KEY = process.env.EMAILJS_PUBLIC_KEY;

          const RECIPIENTS = {
            cos: { name: 'Cos', email: 'cchristou71@gmail.com' },
            carolyn: { name: 'Carolyn', email: 'carolynmarshall@btinternet.com' }
          };

          function httpsPost(hostname, path, data) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(data);
              const options = {
                hostname, path, method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              };
              const req = https.request(options, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function httpsGet(hostname, path, headers) {
            return new Promise((resolve, reject) => {
              const req = https.request({ hostname, path, method: 'GET', headers }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve(JSON.parse(d)));
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function main() {
            // Get tomorrow's date
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tYear  = tomorrow.getFullYear();
            const tMonth = tomorrow.getMonth(); // 0-indexed
            const tDay   = tomorrow.getDate();

            console.log('Checking reminders for:', tYear + '-' + (tMonth+1) + '-' + tDay);

            // Load events from Supabase
            const supaHost = SUPA_URL.replace('https://', '');
            const rows = await httpsGet(supaHost, '/rest/v1/calendar_events?id=eq.shared&select=data', {
              apikey: SUPA_KEY,
              Authorization: 'Bearer ' + SUPA_KEY
            });

            if (!rows || !rows[0] || !rows[0].data) {
              console.log('No data found');
              return;
            }

            const events = rows[0].data;
            const key = tYear + '-' + tMonth + '-' + tDay;
            const dayEvents = events[key] || [];

            console.log('Events tomorrow:', dayEvents.length);

            // Filter events with reminders set
            const toRemind = dayEvents.filter(ev => ev.reminders && ev.reminders.length > 0);
            console.log('Events with reminders:', toRemind.length);

            // Send emails
            for (const ev of toRemind) {
              for (const recipKey of ev.reminders) {
                const recipient = RECIPIENTS[recipKey];
                if (!recipient) continue;

                const dateStr = ['January','February','March','April','May','June','July','August','September','October','November','December'][tMonth] + ' ' + tDay + ' ' + tYear;
                const timeStr = ev.timeStart ? (ev.timeEnd ? ev.timeStart + ' - ' + ev.timeEnd : ev.timeStart) : 'All day';

                const templateParams = {
                  service_id: EMAILJS_SERVICE,
                  template_id: EMAILJS_TEMPLATE,
                  user_id: EMAILJS_PUBLIC_KEY,
                  template_params: {
                    to_name: recipient.name,
                    to_email: recipient.email,
                    event_title: ev.title,
                    event_date: dateStr,
                    event_time: timeStr
                  }
                };

                try {
                  const result = await httpsPost('api.emailjs.com', '/api/v1.0/email/send', templateParams);
                  console.log('Email sent to', recipient.name, ':', result.status, result.body);
                } catch (e) {
                  console.error('Failed to send to', recipient.name, ':', e.message);
                }
              }
            }
            console.log('Done');
          }

          main().catch(console.error);
          SCRIPT
